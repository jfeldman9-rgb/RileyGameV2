<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0,viewport-fit=cover">
<title>Riley vs Kenzie · Ninja Snack Attack · Royal Edition</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:#050510;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
#game{position:fixed;inset:0;display:block;z-index:1}

.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;
  padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));
  background:radial-gradient(ellipse at 50% 30%,rgba(120,0,200,0.18) 0%,rgba(5,5,16,0.97) 70%);backdrop-filter:blur(20px)}

.title{font-family:'Cinzel',Georgia,serif;font-size:clamp(32px,8vw,64px);font-weight:900;margin:0 0 4px;line-height:1.05;color:#fff;
  text-shadow:0 0 18px #e100ff,0 0 50px #9b00ff,0 0 80px rgba(200,0,255,0.4),0 4px 14px rgba(0,0,0,0.8);letter-spacing:-0.5px}
.sub{font-size:clamp(11px,2.8vw,15px);color:rgba(255,255,255,0.5);margin:0 0 24px;letter-spacing:4px;text-transform:uppercase}

.howto{display:flex;gap:9px;margin-bottom:22px;flex-wrap:wrap;justify-content:center}
.tip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:8px 14px;font-size:11px;color:rgba(255,255,255,0.65)}
.tip strong{color:#fff;display:block;font-size:18px;margin-bottom:1px}

.btn-row{display:flex;gap:11px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
button{font-weight:900;font-size:clamp(15px,3.8vw,19px);padding:12px 28px;border:none;border-radius:50px;color:#fff;cursor:pointer;
  transition:transform 0.08s,box-shadow 0.15s,filter 0.15s;text-transform:uppercase;letter-spacing:2px;-webkit-appearance:none}
button:hover{filter:brightness(1.15)}
button:active{transform:scale(0.94)}
.btn-easy{background:linear-gradient(135deg,#00c6ff,#0072ff);box-shadow:0 5px 24px rgba(0,198,255,0.5)}
.btn-medium{background:linear-gradient(135deg,#f093fb,#f5576c);box-shadow:0 5px 24px rgba(245,87,108,0.5)}
.btn-hard{background:linear-gradient(135deg,#ff416c,#ff4b2b);box-shadow:0 5px 24px rgba(255,65,108,0.5)}
.hs{font-size:14px;color:#ffd700;font-weight:bold;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);padding:5px 16px;border-radius:30px}

#hud{position:fixed;inset:0;pointer-events:none;z-index:5;display:none;padding-top:env(safe-area-inset-top,0px)}
#scoreBlock{position:absolute;top:calc(env(safe-area-inset-top,0px)+12px);left:14px}
#scoreLbl{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:3px;font-weight:700}
#scoreNum{font-size:38px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 16px rgba(79,172,254,0.95),0 2px 8px rgba(0,0,0,0.6)}
#comboTxt{font-size:14px;font-weight:900;color:#ffeb3b;min-height:18px;text-shadow:0 0 10px #ff9800,0 2px 4px rgba(0,0,0,0.6);transition:transform 0.08s;transform-origin:left}
#comboTxt.pop{transform:scale(1.5)}

#livesTxt{position:absolute;top:calc(env(safe-area-inset-top,0px)+12px);right:12px;font-size:22px;text-align:right;line-height:1.2;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5))}

#waveBlock{position:absolute;top:calc(env(safe-area-inset-top,0px)+12px);left:50%;transform:translateX(-50%);text-align:center;white-space:nowrap}
#waveLbl{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:3px;font-weight:700}
#waveNum{font-size:26px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 14px rgba(255,215,0,0.7),0 2px 6px rgba(0,0,0,0.5)}

#powerBlock{position:absolute;top:calc(env(safe-area-inset-top,0px)+70px);left:50%;transform:translateX(-50%);width:min(210px,56vw);text-align:center}
#powerLbl{font-size:9px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
#powerBar{height:7px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.12)}
#powerFill{height:100%;width:0%;background:linear-gradient(90deg,#00f2fe,#4facfe);border-radius:4px;transition:width 0.12s;box-shadow:0 0 8px currentColor}
#powerFill.rush{background:linear-gradient(90deg,#f093fb,#f5576c);animation:rushPulse 0.35s infinite alternate}

#pills{position:absolute;top:calc(env(safe-area-inset-top,0px)+94px);left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.pill-freeze{background:rgba(100,180,255,0.88)}
.pill-shield{background:rgba(255,210,80,0.9);color:#333}

#ann{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%) scale(0.5);opacity:0;pointer-events:none;z-index:8;
  transition:all 0.38s cubic-bezier(0.175,0.885,0.32,1.275);text-align:center}
#ann.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#annTitle{font-size:clamp(36px,10vw,74px);font-weight:900;color:#fff;line-height:1;font-family:'Cinzel',Georgia,serif;letter-spacing:-0.5px}
#annSub{font-size:16px;color:rgba(255,255,255,0.8);margin-top:5px;font-weight:600;letter-spacing:1px}

#taunt{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(0.6);opacity:0;pointer-events:none;z-index:9;
  transition:all 0.25s cubic-bezier(0.175,0.885,0.32,1.4);white-space:nowrap;max-width:90vw;text-align:center;
  font-size:clamp(20px,5vw,40px);font-weight:900;color:#fff;
  text-shadow:0 0 20px #ff0040,0 0 40px rgba(255,0,64,0.6),0 3px 10px rgba(0,0,0,0.8)}
#taunt.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

#over{display:none}
.over-title{font-family:'Cinzel',Georgia,serif;font-size:clamp(36px,9vw,66px);font-weight:900;margin:0 0 6px;
  background:linear-gradient(135deg,#f093fb,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-row{display:flex;gap:15px;margin:6px 0 20px;justify-content:center}
.stat-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:13px;padding:9px 17px;text-align:center}
.stat-val{font-size:30px;font-weight:900;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,0.4)}
.stat-lbl{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:2px}
.new-hs{font-size:17px;font-weight:900;color:#ffd700;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.35);padding:7px 20px;border-radius:30px;margin-bottom:14px;box-shadow:0 0 20px rgba(255,215,0,0.2)}

@keyframes rushPulse{from{opacity:0.8}to{opacity:1;filter:brightness(1.5)}}
@keyframes shake{10%,90%{transform:translate3d(-3px,3px,0)}20%,80%{transform:translate3d(5px,-3px,0)}30%,50%,70%{transform:translate3d(-6px,5px,0)}40%,60%{transform:translate3d(6px,-5px,0)}}
.shake{animation:shake 0.42s cubic-bezier(.36,.07,.19,.97) both}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start" class="screen">
  <div class="title">Riley vs Kenzie</div>
  <div class="sub">⚔️ Ninja Snack Attack · Royal Edition ⚔️</div>
  <div class="howto">
    <div class="tip"><strong>⚔️</strong>Swipe to slice!</div>
    <div class="tip"><strong>💣</strong>Dodge bombs!</div>
    <div class="tip"><strong>❄️🛡️❤️</strong>Power-ups!</div>
    <div class="tip"><strong>✌️</strong>Multi-slash!</div>
  </div>
  <div class="btn-row">
    <button class="btn-easy" onclick="startGame('easy')">Easy</button>
    <button class="btn-medium" onclick="startGame('medium')">Medium</button>
    <button class="btn-hard" onclick="startGame('hard')">Hard</button>
  </div>
  <div id="startHs" class="hs" style="display:none">🏆 Best: <span id="startHsVal">0</span></div>
</div>

<div id="hud">
  <div id="scoreBlock"><div id="scoreLbl">Score</div><div id="scoreNum">0</div><div id="comboTxt"></div></div>
  <div id="livesTxt">❤️❤️❤️</div>
  <div id="waveBlock"><div id="waveLbl">Wave</div><div id="waveNum">1</div></div>
  <div id="powerBlock"><div id="powerLbl">⚡ Sugar Rush</div><div id="powerBar"><div id="powerFill"></div></div></div>
  <div id="pills"></div>
</div>

<div id="ann"><div id="annTitle"></div><div id="annSub"></div></div>
<div id="taunt"></div>

<div id="over" class="screen">
  <div class="over-title">Game Over!</div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val" id="goScore">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat-card"><div class="stat-val" id="goWave">1</div><div class="stat-lbl">Wave</div></div>
    <div class="stat-card"><div class="stat-val" id="goCombo">0</div><div class="stat-lbl">Best Combo</div></div>
  </div>
  <div id="newHs" class="new-hs" style="display:none">🏆 NEW HIGH SCORE!</div>
  <div class="btn-row">
    <button class="btn-easy" onclick="startGame('easy')">Easy</button>
    <button class="btn-medium" onclick="startGame('medium')">Med</button>
    <button class="btn-hard" onclick="startGame('hard')">Hard</button>
  </div>
  <div id="overHs" class="hs" style="display:none;margin-top:8px">🏆 Best: <span id="overHsVal">0</span></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
//  AUDIO — synth sfx + Web Speech taunts
// ═══════════════════════════════════════════════════════════════════
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function tone(freq, type, dur, vol = 0.12, f0 = null) {
  try {
    const ac = getAC(), o = ac.createOscillator(), g = ac.createGain();
    o.type = type;
    if (f0 != null) {
      o.frequency.setValueAtTime(f0, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(Math.max(20, freq), ac.currentTime + dur * 0.75);
    } else {
      o.frequency.value = Math.max(20, freq);
    }
    g.gain.setValueAtTime(Math.min(vol, 0.3), ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  } catch (_) {}
}

function noise(dur, vol = 0.08, hp = 2000) {
  try {
    const ac = getAC();
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = ac.createBufferSource(), g = ac.createGain(), f = ac.createBiquadFilter();
    s.buffer = buf; f.type = 'highpass'; f.frequency.value = hp;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    s.connect(f); f.connect(g); g.connect(ac.destination);
    s.start(); s.stop(ac.currentTime + dur);
  } catch (_) {}
}

// Layered ninja shout: breath burst + pitched vocal formant
function ninjaShoutSFX() {
  try {
    const ac = getAC(), now = ac.currentTime;
    // Breath burst (the 'H' of HYAH)
    noise(0.08, 0.09, 3000);
    // Vowel formant 1 (open 'ah')
    const o1 = ac.createOscillator(), g1 = ac.createGain();
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(520, now);
    o1.frequency.exponentialRampToValueAtTime(180, now + 0.22);
    g1.gain.setValueAtTime(0.14, now + 0.04);
    g1.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o1.connect(g1); g1.connect(ac.destination);
    o1.start(); o1.stop(now + 0.3);
    // Formant 2 (upper harmonic, gives 'y' sound)
    const o2 = ac.createOscillator(), g2 = ac.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(1400, now);
    o2.frequency.exponentialRampToValueAtTime(500, now + 0.2);
    g2.gain.setValueAtTime(0.06, now + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    o2.connect(g2); g2.connect(ac.destination);
    o2.start(); o2.stop(now + 0.28);
  } catch (_) {}
}

// Speech synth setup
let voices = [];
function loadVoices() { voices = speechSynthesis.getVoices(); }
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function pickVoice(highPitch = true) {
  if (voices.length === 0) loadVoices();
  // Prefer female English voices for Kenzie
  const female = voices.find(v =>
    v.lang.startsWith('en') && /female|samantha|victoria|karen|tessa|fiona|moira|ava|allison|kate/i.test(v.name)
  );
  if (female) return female;
  return voices.find(v => v.lang.startsWith('en')) || voices[0];
}

function speak(text, opts = {}) {
  try {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = opts.rate ?? 1.15;
    u.pitch = opts.pitch ?? 1.5;
    u.volume = opts.volume ?? 0.85;
    const v = pickVoice();
    if (v) u.voice = v;
    speechSynthesis.speak(u);
  } catch (_) {}
}

const sfx = {
  slice:    () => { tone(900, 'square', 0.07, 0.12, 1400); noise(0.05, 0.08, 4000); },
  sliceHit: () => { tone(1000, 'square', 0.05, 0.16, 1600); noise(0.07, 0.11, 3500); ninjaShoutSFX(); },
  miss:     () => { tone(110, 'sawtooth', 0.42, 0.17, 200); },
  bomb:     () => { tone(35, 'sawtooth', 0.7, 0.26, 150); tone(70, 'square', 0.3, 0.1); noise(0.5, 0.17, 100); },
  power:    () => [440, 550, 660, 880].forEach((f, i) => setTimeout(() => tone(f, 'triangle', 0.13, 0.08), i * 55)),
  life:     () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 'sine', 0.18, 0.09), i * 70)),
  wave:     () => [330, 440, 550, 660, 880].forEach((f, i) => setTimeout(() => tone(f, 'square', 0.16, 0.06), i * 85)),
  freeze:   () => { tone(250, 'sine', 0.5, 0.1, 1400); tone(500, 'sine', 0.4, 0.06, 1800); },
  combo:    (c) => tone(Math.min(1400, 560 + c * 90), 'triangle', 0.09, 0.1),
  whoosh:   () => { noise(0.1, 0.05, 600); tone(400, 'sine', 0.08, 0.05, 700); },
};

// BGM — simple pentatonic loop
let bgmMs = 0, bgmStep = 0;
const MELODY = [392, 440, 494, 523, 587, 523, 494, 392, 349, 392, 440, 523];
function tickBGM(dt) {
  if (!running) return;
  bgmMs -= dt;
  if (bgmMs > 0) return;
  bgmMs = isSugarRush ? 115 : isFrozen ? 560 : 290;
  tone(MELODY[bgmStep++ % MELODY.length] * (isSugarRush ? 1.5 : 1), 'square', 0.22, 0.013);
}

// ═══════════════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, DPR = 1;

// ═══════════════════════════════════════════════════════════════════
//  FOOD RENDERERS — custom canvas art, pre-rendered to offscreen canvases
// ═══════════════════════════════════════════════════════════════════

const CACHE = {};
const CACHE_SIZE = 140; // offscreen canvas size (px)

function makeCache(id, drawFn) {
  const c = document.createElement('canvas');
  c.width = CACHE_SIZE; c.height = CACHE_SIZE;
  const cx = c.getContext('2d');
  cx.translate(CACHE_SIZE / 2, CACHE_SIZE / 2);
  drawFn(cx);
  CACHE[id] = c;
}

// ── BROCCOLI — the hero, lots of detail ──
function drawBroccoli(cx) {
  // Deterministic random for textures
  let seed = 1;
  const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };

  // STALK
  const stalkGrad = cx.createLinearGradient(-6, 14, 6, 40);
  stalkGrad.addColorStop(0, '#e4f0a8');
  stalkGrad.addColorStop(0.4, '#c8d880');
  stalkGrad.addColorStop(1, '#8ba85a');
  cx.fillStyle = stalkGrad;
  cx.beginPath();
  cx.moveTo(-6, 10);
  cx.quadraticCurveTo(-10, 28, -7, 40);
  cx.lineTo(7, 40);
  cx.quadraticCurveTo(10, 28, 6, 10);
  cx.closePath();
  cx.fill();
  // Stalk highlight
  cx.strokeStyle = 'rgba(255,255,255,0.3)';
  cx.lineWidth = 1.2;
  cx.beginPath();
  cx.moveTo(-3, 15); cx.quadraticCurveTo(-5, 28, -3, 38); cx.stroke();
  cx.strokeStyle = 'rgba(90,110,50,0.4)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(4, 15); cx.quadraticCurveTo(6, 28, 4, 38); cx.stroke();

  // FLORETS - layered bumps
  const florets = [
    { x: 0, y: -18, r: 19 },
    { x: -18, y: -9, r: 15 },
    { x: 18, y: -9, r: 15 },
    { x: -12, y: -26, r: 12 },
    { x: 12, y: -26, r: 12 },
    { x: -24, y: 3, r: 11 },
    { x: 24, y: 3, r: 11 },
    { x: 0, y: -33, r: 11 },
    { x: -8, y: -14, r: 9 },
    { x: 8, y: -14, r: 9 },
  ];

  for (const f of florets) {
    // Dark base shadow
    cx.fillStyle = '#1e4212';
    cx.beginPath(); cx.arc(f.x + 1, f.y + 1, f.r, 0, Math.PI * 2); cx.fill();

    // Mid tone (main floret)
    const grd = cx.createRadialGradient(f.x - f.r * 0.3, f.y - f.r * 0.3, f.r * 0.2, f.x, f.y, f.r);
    grd.addColorStop(0, '#7bc04e');
    grd.addColorStop(0.5, '#4e8f2f');
    grd.addColorStop(1, '#2d5a1f');
    cx.fillStyle = grd;
    cx.beginPath(); cx.arc(f.x, f.y, f.r, 0, Math.PI * 2); cx.fill();

    // Highlight
    cx.fillStyle = 'rgba(200,240,150,0.55)';
    cx.beginPath(); cx.arc(f.x - f.r * 0.35, f.y - f.r * 0.4, f.r * 0.28, 0, Math.PI * 2); cx.fill();

    // Texture bumps (deterministic)
    cx.fillStyle = 'rgba(25,55,15,0.55)';
    for (let i = 0; i < 4; i++) {
      const a = rnd() * Math.PI * 2;
      const d = f.r * (0.4 + rnd() * 0.45);
      cx.beginPath();
      cx.arc(f.x + Math.cos(a) * d, f.y + Math.sin(a) * d, 1.5 + rnd() * 1, 0, Math.PI * 2);
      cx.fill();
    }
    // Small highlight bumps
    cx.fillStyle = 'rgba(180,230,130,0.5)';
    for (let i = 0; i < 3; i++) {
      const a = rnd() * Math.PI * 2;
      const d = f.r * (0.2 + rnd() * 0.4);
      cx.beginPath();
      cx.arc(f.x + Math.cos(a) * d, f.y + Math.sin(a) * d - 1, 1.2 + rnd() * 0.8, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // Leaf detail at stalk base
  cx.fillStyle = '#5a8b3a';
  cx.beginPath();
  cx.moveTo(-8, 8); cx.quadraticCurveTo(-14, 5, -10, 0); cx.quadraticCurveTo(-6, 5, -6, 10); cx.closePath();
  cx.fill();
  cx.beginPath();
  cx.moveTo(8, 8); cx.quadraticCurveTo(14, 5, 10, 0); cx.quadraticCurveTo(6, 5, 6, 10); cx.closePath();
  cx.fill();
}

// ── PIZZA SLICE ──
function drawPizza(cx) {
  cx.save();
  cx.rotate(-Math.PI / 6);
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath();
  cx.moveTo(0 + 2, -40 + 2); cx.lineTo(-36 + 2, 34 + 2); cx.lineTo(36 + 2, 34 + 2); cx.closePath(); cx.fill();

  // Crust (bottom edge)
  const crustGrad = cx.createLinearGradient(0, 25, 0, 42);
  crustGrad.addColorStop(0, '#d9a863');
  crustGrad.addColorStop(1, '#8b5e2b');
  cx.fillStyle = crustGrad;
  cx.beginPath();
  cx.moveTo(-36, 34); cx.quadraticCurveTo(0, 48, 36, 34); cx.lineTo(32, 28); cx.quadraticCurveTo(0, 40, -32, 28); cx.closePath();
  cx.fill();

  // Cheese base
  const cheeseGrad = cx.createLinearGradient(0, -40, 0, 34);
  cheeseGrad.addColorStop(0, '#ffd984');
  cheeseGrad.addColorStop(0.6, '#ffbb55');
  cheeseGrad.addColorStop(1, '#e08a2e');
  cx.fillStyle = cheeseGrad;
  cx.beginPath();
  cx.moveTo(0, -38); cx.lineTo(-34, 30); cx.quadraticCurveTo(0, 40, 34, 30); cx.closePath();
  cx.fill();

  // Sauce peeking through (darker red)
  cx.fillStyle = 'rgba(180,30,20,0.45)';
  cx.beginPath(); cx.ellipse(-8, 5, 7, 4, 0.3, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(12, -5, 5, 3, -0.2, 0, Math.PI * 2); cx.fill();

  // Cheese highlights (lighter patches)
  cx.fillStyle = 'rgba(255,240,200,0.5)';
  cx.beginPath(); cx.ellipse(-12, -10, 6, 3, 0.5, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(15, 10, 5, 2.5, -0.3, 0, Math.PI * 2); cx.fill();

  // Pepperoni (dark red discs with shine)
  const peppys = [{ x: -10, y: -8, r: 6 }, { x: 8, y: 0, r: 7 }, { x: -6, y: 14, r: 5 }, { x: 14, y: 18, r: 5 }];
  for (const p of peppys) {
    // Shadow
    cx.fillStyle = 'rgba(0,0,0,0.3)';
    cx.beginPath(); cx.arc(p.x + 1, p.y + 1, p.r, 0, Math.PI * 2); cx.fill();
    // Pepperoni
    cx.fillStyle = '#b5342a';
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#d44';
    cx.beginPath(); cx.arc(p.x, p.y, p.r * 0.85, 0, Math.PI * 2); cx.fill();
    // Grease highlight
    cx.fillStyle = 'rgba(255,220,150,0.6)';
    cx.beginPath(); cx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.35, 0, Math.PI * 2); cx.fill();
    // Grease spots (darker dots)
    cx.fillStyle = 'rgba(80,20,10,0.5)';
    for (let i = 0; i < 3; i++) {
      const a = i * 2.1;
      cx.beginPath(); cx.arc(p.x + Math.cos(a) * p.r * 0.4, p.y + Math.sin(a) * p.r * 0.4, 0.8, 0, Math.PI * 2); cx.fill();
    }
  }

  cx.restore();
}

// ── DONUT ──
function drawDonut(cx) {
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath(); cx.arc(2, 2, 40, 0, Math.PI * 2); cx.fill();

  // Donut base (tan ring)
  const ringGrad = cx.createRadialGradient(-8, -8, 0, 0, 0, 40);
  ringGrad.addColorStop(0, '#e8b67a');
  ringGrad.addColorStop(1, '#a56d35');
  cx.fillStyle = ringGrad;
  cx.beginPath(); cx.arc(0, 0, 40, 0, Math.PI * 2); cx.fill();

  // Hole
  cx.fillStyle = '#050510';
  cx.beginPath(); cx.arc(0, 0, 12, 0, Math.PI * 2); cx.fill();

  // Pink frosting (drippy organic shape)
  cx.save();
  cx.beginPath();
  cx.arc(0, 0, 40, 0, Math.PI * 2);
  cx.arc(0, 0, 12, 0, Math.PI * 2, true);
  cx.clip();

  const frostGrad = cx.createRadialGradient(-10, -10, 0, 0, 0, 40);
  frostGrad.addColorStop(0, '#ffc0dd');
  frostGrad.addColorStop(1, '#ff7eb5');
  cx.fillStyle = frostGrad;
  // Drippy outline
  cx.beginPath();
  const drips = 12;
  for (let i = 0; i <= drips; i++) {
    const a = (Math.PI * 2 / drips) * i;
    const r = 38 + Math.sin(i * 1.7) * 2;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.closePath(); cx.fill();

  // Inner hole edge (frosting dripping into hole)
  cx.fillStyle = '#ff7eb5';
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 / 8) * i;
    cx.beginPath();
    cx.arc(Math.cos(a) * 13, Math.sin(a) * 13, 2.5, 0, Math.PI * 2);
    cx.fill();
  }

  // Sprinkles (deterministic)
  let seed = 11;
  const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
  const colors = ['#ffd700', '#4facfe', '#5ef55e', '#fff', '#a855f7', '#ff4757'];
  for (let i = 0; i < 28; i++) {
    const a = rnd() * Math.PI * 2;
    const d = 17 + rnd() * 20;
    const sa = rnd() * Math.PI;
    cx.save();
    cx.translate(Math.cos(a) * d, Math.sin(a) * d);
    cx.rotate(sa);
    cx.fillStyle = colors[Math.floor(rnd() * colors.length)];
    cx.fillRect(-3.5, -1, 7, 2);
    cx.restore();
  }

  // Top highlight
  cx.fillStyle = 'rgba(255,255,255,0.3)';
  cx.beginPath();
  cx.ellipse(-12, -18, 14, 6, 0.3, 0, Math.PI * 2);
  cx.fill();

  cx.restore();
}

// ── TACO ──
function drawTaco(cx) {
  cx.save();
  cx.rotate(0.1);

  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath();
  cx.moveTo(-38 + 2, 18 + 2); cx.quadraticCurveTo(0 + 2, 26 + 2, 38 + 2, 18 + 2);
  cx.quadraticCurveTo(38 + 2, -22 + 2, 0 + 2, -16 + 2);
  cx.quadraticCurveTo(-38 + 2, -22 + 2, -38 + 2, 18 + 2);
  cx.closePath(); cx.fill();

  // Shell (folded U-shape)
  const shellGrad = cx.createLinearGradient(0, -20, 0, 25);
  shellGrad.addColorStop(0, '#ffd884');
  shellGrad.addColorStop(0.6, '#e8b060');
  shellGrad.addColorStop(1, '#a5722a');
  cx.fillStyle = shellGrad;
  cx.beginPath();
  cx.moveTo(-38, 18);
  cx.quadraticCurveTo(-42, 28, -34, 30);
  cx.quadraticCurveTo(0, 40, 34, 30);
  cx.quadraticCurveTo(42, 28, 38, 18);
  cx.quadraticCurveTo(38, -22, 0, -16);
  cx.quadraticCurveTo(-38, -22, -38, 18);
  cx.closePath();
  cx.fill();

  // Shell texture lines
  cx.strokeStyle = 'rgba(120,70,20,0.5)';
  cx.lineWidth = 0.8;
  for (let i = 0; i < 5; i++) {
    cx.beginPath();
    cx.moveTo(-35 + i * 2, 20 + i); cx.lineTo(-15 + i * 3, 22 + i); cx.stroke();
    cx.beginPath();
    cx.moveTo(15 - i * 3, 22 + i); cx.lineTo(35 - i * 2, 20 + i); cx.stroke();
  }

  // Inside shadow
  cx.fillStyle = 'rgba(80,40,10,0.4)';
  cx.beginPath();
  cx.moveTo(-32, -8); cx.quadraticCurveTo(0, -2, 32, -8); cx.quadraticCurveTo(32, 16, 0, 20); cx.quadraticCurveTo(-32, 16, -32, -8); cx.closePath();
  cx.fill();

  // Meat (brown chunks)
  cx.fillStyle = '#6b3410';
  cx.beginPath(); cx.ellipse(-10, 2, 8, 5, 0.2, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(8, 5, 9, 5, -0.1, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(-2, 8, 7, 4, 0.3, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#8b4420';
  cx.beginPath(); cx.ellipse(-10, 1, 5, 3, 0.2, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.ellipse(8, 4, 6, 3, -0.1, 0, Math.PI * 2); cx.fill();

  // Lettuce (green strips)
  cx.fillStyle = '#5dc92d';
  cx.beginPath(); cx.moveTo(-20, -6); cx.lineTo(-10, -12); cx.lineTo(-14, -4); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(5, -8); cx.lineTo(15, -14); cx.lineTo(10, -3); cx.closePath(); cx.fill();
  cx.fillStyle = '#7de843';
  cx.beginPath(); cx.moveTo(-18, -7); cx.lineTo(-12, -11); cx.lineTo(-14, -5); cx.closePath(); cx.fill();

  // Cheese (yellow shreds)
  cx.strokeStyle = '#ffd700';
  cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(-15, -3); cx.lineTo(-8, -9); cx.stroke();
  cx.beginPath(); cx.moveTo(0, -4); cx.lineTo(6, -10); cx.stroke();
  cx.beginPath(); cx.moveTo(10, -3); cx.lineTo(16, -8); cx.stroke();

  // Tomato (red cubes)
  cx.fillStyle = '#e74c3c';
  cx.fillRect(-5, 0, 3, 3);
  cx.fillRect(3, 3, 3, 3);
  cx.fillStyle = '#ff6655';
  cx.fillRect(-5, 0, 1.5, 1.5);
  cx.fillRect(3, 3, 1.5, 1.5);

  // Shell highlight
  cx.strokeStyle = 'rgba(255,240,180,0.5)';
  cx.lineWidth = 1.2;
  cx.beginPath();
  cx.moveTo(-36, -18); cx.quadraticCurveTo(0, -14, 36, -18);
  cx.stroke();

  cx.restore();
}

// ── APPLE ──
function drawApple(cx) {
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(3, 4, 36, 36, 0, 0, Math.PI * 2); cx.fill();

  // Apple body (red with radial gradient)
  const grd = cx.createRadialGradient(-12, -14, 2, 0, 0, 40);
  grd.addColorStop(0, '#ff8a7a');
  grd.addColorStop(0.3, '#ee3344');
  grd.addColorStop(0.8, '#b81d22');
  grd.addColorStop(1, '#7a0f10');
  cx.fillStyle = grd;
  cx.beginPath();
  // Apple shape (not quite circle - top indent, bottom a bit pointed)
  cx.moveTo(-2, -32);
  cx.bezierCurveTo(-28, -32, -36, -8, -32, 8);
  cx.bezierCurveTo(-30, 28, -10, 36, 0, 32);
  cx.bezierCurveTo(10, 36, 30, 28, 32, 8);
  cx.bezierCurveTo(36, -8, 28, -32, 2, -32);
  cx.bezierCurveTo(2, -26, -2, -26, -2, -32);
  cx.closePath();
  cx.fill();

  // Highlight (glossy top-left)
  const hiGrad = cx.createRadialGradient(-14, -15, 1, -14, -15, 16);
  hiGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
  hiGrad.addColorStop(0.5, 'rgba(255,200,200,0.3)');
  hiGrad.addColorStop(1, 'rgba(255,100,100,0)');
  cx.fillStyle = hiGrad;
  cx.beginPath(); cx.ellipse(-14, -15, 14, 18, 0.3, 0, Math.PI * 2); cx.fill();

  // Subtle streaks (apple surface)
  cx.strokeStyle = 'rgba(120,15,15,0.3)';
  cx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    cx.beginPath();
    cx.moveTo(i * 5, -25);
    cx.quadraticCurveTo(i * 7, 0, i * 4, 28);
    cx.stroke();
  }

  // Stem
  cx.fillStyle = '#3d2410';
  cx.beginPath();
  cx.moveTo(-2, -30); cx.lineTo(0, -40); cx.lineTo(3, -40); cx.lineTo(2, -30);
  cx.closePath(); cx.fill();
  cx.strokeStyle = '#1a0d05';
  cx.lineWidth = 0.5;
  cx.beginPath(); cx.moveTo(0, -40); cx.lineTo(1, -30); cx.stroke();

  // Leaf
  cx.save();
  cx.translate(4, -36); cx.rotate(0.5);
  const leafGrad = cx.createLinearGradient(0, -8, 0, 8);
  leafGrad.addColorStop(0, '#7dd843');
  leafGrad.addColorStop(1, '#3d8a1a');
  cx.fillStyle = leafGrad;
  cx.beginPath();
  cx.moveTo(0, 0); cx.quadraticCurveTo(10, -8, 14, -4); cx.quadraticCurveTo(10, 6, 0, 0); cx.closePath();
  cx.fill();
  cx.strokeStyle = '#2d5a10';
  cx.lineWidth = 0.7;
  cx.beginPath(); cx.moveTo(0, 0); cx.quadraticCurveTo(7, -2, 13, -3); cx.stroke();
  cx.restore();

  // Bottom dimple
  cx.fillStyle = 'rgba(70,10,10,0.4)';
  cx.beginPath(); cx.ellipse(0, 32, 4, 2, 0, 0, Math.PI * 2); cx.fill();
}

// ── CANDY (wrapped) ──
function drawCandy(cx) {
  cx.save();
  cx.rotate(-0.2);
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.25)';
  cx.beginPath(); cx.ellipse(2, 3, 32, 18, 0, 0, Math.PI * 2); cx.fill();

  // Left twist (candy wrapper end)
  cx.fillStyle = '#c97ae0';
  cx.beginPath();
  cx.moveTo(-40, -10); cx.lineTo(-24, -8); cx.lineTo(-18, 0); cx.lineTo(-24, 8); cx.lineTo(-40, 10);
  cx.lineTo(-36, 0); cx.closePath();
  cx.fill();
  // Twist shadow
  cx.strokeStyle = '#a454c0';
  cx.lineWidth = 0.8;
  cx.beginPath(); cx.moveTo(-36, -4); cx.lineTo(-28, -4); cx.stroke();
  cx.beginPath(); cx.moveTo(-36, 0); cx.lineTo(-28, 0); cx.stroke();
  cx.beginPath(); cx.moveTo(-36, 4); cx.lineTo(-28, 4); cx.stroke();

  // Right twist
  cx.fillStyle = '#c97ae0';
  cx.beginPath();
  cx.moveTo(40, -10); cx.lineTo(24, -8); cx.lineTo(18, 0); cx.lineTo(24, 8); cx.lineTo(40, 10);
  cx.lineTo(36, 0); cx.closePath();
  cx.fill();
  cx.strokeStyle = '#a454c0';
  cx.beginPath(); cx.moveTo(36, -4); cx.lineTo(28, -4); cx.stroke();
  cx.beginPath(); cx.moveTo(36, 0); cx.lineTo(28, 0); cx.stroke();
  cx.beginPath(); cx.moveTo(36, 4); cx.lineTo(28, 4); cx.stroke();

  // Main candy body (rounded square)
  const candyGrad = cx.createLinearGradient(0, -18, 0, 18);
  candyGrad.addColorStop(0, '#ffd0f0');
  candyGrad.addColorStop(0.5, '#f093fb');
  candyGrad.addColorStop(1, '#b855d8');
  cx.fillStyle = candyGrad;
  cx.beginPath();
  cx.moveTo(-24, -16); cx.quadraticCurveTo(-28, 0, -24, 16);
  cx.lineTo(24, 16); cx.quadraticCurveTo(28, 0, 24, -16);
  cx.closePath(); cx.fill();

  // Diagonal stripes
  cx.strokeStyle = 'rgba(255,255,255,0.45)';
  cx.lineWidth = 3;
  for (let i = -30; i < 30; i += 10) {
    cx.beginPath(); cx.moveTo(i - 6, -16); cx.lineTo(i + 10, 16); cx.stroke();
  }

  // Highlight
  cx.fillStyle = 'rgba(255,255,255,0.55)';
  cx.beginPath();
  cx.ellipse(-8, -10, 12, 4, -0.2, 0, Math.PI * 2);
  cx.fill();

  cx.restore();
}

// ── ICE CREAM CONE ──
function drawIceCream(cx) {
  // Cone
  const coneGrad = cx.createLinearGradient(-10, 5, 10, 35);
  coneGrad.addColorStop(0, '#d4a75f');
  coneGrad.addColorStop(1, '#8a5a28');
  cx.fillStyle = coneGrad;
  cx.beginPath();
  cx.moveTo(-18, 0); cx.lineTo(0, 42); cx.lineTo(18, 0); cx.closePath();
  cx.fill();

  // Cone waffle pattern
  cx.strokeStyle = 'rgba(90,50,10,0.6)';
  cx.lineWidth = 0.8;
  for (let i = -3; i <= 3; i++) {
    cx.beginPath(); cx.moveTo(-18 + i * 3, 0 + Math.abs(i) * 3); cx.lineTo(0 + i * 1.5, 42); cx.stroke();
  }
  for (let i = 1; i <= 3; i++) {
    cx.beginPath(); cx.moveTo(-18 + i * 4, 0 + i * 5); cx.lineTo(18 - i * 4, 0 + i * 5); cx.stroke();
  }

  // Scoop 1 (blueberry - blue)
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath(); cx.arc(2, -6, 22, 0, Math.PI * 2); cx.fill();
  const s1Grad = cx.createRadialGradient(-6, -12, 2, 0, -6, 22);
  s1Grad.addColorStop(0, '#c8e8ff');
  s1Grad.addColorStop(0.6, '#6bb6ff');
  s1Grad.addColorStop(1, '#2060c0');
  cx.fillStyle = s1Grad;
  cx.beginPath(); cx.arc(0, -6, 22, 0, Math.PI * 2); cx.fill();
  // Drips
  cx.fillStyle = '#4a8ddc';
  cx.beginPath(); cx.moveTo(-16, 5); cx.quadraticCurveTo(-18, 8, -14, 10); cx.quadraticCurveTo(-12, 6, -16, 5); cx.fill();
  cx.beginPath(); cx.moveTo(14, 4); cx.quadraticCurveTo(18, 8, 15, 11); cx.quadraticCurveTo(11, 7, 14, 4); cx.fill();

  // Scoop 2 (pink strawberry)
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.beginPath(); cx.arc(2, -28, 19, 0, Math.PI * 2); cx.fill();
  const s2Grad = cx.createRadialGradient(-5, -34, 1, 0, -28, 19);
  s2Grad.addColorStop(0, '#ffd0dc');
  s2Grad.addColorStop(0.6, '#ff8ba8');
  s2Grad.addColorStop(1, '#c94070');
  cx.fillStyle = s2Grad;
  cx.beginPath(); cx.arc(0, -28, 19, 0, Math.PI * 2); cx.fill();

  // Cherry on top
  cx.fillStyle = '#8b0000';
  cx.beginPath(); cx.arc(-1, -48, 2, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = '#e63946';
  cx.beginPath(); cx.arc(0, -49, 5, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.6)';
  cx.beginPath(); cx.arc(-2, -51, 1.5, 0, Math.PI * 2); cx.fill();
  // Stem
  cx.strokeStyle = '#5a8b3a';
  cx.lineWidth = 1.2;
  cx.beginPath(); cx.moveTo(2, -52); cx.quadraticCurveTo(6, -56, 8, -52); cx.stroke();

  // Sprinkle on top scoop
  const sprCol = ['#fff', '#ffd700', '#5ef55e'];
  for (let i = 0; i < 6; i++) {
    const a = i * 1.2;
    const d = 10 + i;
    cx.save();
    cx.translate(Math.cos(a) * d, -28 + Math.sin(a) * d * 0.7);
    cx.rotate(a);
    cx.fillStyle = sprCol[i % 3];
    cx.fillRect(-2, -0.5, 4, 1);
    cx.restore();
  }
}

// ── HEART ──

// ── STAR ──
function drawStar(cx) {
  // Star points
  const outer = 34, inner = 14, spikes = 5;
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.3)';
  cx.save(); cx.translate(2, 3);
  cx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = (Math.PI / spikes) * i - Math.PI / 2;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.closePath(); cx.fill();
  cx.restore();

  // Gradient star
  const grd = cx.createRadialGradient(-8, -10, 2, 0, 0, outer);
  grd.addColorStop(0, '#fff8c0');
  grd.addColorStop(0.5, '#ffd75a');
  grd.addColorStop(1, '#d47a00');
  cx.fillStyle = grd;
  cx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = (Math.PI / spikes) * i - Math.PI / 2;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.closePath(); cx.fill();

  // Outline
  cx.strokeStyle = '#8b5a00';
  cx.lineWidth = 1.2;
  cx.stroke();

  // Inner highlight
  cx.fillStyle = 'rgba(255,255,255,0.55)';
  cx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = (i % 2 === 0 ? outer : inner) * 0.5;
    const a = (Math.PI / spikes) * i - Math.PI / 2;
    const x = Math.cos(a) * r - 6, y = Math.sin(a) * r - 8;
    if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.closePath(); cx.fill();

  // Sparkle
  cx.fillStyle = '#fff';
  cx.beginPath(); cx.arc(-10, -14, 2, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.arc(8, 4, 1.5, 0, Math.PI * 2); cx.fill();
}

// ── BOMB (static body; fuse spark drawn live) ──
function drawBomb(cx) {
  // Shadow
  cx.fillStyle = 'rgba(0,0,0,0.4)';
  cx.beginPath(); cx.arc(3, 4, 30, 0, Math.PI * 2); cx.fill();

  // Bomb body (dark sphere with subtle metallic shine)
  const grd = cx.createRadialGradient(-10, -12, 2, 0, 0, 32);
  grd.addColorStop(0, '#666a70');
  grd.addColorStop(0.3, '#2a2d35');
  grd.addColorStop(0.8, '#0e0e15');
  grd.addColorStop(1, '#000');
  cx.fillStyle = grd;
  cx.beginPath(); cx.arc(0, 0, 30, 0, Math.PI * 2); cx.fill();

  // Main highlight (glossy)
  const hi = cx.createRadialGradient(-12, -14, 0, -12, -14, 16);
  hi.addColorStop(0, 'rgba(255,255,255,0.6)');
  hi.addColorStop(1, 'rgba(255,255,255,0)');
  cx.fillStyle = hi;
  cx.beginPath(); cx.ellipse(-12, -14, 12, 14, 0.3, 0, Math.PI * 2); cx.fill();

  // Tiny reflections
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.beginPath(); cx.arc(10, 12, 2, 0, Math.PI * 2); cx.fill();
  cx.beginPath(); cx.arc(-18, 8, 1.5, 0, Math.PI * 2); cx.fill();

  // Rim
  cx.strokeStyle = 'rgba(80,80,90,0.8)';
  cx.lineWidth = 1;
  cx.beginPath(); cx.arc(0, 0, 30, 0, Math.PI * 2); cx.stroke();

  // Fuse cap (top)
  cx.fillStyle = '#3a2a1a';
  cx.fillRect(-5, -32, 10, 6);
  cx.strokeStyle = '#1a0f05';
  cx.lineWidth = 0.5;
  cx.strokeRect(-5, -32, 10, 6);

  // Fuse wire
  cx.strokeStyle = '#c0a060';
  cx.lineWidth = 2.5;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(0, -32); cx.quadraticCurveTo(8, -38, 6, -44); cx.quadraticCurveTo(4, -50, 8, -52);
  cx.stroke();
  cx.strokeStyle = '#8b6d40';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(0, -32); cx.quadraticCurveTo(8, -38, 6, -44); cx.quadraticCurveTo(4, -50, 8, -52);
  cx.stroke();
}

  { id: 'bomb',     pts: 0,  col: '#ff3333', glow: '#e74c3c', r: 44, bomb: true,  w: 0  },
];
function pickFood(bombChance) {
  if (Math.random() < bombChance) return FOODS.find(f => f.bomb);
  const pool = FOODS.filter(f => !f.bomb);
  const total = pool.reduce((s, f) => s + f.w, 0);
  let roll = Math.random() * total;
  for (const f of pool) { roll -= f.w; if (roll <= 0) return f; }
  return pool[0];
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  kenzie.y = H - 34 - 100; // above safe area
  initStars(); initMountains(); initBlossoms(); initLanterns();
}

//  BACKGROUND — japanese shrine night
