<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
    <title>Riley vs Kenzie - Definitive Edition</title>
    <style>
        * {
            box-sizing: border-box
        }
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #000008;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: crosshair;
        }
        canvas {
            position: fixed;
            inset: 0;
            display: block;
            background: #000008;
            image-rendering: auto;
        }
        .screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 40%, rgba(100, 20, 200, .28) 0%, rgba(4, 2, 16, .985) 70%);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .hidden {
            display: none !important
        }
        .title {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: clamp(38px, 9vw, 76px);
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin: 0 0 6px;
            text-shadow: 0 0 30px #ff4cf0, 0 0 70px #8d2fff, 0 0 120px rgba(180, 40, 255, .7), 0 6px 20px rgba(0, 0, 0, .9);
            letter-spacing: -1px;
        }
        .sub {
            font-size: clamp(12px, 3vw, 17px);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .7);
            margin: 0 0 22px;
            text-shadow: 0 0 20px rgba(200, 150, 255, .5);
        }
        .howto {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 960px;
            margin-bottom: 20px;
        }
        .tip {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, .75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all .2s;
        }
        .tip:hover {
            border-color: rgba(255, 255, 255, .3);
            background: rgba(255, 255, 255, .1);
        }
        .tip strong {
            display: block;
            font-size: 20px;
            color: #fff;
            margin-bottom: 2px;
        }
        .btn-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 6px;
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 14px 32px;
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-size: clamp(14px, 4vw, 20px);
            cursor: pointer;
            transition: transform .1s, filter .2s, box-shadow .2s;
            position: relative;
            overflow: hidden;
        }
        button::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255, 255, 255, .2) 0%, transparent 60%);
            pointer-events: none;
        }
        button:hover {
            filter: brightness(1.15);
            transform: translateY(-2px);
        }
        button:active {
            transform: scale(.94);
            filter: brightness(.9);
        }
        .btn-easy {
            background: linear-gradient(135deg, #00c6ff, #0060d0);
            box-shadow: 0 8px 28px rgba(0, 180, 255, .5), 0 2px 8px rgba(0, 0, 0, .4);
        }
        .btn-medium {
            background: linear-gradient(135deg, #f093fb, #e04070);
            box-shadow: 0 8px 28px rgba(240, 80, 130, .5), 0 2px 8px rgba(0, 0, 0, .4);
        }
        .btn-hard {
            background: linear-gradient(135deg, #ff416c, #e02020);
            box-shadow: 0 8px 28px rgba(255, 60, 80, .5), 0 2px 8px rgba(0, 0, 0, .4);
        }
        .btn-primary {
            background: linear-gradient(135deg, #9b00ff, #00d4ff);
            box-shadow: 0 8px 28px rgba(140, 0, 255, .5), 0 2px 8px rgba(0, 0, 0, .4);
        }
        .hs {
            font-size: 15px;
            color: #ffd700;
            font-weight: 800;
            background: rgba(255, 215, 0, .1);
            border: 1px solid rgba(255, 215, 0, .3);
            padding: 8px 20px;
            border-radius: 999px;
            margin-top: 16px;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255, 200, 0, .6);
        }
        #hud {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        .hud-box {
            position: absolute;
            background: rgba(8, 6, 24, .55);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 18px;
            padding: 12px 20px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .08);
        }
        .hud-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, .5);
            text-transform: uppercase;
            font-weight: 800;
        }
        .hud-value {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, .4);
        }
        #scoreBox {
            top: 14px;
            left: 14px;
        }
        #waveBox {
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        #lifeBox {
            top: 14px;
            right: 14px;
            text-align: right;
        }
        #lives {
            font-size: 26px;
            letter-spacing: 3px;
            text-shadow: 0 0 16px rgba(255, 60, 90, .6);
        }
        #combo {
            font-size: 15px;
            color: #ffeb3b;
            font-weight: 900;
            min-height: 20px;
            text-shadow: 0 0 16px rgba(255, 170, 0, .9);
            margin-top: 2px;
        }
        #powerWrap {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            width: min(260px, 65vw);
        }
        #powerLabel {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, .6);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 800;
        }
        #powerBar {
            height: 10px;
            background: rgba(255, 255, 255, .06);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .15);
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, .5);
        }
        #powerFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00e0ff, #4fa0ff, #b040ff);
            border-radius: 999px;
            transition: width .15s;
            box-shadow: 0 0 16px rgba(100, 200, 255, .6);
        }
        #powerFill.rush {
            background: linear-gradient(90deg, #ff4080, #ff6b30, #ffe040);
            box-shadow: 0 0 22px rgba(255, 80, 60, .9);
            animation: pulseBar .5s ease-in-out infinite;
        }
        @keyframes pulseBar {
            0%,
            100% {
                filter: brightness(1)
            }
            50% {
                filter: brightness(1.4)
            }
        }
        #pills {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .pill {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .4);
        }
        .freeze {
            background: rgba(110, 200, 255, .95);
            color: #001a2e;
        }
        .shield {
            background: rgba(255, 215, 60, .95);
            color: #2e1c00;
        }
        .rush {
            background: rgba(255, 80, 100, .95);
            color: #fff;
        }
        #ann,
        #taunt,
        #action {
            position: fixed;
            left: 50%;
            transform: translate(-50%, -50%) scale(.6);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            text-align: center;
            transition: all .3s cubic-bezier(.175, .885, .32, 1.3);
        }
        #ann {
            top: 40%;
        }
        #ann.show,
        #taunt.show,
        #action.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1)
        }
        #annTitle {
            font-family: 'Georgia', serif;
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            letter-spacing: -1px;
        }
        #annSub {
            font-size: 17px;
            color: rgba(255, 255, 255, .85);
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 2px;
        }
        #taunt {
            top: 27%;
            font-size: clamp(22px, 5vw, 44px);
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
            max-width: 90vw;
            text-shadow: 0 0 24px #ff0050, 0 0 50px rgba(255, 0, 70, .7), 0 4px 14px rgba(0, 0, 0, .9);
        }
        #action {
            top: 50%;
            font-family: 'Georgia', serif;
            font-size: clamp(52px, 12vw, 110px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px #ff0060, 0 0 70px #ff0060, 5px 5px 0 #000;
            letter-spacing: -2px;
        }
        .stat-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 14px 0 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 16px;
            padding: 10px 18px;
            min-width: 120px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .stat-val {
            font-size: 34px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 200, 0, .7);
        }
        .stat-lbl {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, .45);
            text-transform: uppercase;
            font-weight: 700;
        }
        .new-hs {
            font-size: 19px;
            font-weight: 900;
            color: #ffd700;
            background: rgba(255, 215, 0, .1);
            border: 1px solid rgba(255, 215, 0, .4);
            padding: 8px 24px;
            border-radius: 999px;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(255, 200, 0, .8);
            animation: bounceHs .6s ease-in-out infinite alternate;
        }
        @keyframes bounceHs {
            0% {
                transform: scale(1)
            }
            100% {
                transform: scale(1.06)
            }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <div id="start" class="screen">
        <div class="title">Riley vs Kenzie</div>
        <div class="sub">Definitive Edition</div>
        <div class="howto">

    <script>
        'use strict';

        const $ = id => document.getElementById(id);

        const CONFIG = {
            maxLives: 3,
            gravityBase: 0.26,
            trailMax: 22,
            storageKey: 'riley-vs-kenzie-definitive-v2',
            levels: {
                easy: { spawnMs: 750, bombChance: 0.06, stinkChance: 0.03, speed: 0.92, waveGoal: 10 },
                medium: { spawnMs: 590, bombChance: 0.10, stinkChance: 0.05, speed: 1.04, waveGoal: 12 },
                hard: { spawnMs: 460, bombChance: 0.15, stinkChance: 0.08, speed: 1.18, waveGoal: 14 }
            },
            taunts: [
                "Dance around my blade, Riley!",

                "Stealth mode engaged — you're too loud!",

                "That slash was off-beat, rookie!",
                "My katana has better timing than you!",

                "Too slow for my ninja flips!",

            ],
            bombTaunts: ['Boom goes the rhythm!', 'Explosive dance party!', 'You danced right into that one!',
                'Kaboom on the dance floor!'],
            stinkTaunts: ['Ewww, stink bomb!', 'That reeks, Riley!', 'Fart cloud of doom!', 'Smells like defeat!',
                'Toxic! Absolutely toxic!'],

                'Witness true blade ballet!', 'My wrath has perfect timing!']
        };

        class AudioEngine {
            constructor() { this.ctx = null;
                this.master = null;
                this.ready = false; }
            async init() {
                if (!this.ctx) {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.master.gain.value = 0.75;
                    this.master.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') await this.ctx.resume();
                this.ready = true;
            }
            tone(type, start, end, duration, volume, detune = 0) {
                if (!this.ready) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.detune.value = detune;
                osc.frequency.setValueAtTime(Math.max(20, start), t);
                osc.frequency.exponentialRampToValueAtTime(Math.max(20, end), t + duration);
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.linearRampToValueAtTime(volume, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                osc.connect(gain);
                gain.connect(this.master);
                osc.start(t);
                osc.stop(t + duration + 0.03);
            }
            noise(duration, volume, hp) {
                if (!this.ready) return;
                const t = this.ctx.currentTime;
                const size = Math.floor(this.ctx.sampleRate * duration);
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
                const src = this.ctx.createBufferSource();
                const filter = this.ctx.createBiquadFilter();
                const gain = this.ctx.createGain();
                src.buffer = buffer;
                filter.type = 'highpass';
                filter.frequency.value = hp;
                gain.gain.setValueAtTime(volume, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                src.connect(filter);
                filter.connect(gain);
                gain.connect(this.master);
                src.start(t);
                src.stop(t + duration + 0.03);
            }
            play(name, combo = 1) {
                if (!this.ready) return;
                if (name === 'slash') { this.tone('triangle', 1200, 200, 0.1, 0.08);
                    this.noise(0.04, 0.04, 2800); } else if (name === 'hit') { this.tone('square', 1400, 180, 0.11,
                    0.1);
                    this.noise(0.05, 0.07, 2200); } else if (name === 'crit') { this.tone('square', 1800, 400, 0.14,
                        0.13);
                    this.tone('triangle', 2200, 600, 0.1, 0.06);
                    this.noise(0.03, 0.06, 3000); } else if (name === 'bomb') { this.tone('sawtooth', 140, 28, 0.6,
                    0.16);
                    this.noise(0.4, 0.14, 80); } else if (name === 'stinkbomb') { this.tone('sawtooth', 60, 20,
                    0.7, 0.12);
                    this.tone('square', 90, 30, 0.5, 0.08);
                    this.noise(0.5, 0.16, 40); } else if (name === 'power') { [440, 550, 660, 880].forEach((f, i) =>
                        setTimeout(() => this.tone('triangle', f, f, 0.1, 0.05), i * 45)); } else if (name ===
                    'freeze') { this.tone('sine', 1600, 200, 0.45, 0.07); } else if (name === 'life') { [523, 659,
                    784
                ].forEach((f, i) => setTimeout(() => this.tone('sine', f, f, 0.13, 0.05), i * 50)); } else if (name ===
                    'wave') { [330, 440, 550, 660].forEach((f, i) => setTimeout(() => this.tone('square', f, f, 0.13,
                        0.04), i * 70)); } else if (name === 'combo') { this.tone('triangle', Math.min(1800, 600 +
                        combo * 100), 380, 0.07, 0.06); } else if (name === 'poop') { this.tone('square', 180, 300,
                    0.2, 0.05);
                    this.tone('triangle', 350, 150, 0.18, 0.04); } else if (name === 'boss') { this.tone('square',
                    200, 90, 0.5, 0.09);
                    this.noise(0.15, 0.05, 120); } else if (name === 'bgm') { this.tone('square', combo, combo,
                    0.2, 0.01); } else if (name === 'ult') { [220, 330, 440, 550, 660, 880].forEach((f, i) =>
                    setTimeout(() => this.tone('sawtooth', f, f * 1.4, 0.14, 0.08), i * 30));
                    this.noise(0.2, 0.1, 200); }
            }
        }

        class VoiceEngine {
            constructor() {
                this.enabled = 'speechSynthesis' in window;
                this.voices = [];
                this.ready = false;
                this.unlocked = false;
                this.lastSpeak = 0;
            }
            init() {
                if (!this.enabled) return;
                this.loadVoices();
                if (!this.voices.length) {
                    try { speechSynthesis.onvoiceschanged = () => this.loadVoices(); } catch {}
                    setTimeout(() => this.loadVoices(), 400);
                }
                this.ready = true;
            }
            loadVoices() { try { this.voices = speechSynthesis.getVoices() || []; } catch { this.voices = []; } }
            pick() {
                const preferred = this.voices.find(v => v.lang && v.lang.startsWith('en') &&
                    /samantha|victoria|karen|zira|ava|allison|moira|fiona/i.test(v.name));
                return preferred || this.voices.find(v => v.lang && v.lang.startsWith('en-US')) || this.voices.find(
                    v => v.lang && v.lang.startsWith('en')) || null;
            }
            unlock() {
                if (!this.enabled) return false;
                try {
                    this.loadVoices();
                    speechSynthesis.cancel();
                    speechSynthesis.resume();
                    this.unlocked = true;
                    return true;
                } catch { return false; }
            }
            speakNow(text, opts = {}) {
                if (!this.enabled || !text) return false;
                if (!this.ready) this.init();
                try {
                    const now = performance.now();
                    const minGap = opts.minGap == null ? 220 : opts.minGap;
                    if (now - this.lastSpeak < minGap) return false;
                    this.lastSpeak = now;
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'en-US';
                    u.rate = opts.rate == null ? 1.0 : opts.rate;
                    u.pitch = opts.pitch == null ? 1.5 : opts.pitch;
                    u.volume = opts.volume == null ? 1.0 : opts.volume;
                    const voice = this.pick();
                    if (voice) u.voice = voice;
                    if (opts.cancel !== false) speechSynthesis.cancel();
                    speechSynthesis.speak(u);
                    speechSynthesis.resume();
                    return true;
                } catch { return false; }
            }
            speak(text, opts = {}) { return this.speakNow(text, opts); }
            test() {
                this.unlock();
                return this.speakNow("Riley, let's see what you've got.", { minGap: 0, rate: 1.0, pitch: 1.5,
                volume: 1.0 });
            }
            stop() { if (this.enabled) try { speechSynthesis.cancel(); } catch {} }
        }

        class AssetManager {
            constructor() { this.size = 172;
                this.cache = {}; }
            init() {

        class Game {

                    this.starField.push({

                document.querySelectorAll('[data-level]').forEach(btn => btn.addEventListener('click', (e) => {

            bindInput() {
                this.pointerDown = false;
                this.lastPoint = null;
                this.trail = [];
                this.swipeVelocity = 0;
                const start = (x, y) => { this.pointerDown = true;
                    this.lastPoint = { x, y };
                    this.trail.push({ x, y, life: 1, vel: 0, time: performance.now() });
                    this.audio.play('slash'); };
                const move = (x, y) => {
                    if (!this.pointerDown || this.state !== 'playing' || !this.lastPoint) return;
                    const p1 = this.lastPoint;
                    const p2 = { x, y };
                    const dx = p2.x - p1.x;
                    const dy = p2.y - p1.y;
                    this.swipeVelocity = Math.sqrt(dx * dx + dy * dy);
                    this.sliceBetween(p1, p2);
                    this.lastPoint = p2;
                    this.trail.push({ x, y, life: 1, vel: this.swipeVelocity, time: performance.now() });
                    if (this.trail.length > (this.isMobile ? 14 : CONFIG.trailMax)) this.trail.shift();
                };
                const end = () => { this.pointerDown = false;
                    this.lastPoint = null;
                    this.swipeVelocity = 0; };
                this.canvas.addEventListener('pointerdown', e => start(e.clientX, e.clientY));
                this.canvas.addEventListener('pointermove', e => move(e.clientX, e.clientY));
                addEventListener('pointerup', end);
                addEventListener('pointercancel', end);

            spawnObject(type, x, y, vx, vy) {
                const defs = {
                    broccoli: { r: 28, score: 10, sprite: 'broccoli', color: '#5ec92d' },
                    pizza: { r: 28, score: 14, sprite: 'pizza', color: '#ffb455' },
                    donut: { r: 28, score: 16, sprite: 'donut', color: '#ff7eb5' },
                    candy: { r: 24, score: 18, sprite: 'candy', color: '#d98cff' },
                    poop: { r: 26, score: 25, sprite: 'poop', color: '#8a5028' },
                    bomb: { r: 30, score: 0, sprite: 'bomb', color: '#ff5555' },
                    stinkbomb: { r: 32, score: 0, sprite: 'stinkbomb', color: '#80b030' },
                    freeze: { r: 24, score: 0, sprite: 'freeze', color: '#a6f0ff', power: 'freeze' },
                    shield: { r: 24, score: 0, sprite: 'shield', color: '#ffe05a', power: 'shield' },
                    heart: { r: 24, score: 0, sprite: 'heart', color: '#ff516d', power: 'heart' }
                };
                this.objects.push(Object.assign({ type, x, y, vx, vy, rot: Math.random() * Math.PI * 2, vr: (Math

            spawn() {
                const bossWave = this.wave % 5 === 0;
                const x = this.w * 0.1 + Math.random() * this.w * 0.8;
                const y = this.h + 70;
                const speed = this.cfg.speed * (1 + Math.min(0.5, (this.wave - 1) * 0.03)) * (this.isFrozen ? 0.55 :
                    1);
                const vx = (Math.random() - 0.5) * 5 * speed;
                const vy = -(12 + Math.random() * 5 + (bossWave ? 2 : 0)) * speed;
                const r = Math.random();
                const stinkC = this.cfg.stinkChance + (bossWave ? 0.04 : 0.0);
                const bombC = this.cfg.bombChance + (bossWave ? 0.10 : 0.0);
                if (r < 0.02) return this.spawnObject('heart', x, y, vx, vy);
                if (r < 0.06) return this.spawnObject('freeze', x, y, vx, vy);
                if (r < 0.10) return this.spawnObject('shield', x, y, vx, vy);
                if (r < 0.14) return this.spawnObject('poop', x, y, vx, vy);
                if (r < 0.14 + stinkC) return this.spawnObject('stinkbomb', x, y, vx, vy);
                if (r < 0.14 + stinkC + bombC) return this.spawnObject('bomb', x, y, vx, vy);
                const f = Math.random();

            }
            drawObjects(c) {
                for (const o of this.objects) {
                    c.save();
                    c.translate(o.x, o.y);
                    c.rotate(o.rot);
                    if (o.type === 'bomb') { c.shadowColor = 'rgba(255,70,40,.6)';
                        c.shadowBlur = 18 + Math.sin(o.glowPhase) * 8; }
                    if (o.type === 'stinkbomb') { c.shadowColor = 'rgba(140,220,60,.7)';
                        c.shadowBlur = 20 + Math.sin(o.glowPhase) * 10; }
                    if (o.type === 'poop') { c.shadowColor = 'rgba(180,130,80,.5)';
                        c.shadowBlur = 14 + Math.sin(o.glowPhase) * 6; }
                    const img = this.assets.get(o.sprite);
                    const size = o.r * 2.7;
                    if (img) c.drawImage(img, -size / 2, -size / 2, size, size);
                    if (this.freezeOverlay > 0.3 && o.power !== 'freeze') {
                        c.globalAlpha = this.freezeOverlay * 0.35;
                        c.fillStyle = '#c8f0ff';
                        c.beginPath();
                        c.arc(0, 0, o.r, 0, Math.PI * 2);
                        c.fill();
                        c.globalAlpha = 1;
                    }
                    c.shadowBlur = 0;
                    c.restore();
                }
            }
            drawFX(c) {
                for (const sc of this.stinkClouds) {
                    const grd = c.createRadialGradient(sc.x, sc.y, sc.r * 0.2, sc.x, sc.y, sc.r);
                    grd.addColorStop(0, 'rgba(180,240,80,' + (sc.alpha * 0.6) + ')');
                    grd.addColorStop(0.5, 'rgba(120,180,40,' + (sc.alpha * 0.35) + ')');
                    grd.addColorStop(1, 'rgba(60,100,20,0)');
                    c.fillStyle = grd;
                    c.beginPath();
                    c.arc(sc.x, sc.y, sc.r, 0, Math.PI * 2);
                    c.fill();
                }
                for (const sw of this.shockwaves) { c.globalAlpha = sw.life * 0.55;
                    c.strokeStyle = sw.color;
                    c.lineWidth = 7 * sw.life;
                    c.shadowColor = sw.color;
                    c.shadowBlur = 22;
                    c.beginPath();
                    c.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
                    c.stroke();
                    c.shadowBlur = 0; }
                for (const p of this.particles) { c.globalAlpha = p.life;
                    c.fillStyle = p.color; if (p.glow) { c.shadowColor = p.color;
                        c.shadowBlur = p.stink ? 16 : 12; } if (p.spark) c.fillRect(p.x, p.y, p.size * 2.8, 1.8);
                    else { c.beginPath();
                        c.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        c.fill(); }
                    c.shadowBlur = 0; }
                for (const sf of this.snowflakes) {
                    c.globalAlpha = sf.life * 0.8;
                    c.fillStyle = '#e8f8ff';
                    c.shadowColor = '#c0f0ff';
                    c.shadowBlur = 6;
                    c.save();
                    c.translate(sf.x, sf.y);
                    c.rotate(sf.rot);
                    for (let i = 0; i < 6; i++) {
                        c.save();
                        c.rotate(i * Math.PI / 3);
                        c.beginPath();
                        c.moveTo(0, 0);
                        c.lineTo(0, -sf.size);
                        c.lineTo(sf.size * 0.3, -sf.size * 0.4);
                        c.lineTo(0, -sf.size * 0.6);
                        c.fill();
                        c.restore();
                    }
                    c.restore();
                    c.shadowBlur = 0;
                }
                for (const f of this.floaters) { c.globalAlpha = f.life;
                    c.font = '900 ' + (f.size + Math.sin(f.bouncePhase) * 3.5) + 'px Georgia, serif';
                    c.textAlign = 'center';
                    c.lineWidth = 5.5;
                    c.strokeStyle = '#000';
                    c.shadowColor = 'rgba(0,0,0,.85)';
                    c.shadowBlur = 9;
                    c.strokeText(f.text, f.x, f.y);
                    c.shadowBlur = 0;
                    c.fillStyle = f.color;
                    c.shadowColor = f.color;
                    c.shadowBlur = 16;
                    c.fillText(f.text, f.x, f.y);
                    c.shadowBlur = 0; }
                for (const r of this.rings) { c.globalAlpha = r.life;
                    c.strokeStyle = r.color;
                    c.lineWidth = 5.5;
                    c.shadowColor = r.color;
                    c.shadowBlur = 9;
                    c.beginPath();
                    c.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                    c.stroke();
                    c.shadowBlur = 0; }
                c.globalAlpha = 1;
            }
            drawTrail(c) {
                if (this.trail.length < 2) return;
                c.lineCap = 'round';
                for (let i = 1; i < this.trail.length; i++) {
                    const a = this.trail[i - 1],
                        b = this.trail[i],
                        alpha = b.life;
                    const mx = (a.x + b.x) / 2,
                        my = (a.y + b.y) / 2;
                    const dx = b.x - a.x,
                        dy = b.y - a.y;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / len,
                        ny = dx / len;
                    const bladeWidth = 16 + b.vel * 0.3;
                    c.globalAlpha = alpha;
                    c.shadowColor = '#40d0ff';
                    c.shadowBlur = 28;
                    c.fillStyle = '#ffffff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth * 0.3, a.y + ny * bladeWidth * 0.3);
                    c.lineTo(b.x + nx * bladeWidth * 0.3, b.y + ny * bladeWidth * 0.3);
                    c.lineTo(b.x - nx * bladeWidth * 0.3, b.y - ny * bladeWidth * 0.3);
                    c.lineTo(a.x - nx * bladeWidth * 0.3, a.y - ny * bladeWidth * 0.3);
                    c.closePath();
                    c.fill();
                    c.globalAlpha = alpha * 0.8;
                    c.fillStyle = '#e0f8ff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth * 0.55, a.y + ny * bladeWidth * 0.55);
                    c.lineTo(mx + nx * bladeWidth * 0.7, my + ny * bladeWidth * 0.7);
                    c.lineTo(mx - nx * bladeWidth * 0.7, my - ny * bladeWidth * 0.7);
                    c.lineTo(a.x - nx * bladeWidth * 0.55, a.y - ny * bladeWidth * 0.55);
                    c.closePath();
                    c.fill();
                    c.globalAlpha = alpha * 0.5;
                    c.fillStyle = '#80e8ff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth, a.y + ny * bladeWidth);
                    c.lineTo(b.x + nx * bladeWidth, b.y + ny * bladeWidth);
                    c.lineTo(b.x - nx * bladeWidth, b.y - ny * bladeWidth);
                    c.lineTo(a.x - nx * bladeWidth, a.y - ny * bladeWidth);
                    c.closePath();
                    c.fill();
                    c.globalAlpha = alpha * 0.2;
                    c.fillStyle = '#40d0ff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth * 1.5, a.y + ny * bladeWidth * 1.5);
                    c.lineTo(b.x + nx * bladeWidth * 1.5, b.y + ny * bladeWidth * 1.5);
                    c.lineTo(b.x - nx * bladeWidth * 1.5, b.y - ny * bladeWidth * 1.5);
                    c.lineTo(a.x - nx * bladeWidth * 1.5, a.y - ny * bladeWidth * 1.5);
                    c.closePath();
                    c.fill();
                }
                c.shadowBlur = 0;
                c.globalAlpha = 1;
            }
            render() {
                const c = this.ctx;
                c.save();
                if (this.shakeIntensity > 0.5) c.translate((Math.random() - 0.5) * this.shakeIntensity, (Math.random() -
                    0.5) * this.shakeIntensity);
                this.drawBackground(c);
                this.drawKenzie(c);
                this.drawObjects(c);
                this.drawFX(c);
                this.drawTrail(c);
                if (this.screenFlash > 0) { c.globalAlpha = this.screenFlash / 12;
                    c.fillStyle = '#ffffff';
                    c.fillRect(0, 0, this.w, this.h);
                    c.globalAlpha = 1; }
                c.restore();
            }
            loop(ts) {
                const dt = Math.min(50, ts - (this.lastTime || ts));
                this.lastTime = ts;
                this.update(dt);
                this.render();
                requestAnimationFrame(t => this.loop(t));
            }
        }

        window.game = new Game();
    </script>
</body>
