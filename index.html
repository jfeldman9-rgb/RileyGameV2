function initStars() {
  stars = Array.from({ length: 240 }, () => ({
    x: Math.random() * W, y: Math.random() * H * 0.6,
    r: Math.random() * 1.8 + 0.2,
    vy: Math.random() * 0.12 + 0.02,
    phase: Math.random() * Math.PI * 2,
    bright: Math.random(),
  }));
}
function initMountains() {
  mountains = [];
  for (let layer = 0; layer < 3; layer++) {
    const pts = [];
    const baseY = H * (0.58 + layer * 0.10);
    const segW = 70 + layer * 25;
    const amp = 90 - layer * 20;
    for (let x = -segW; x <= W + segW; x += segW * 0.3) {
      pts.push({ x, y: baseY - Math.random() * amp - layer * 15 - Math.sin(x * 0.01 + layer) * 25 });
    }
    mountains.push({ pts, color: `rgba(${18 + layer * 14},${14 + layer * 12},${38 + layer * 18},${0.7 - layer * 0.18})` });
  }
}
function initBlossoms() {
  blossoms = Array.from({ length: 40 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 3 + 2,
    vx: (Math.random() - 0.3) * 0.6,
    vy: Math.random() * 0.4 + 0.2,
    phase: Math.random() * Math.PI * 2,
    rot: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.02,
  }));
}
function initLanterns() {
  // Paper lanterns hanging near the top
  lanterns = [
    { x: W * 0.12, y: H * 0.15, phase: 0 },
    { x: W * 0.88, y: H * 0.12, phase: 1.5 },
  ];
}

function drawBackground(ts) {
  // Deep sky gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.3, '#0a0a2a');
  bg.addColorStop(0.6, '#13082e');
  bg.addColorStop(1, '#1a0920');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Nebula
  const neb = ctx.createRadialGradient(W * 0.3 + Math.sin(ts / 8000) * 40, H * 0.2, 0, W * 0.3, H * 0.2, H * 0.4);
  neb.addColorStop(0, 'rgba(150,50,220,0.07)');
  neb.addColorStop(0.5, 'rgba(80,20,160,0.03)');
  neb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb; ctx.fillRect(0, 0, W, H);

  // Stars with twinkle
  const spd = isSugarRush ? 3 : isFrozen ? 0.2 : 1;
  for (const s of stars) {
    s.y += s.vy * spd * timeScale;
    if (s.y > H * 0.6) { s.y = -2; s.x = Math.random() * W; }
    const a = 0.25 + Math.sin(ts / 700 + s.phase) * 0.25 + s.bright * 0.3;
    ctx.globalAlpha = Math.max(0, Math.min(1, a));
    ctx.fillStyle = s.bright > 0.7 ? '#aaccff' : '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    if (s.bright > 0.85 && a > 0.4) {
      ctx.globalAlpha = a * 0.3;
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(s.x - s.r * 3.5, s.y); ctx.lineTo(s.x + s.r * 3.5, s.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s.x, s.y - s.r * 3.5); ctx.lineTo(s.x, s.y + s.r * 3.5); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  // Moon
  const mx = W * 0.78, my = H * 0.13, mr = Math.min(W, H) * 0.055;
  const mGlow = ctx.createRadialGradient(mx, my, mr * 0.5, mx, my, mr * 5);
  mGlow.addColorStop(0, 'rgba(230,230,255,0.15)');
  mGlow.addColorStop(0.4, 'rgba(180,180,255,0.05)');
  mGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = mGlow; ctx.fillRect(0, 0, W, H);
  // Moon body
  const moonGrad = ctx.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, 0, mx, my, mr);
  moonGrad.addColorStop(0, '#fffaee');
  moonGrad.addColorStop(0.7, '#e8e4d0');
  moonGrad.addColorStop(1, '#b8b4a0');
  ctx.fillStyle = moonGrad;
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
  // Craters
  ctx.fillStyle = 'rgba(120,115,100,0.5)';
  ctx.beginPath(); ctx.arc(mx - mr * 0.3, my - mr * 0.15, mr * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + mr * 0.35, my + mr * 0.2, mr * 0.13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx + mr * 0.1, my - mr * 0.35, mr * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx - mr * 0.45, my + mr * 0.3, mr * 0.1, 0, Math.PI * 2); ctx.fill();

  // Mountain parallax
  for (const m of mountains) {
    ctx.fillStyle = m.color;
    ctx.beginPath(); ctx.moveTo(-10, H);
    for (const p of m.pts) ctx.lineTo(p.x, p.y);
    ctx.lineTo(W + 10, H); ctx.closePath(); ctx.fill();
  }

  // Torii gate silhouette (center background)
  drawTorii(W / 2, H * 0.55);

  // Hanging lanterns
  for (const l of lanterns) {
    const sway = Math.sin(ts / 1200 + l.phase) * 6;
    drawLantern(l.x + sway, l.y, ts);
  }

  // Cherry blossom petals
  for (const p of blossoms) {
    p.x += p.vx + Math.sin(ts / 2000 + p.phase) * 0.3;
    p.y += p.vy * spd * timeScale;
    p.rot += p.spin;
    if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
    if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.globalAlpha = 0.4;
    // 5-petal blossom
    for (let i = 0; i < 5; i++) {
      ctx.save(); ctx.rotate((Math.PI * 2 / 5) * i);
      ctx.fillStyle = '#ffb7c5';
      ctx.beginPath(); ctx.ellipse(0, -p.r, p.r * 0.7, p.r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(0, 0, p.r * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Ground platform
  const gY = kenzie.y + 55;
  const gg = ctx.createLinearGradient(0, gY - 8, 0, H);
  gg.addColorStop(0, 'rgba(35,18,50,0.95)');
  gg.addColorStop(1, 'rgba(10,5,20,1)');
  ctx.fillStyle = gg; ctx.fillRect(0, gY - 4, W, H - gY + 4);
  // Glow line
  ctx.strokeStyle = 'rgba(180,100,220,0.4)';
  ctx.lineWidth = 2; ctx.shadowColor = 'rgba(180,100,220,0.6)'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(W, gY); ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawTorii(cx, cy) {
  const scale = Math.min(W, H) * 0.0009;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(80,20,30,0.5)';

  // Pillars
  ctx.fillRect(-140, -30, 20, 250);
  ctx.fillRect(120, -30, 20, 250);
  // Top horizontal beam (kasagi)
  ctx.beginPath();
  ctx.moveTo(-200, -60);
  ctx.quadraticCurveTo(0, -80, 200, -60);
  ctx.lineTo(200, -30);
  ctx.quadraticCurveTo(0, -50, -200, -30);
  ctx.closePath(); ctx.fill();
  // Second beam (shimaki)
  ctx.fillRect(-175, -10, 350, 14);
  // Center tag
  ctx.fillStyle = 'rgba(60,15,25,0.5)';
  ctx.fillRect(-22, -45, 44, 30);
  ctx.restore();
}

function drawLantern(x, y, ts) {
  const pulse = 0.85 + Math.sin(ts / 400) * 0.15;
  // Hang rope
  ctx.strokeStyle = 'rgba(80,60,40,0.6)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, y - 18); ctx.stroke();
  // Glow aura
  const gr = ctx.createRadialGradient(x, y, 0, x, y, 60);
  gr.addColorStop(0, `rgba(255,180,80,${0.25 * pulse})`);
  gr.addColorStop(0.5, `rgba(255,140,40,${0.08 * pulse})`);
  gr.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = gr;
  ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI * 2); ctx.fill();
  // Top cap
  ctx.fillStyle = '#2c1810'; ctx.fillRect(x - 10, y - 18, 20, 5);
  // Lantern body (red paper)
  const bodyGrad = ctx.createRadialGradient(x, y, 0, x, y, 22);
  bodyGrad.addColorStop(0, `rgba(255,160,60,${pulse})`);
  bodyGrad.addColorStop(0.6, `rgba(220,60,30,${pulse})`);
  bodyGrad.addColorStop(1, `rgba(130,20,10,${pulse})`);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.ellipse(x, y, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
  // Ring stripes
  ctx.strokeStyle = 'rgba(30,10,5,0.6)'; ctx.lineWidth = 0.8;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.ellipse(x, y + i * 9, 18, 3, 0, 0, Math.PI * 2); ctx.stroke();
  }
  // Bottom tassel
  ctx.fillStyle = '#f4a12c';
  ctx.fillRect(x - 2, y + 21, 4, 6);
}

// ═══════════════════════════════════════════════════════════════════
//  PRINCESS — detailed canvas-drawn with flowing hair and throw anim
// ═══════════════════════════════════════════════════════════════════
function drawPrincess(ts) {
  const k = kenzie;
  k.hairPhase += 0.04;
  const bob = Math.sin(ts / 200) * 4;
  const lean = Math.sin(ts / 280) * 0.07 - k.throwAnim * 0.3;
  const s = 1.2;

  ctx.save();
  ctx.translate(k.x, k.y + bob);
  ctx.rotate(lean);
  ctx.scale(s, s);

  // Aura glow
  if (k.boss) {
    const aura = ctx.createRadialGradient(0, 5, 15, 0, 5, 65);
    aura.addColorStop(0, `rgba(255,65,108,${0.25 + Math.sin(ts / 80) * 0.1})`);
    aura.addColorStop(1, 'rgba(255,65,108,0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(0, 5, 65, 0, Math.PI * 2); ctx.fill();
  } else if (isSugarRush) {
    const aura = ctx.createRadialGradient(0, 5, 10, 0, 5, 55);
    aura.addColorStop(0, `rgba(240,147,251,${0.2 + Math.sin(ts / 120) * 0.08})`);
    aura.addColorStop(1, 'rgba(240,147,251,0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(0, 5, 55, 0, Math.PI * 2); ctx.fill();
  }

  // Magical sparkles around princess (continuous)
  for (let i = 0; i < 3; i++) {
    const sa = (ts / 600 + i * Math.PI * 2 / 3) % (Math.PI * 2);
    const sd = 40 + Math.sin(ts / 300 + i) * 6;
    const sx = Math.cos(sa) * sd, sy = Math.sin(sa) * sd - 5;
    ctx.globalAlpha = 0.5 + Math.sin(ts / 200 + i) * 0.4;
    ctx.fillStyle = k.boss ? '#ff4060' : '#ffd700';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(sx, sy, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, 48, 26, 6, 0, 0, Math.PI * 2); ctx.fill();

  const dressCol = k.boss ? '#aa1020' : '#5e2b8e';
  const dressLight = k.boss ? '#d63050' : '#8844c2';
  const dressDark = k.boss ? '#6e0010' : '#3c1862';
  const skinCol = '#fddbbe';
  const skinShade = '#e8b58a';
  const hairCol = '#2a140a';
  const hairLight = '#4a2815';

  // ── DRESS (flared with folds) ──
  // Main skirt silhouette with gradient
  const skirtGrad = ctx.createLinearGradient(0, 5, 0, 50);
  skirtGrad.addColorStop(0, dressLight);
  skirtGrad.addColorStop(0.5, dressCol);
  skirtGrad.addColorStop(1, dressDark);
  ctx.fillStyle = skirtGrad;
  ctx.beginPath();
  ctx.moveTo(-14, 4);
  ctx.quadraticCurveTo(-28, 28, -32, 48);
  ctx.lineTo(32, 48);
  ctx.quadraticCurveTo(28, 28, 14, 4);
  ctx.closePath();
  ctx.fill();

  // Dress folds (vertical lines)
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 7, 8);
    ctx.quadraticCurveTo(i * 10, 28, i * 11, 46);
    ctx.stroke();
  }
  // Highlight folds
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 7 + 2, 10);
    ctx.quadraticCurveTo(i * 10 + 3, 28, i * 11 + 3, 46);
    ctx.stroke();
  }

  // Bottom ruffle
  ctx.fillStyle = dressLight;
  ctx.beginPath();
  ctx.moveTo(-32, 46);
  for (let i = 0; i <= 8; i++) {
    const x = -32 + i * 8;
    ctx.quadraticCurveTo(x + 2, 52, x + 4, 48);
  }
  ctx.lineTo(32, 48);
  ctx.closePath();
  ctx.fill();

  // Waist belt (gold)
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-14, 2, 28, 4);
  ctx.fillStyle = '#d4a00f';
  ctx.fillRect(-14, 5, 28, 1);
  // Belt gem
  ctx.fillStyle = k.boss ? '#e74c3c' : '#9b59b6';
  ctx.beginPath(); ctx.arc(0, 4, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(-1, 3, 1, 0, Math.PI * 2); ctx.fill();

  // Bodice (torso)
  const bodiceGrad = ctx.createLinearGradient(-14, -6, 14, 6);
  bodiceGrad.addColorStop(0, dressDark);
  bodiceGrad.addColorStop(0.5, dressCol);
  bodiceGrad.addColorStop(1, dressLight);
  ctx.fillStyle = bodiceGrad;
  ctx.beginPath();
  ctx.moveTo(-10, -6);
  ctx.quadraticCurveTo(-14, 0, -14, 4);
  ctx.lineTo(14, 4);
  ctx.quadraticCurveTo(14, 0, 10, -6);
  ctx.closePath();
  ctx.fill();
  // Bodice decoration (diamond pattern)
  ctx.strokeStyle = 'rgba(255,215,0,0.7)';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(-8, -3); ctx.lineTo(0, 1); ctx.lineTo(8, -3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(0, 3); ctx.lineTo(7, 0); ctx.stroke();

  // ── LEFT ARM (non-throwing, gentle sway) ──
  ctx.fillStyle = skinCol;
  ctx.save();
  ctx.translate(-12, -3);
  const leftArmA = Math.PI / 4 + Math.sin(ts / 350) * 0.08;
  ctx.rotate(leftArmA);
  // Upper arm
  ctx.fillRect(-3, 0, 6, 12);
  // Forearm
  ctx.save();
  ctx.translate(0, 12);
  ctx.rotate(0.3);
  ctx.fillRect(-3, 0, 6, 11);
  // Hand
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.arc(0, 12, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.restore();

  // ── RIGHT ARM (throwing) ──
  // 3-phase animation:
  //   throwAnim in [0.75, 1.0]  → WIND-UP   (arm back over shoulder)
  //   throwAnim in [0.35, 0.75] → RELEASE   (arm whips forward)
  //   throwAnim in [0.0,  0.35] → FOLLOW    (arm return to rest)
  let armAngle, armLen = 12, foreAngle = 0.2;
  if (k.throwAnim > 0.75) {
    // Wind-up: t goes from 0→1 as throwAnim goes 1→0.75
    const t = (1 - k.throwAnim) / 0.25;
    armAngle = Math.PI / 4 - t * (Math.PI * 0.75);  // forward → back/up
    foreAngle = 0.3 - t * 1.6;                       // bent back
  } else if (k.throwAnim > 0.35) {
    // Release: snap forward
    const t = (0.75 - k.throwAnim) / 0.4;
    armAngle = -Math.PI * 0.5 + t * (Math.PI * 1.1);
    foreAngle = -1.3 + t * 1.8;
  } else if (k.throwAnim > 0) {
    // Follow-through: return
    const t = k.throwAnim / 0.35;
    armAngle = Math.PI * 0.6 * t + Math.PI / 4 * (1 - t);
    foreAngle = 0.5 * t + 0.2 * (1 - t);
  } else {
    armAngle = Math.PI / 4 + Math.sin(ts / 350) * 0.08;
    foreAngle = 0.3;
  }

  ctx.fillStyle = skinCol;
  ctx.save();
  ctx.translate(12, -3);
  ctx.rotate(armAngle);
  // Upper arm
  ctx.fillRect(-3, 0, 6, armLen);
  // Shoulder highlight
  ctx.fillStyle = skinShade;
  ctx.fillRect(-3, 0, 1.5, armLen);
  // Forearm
  ctx.save();
  ctx.translate(0, armLen);
  ctx.rotate(foreAngle);
  ctx.fillStyle = skinCol;
  ctx.fillRect(-3, 0, 6, 11);
  ctx.fillStyle = skinShade;
  ctx.fillRect(-3, 0, 1.5, 11);
  // Hand
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.arc(0, 12, 3.8, 0, Math.PI * 2); ctx.fill();

  // PENDING FOOD IN HAND (during wind-up and early release)
  if (k.throwAnim > 0.4 && k.pendingFood) {
    const cache = CACHE[k.pendingFood.id];
    if (cache) {
      const scale = 0.4;
      ctx.save();
      ctx.translate(0, 14);
      ctx.drawImage(cache, -CACHE_SIZE * scale / 2, -CACHE_SIZE * scale / 2, CACHE_SIZE * scale, CACHE_SIZE * scale);
      ctx.restore();
    }
  }
  ctx.restore();
  ctx.restore();

  // ── NECK ──
  ctx.fillStyle = skinCol;
  ctx.fillRect(-4, -10, 8, 7);
  ctx.fillStyle = skinShade;
  ctx.fillRect(-4, -10, 2, 7);

  // ── HEAD ──
  // Back of hair (halo around head)
  ctx.fillStyle = hairCol;
  ctx.beginPath();
  ctx.arc(0, -18, 19, 0, Math.PI * 2);
  ctx.fill();

  // Flowing hair strands (animated)
  ctx.fillStyle = hairCol;
  const hairSway = Math.sin(k.hairPhase) * 3;
  // Left flowing hair
  ctx.beginPath();
  ctx.moveTo(-16, -10);
  ctx.quadraticCurveTo(-22 + hairSway, 2, -24 + hairSway * 1.5, 22);
  ctx.quadraticCurveTo(-18, 25, -14, 10);
  ctx.quadraticCurveTo(-12, -5, -16, -10);
  ctx.closePath(); ctx.fill();
  // Right flowing hair
  ctx.beginPath();
  ctx.moveTo(16, -10);
  ctx.quadraticCurveTo(22 - hairSway, 2, 24 - hairSway * 1.5, 22);
  ctx.quadraticCurveTo(18, 25, 14, 10);
  ctx.quadraticCurveTo(12, -5, 16, -10);
  ctx.closePath(); ctx.fill();
  // Highlights on flowing hair
  ctx.strokeStyle = hairLight; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-18, -5); ctx.quadraticCurveTo(-20 + hairSway, 8, -20 + hairSway * 1.5, 20); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(18, -5); ctx.quadraticCurveTo(20 - hairSway, 8, 20 - hairSway * 1.5, 20); ctx.stroke();

  // Face (skin oval)
  ctx.fillStyle = skinCol;
  ctx.beginPath(); ctx.arc(0, -16, 14, 0, Math.PI * 2); ctx.fill();
  // Face shading
  ctx.fillStyle = skinShade;
  ctx.beginPath();
  ctx.arc(4, -14, 10, -Math.PI / 4, Math.PI / 2);
  ctx.arc(0, -16, 14, Math.PI / 2, -Math.PI / 4, true);
  ctx.closePath();
  ctx.globalAlpha = 0.4; ctx.fill(); ctx.globalAlpha = 1;

  // Hair bangs (on top of face)
  ctx.fillStyle = hairCol;
  ctx.beginPath();
  ctx.moveTo(-14, -22);
  ctx.quadraticCurveTo(-10, -30, -2, -28);
  ctx.quadraticCurveTo(2, -30, 10, -28);
  ctx.quadraticCurveTo(14, -20, 14, -14);
  ctx.quadraticCurveTo(8, -20, 0, -18);
  ctx.quadraticCurveTo(-8, -20, -14, -14);
  ctx.closePath(); ctx.fill();
  // Bang highlight
  ctx.fillStyle = hairLight;
  ctx.beginPath();
  ctx.moveTo(-10, -24);
  ctx.quadraticCurveTo(-6, -28, 0, -27);
  ctx.quadraticCurveTo(-2, -24, -10, -24);
  ctx.closePath(); ctx.fill();

  // ── FACE DETAILS ──
  const squint = (k.throwAnim > 0.4 && k.throwAnim < 0.75) ? 0.25 : 1;

  if (k.boss) {
    // Evil look
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.ellipse(-5, -16, 2.5, 3 * squint, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5, -16, 2.5, 3 * squint, 0, 0, Math.PI * 2); ctx.fill();
    // Eyebrows angry
    ctx.strokeStyle = hairCol; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8, -21); ctx.lineTo(-2, -19); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, -21); ctx.lineTo(2, -19); ctx.stroke();
    // Smirk
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-4, -9); ctx.quadraticCurveTo(0, -6, 5, -10); ctx.stroke();
  } else {
    // Cute eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-5, -16, 2.5, 3 * squint, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5, -16, 2.5, 3 * squint, 0, 0, Math.PI * 2); ctx.fill();
    // Pupils
    ctx.fillStyle = '#3498db';
    ctx.beginPath(); ctx.ellipse(-5, -15, 1.8, 2.2 * squint, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5, -15, 1.8, 2.2 * squint, 0, 0, Math.PI * 2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-4.5, -16.5, 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5.5, -16.5, 0.8, 0, Math.PI * 2); ctx.fill();
    // Eyelashes (tiny marks)
    ctx.strokeStyle = hairCol; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(-7, -19); ctx.lineTo(-7, -18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(7, -19); ctx.lineTo(7, -18); ctx.stroke();
    // Cute smile
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(0, -11, 4, 0.3, Math.PI - 0.3); ctx.stroke();
    // Blush
    ctx.fillStyle = 'rgba(255,150,170,0.4)';
    ctx.beginPath(); ctx.ellipse(-8, -12, 3, 1.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8, -12, 3, 1.8, 0, 0, Math.PI * 2); ctx.fill();
  }

  // ── CROWN ──
  // Crown base
  const crownGrad = ctx.createLinearGradient(0, -38, 0, -26);
  crownGrad.addColorStop(0, '#fff394');
  crownGrad.addColorStop(0.5, '#ffd700');
  crownGrad.addColorStop(1, '#c9a000');
  ctx.fillStyle = crownGrad;
  ctx.beginPath();
  ctx.moveTo(-13, -26);
  ctx.lineTo(-10, -36);
  ctx.lineTo(-5, -28);
  ctx.lineTo(0, -40);
  ctx.lineTo(5, -28);
  ctx.lineTo(10, -36);
  ctx.lineTo(13, -26);
  ctx.closePath();
  ctx.fill();
  // Crown outline
  ctx.strokeStyle = '#8b5a00';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // Crown highlight
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.moveTo(-4, -30); ctx.lineTo(0, -38); ctx.lineTo(4, -30); ctx.closePath(); ctx.fill();
  // Crown jewels
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath(); ctx.arc(0, -32, 2.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(-0.5, -32.5, 0.9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3498db';
  ctx.beginPath(); ctx.arc(-8, -29, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -29, 1.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-8.2, -29.3, 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.8, -29.3, 0.5, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// Get princess hand world-coordinates (for spawning)
function getHandPos(ts) {
  const k = kenzie;
  const s = 1.2;
  const bob = Math.sin(ts / 200) * 4;
  const lean = Math.sin(ts / 280) * 0.07 - k.throwAnim * 0.3;

  let armAngle, armLen = 12, foreAngle = 0.2;
  if (k.throwAnim > 0.75) {
    const t = (1 - k.throwAnim) / 0.25;
    armAngle = Math.PI / 4 - t * (Math.PI * 0.75);
    foreAngle = 0.3 - t * 1.6;
  } else if (k.throwAnim > 0.35) {
    const t = (0.75 - k.throwAnim) / 0.4;
    armAngle = -Math.PI * 0.5 + t * (Math.PI * 1.1);
    foreAngle = -1.3 + t * 1.8;
  } else if (k.throwAnim > 0) {
    const t = k.throwAnim / 0.35;
    armAngle = Math.PI * 0.6 * t + Math.PI / 4 * (1 - t);
    foreAngle = 0.5 * t + 0.2 * (1 - t);
  } else {
    armAngle = Math.PI / 4;
    foreAngle = 0.3;
  }

  // Compute hand position in local (princess) space, then transform to world
  const shoulderX = 12, shoulderY = -3;
  const elbowX = shoulderX + Math.cos(armAngle + Math.PI/2) * armLen;
  const elbowY = shoulderY + Math.sin(armAngle + Math.PI/2) * armLen;
  const totalAngle = armAngle + foreAngle;
  const handLocalX = elbowX + Math.cos(totalAngle + Math.PI/2) * 14;
  const handLocalY = elbowY + Math.sin(totalAngle + Math.PI/2) * 14;

  // Apply princess transform: translate(k.x, k.y+bob), rotate(lean), scale(s,s)
  const cosL = Math.cos(lean), sinL = Math.sin(lean);
  const sx = handLocalX * s, sy = handLocalY * s;
  return {
    x: k.x + sx * cosL - sy * sinL,
    y: k.y + bob + sx * sinL + sy * cosL,
  };
}

// ═══════════════════════════════════════════════════════════════════
//  FOOD ITEM RENDERER — uses cached offscreen canvas
// ═══════════════════════════════════════════════════════════════════
function drawFoodItem(o, ts) {
  const f = o.food;
  const cache = CACHE[f.id];
  if (!cache) return;

  ctx.save();
  ctx.translate(o.x, o.y);
  ctx.rotate(o.angle);

  // Target draw size
  const drawSize = f.r * 2;
  const scale = drawSize / CACHE_SIZE;

  if (o.sliced) {
    // ── SLICED: two halves drifting apart ──
    const progress = 1 - (o.sliceTimer / 40);
    const spread = progress * 18;
    const fadeAlpha = Math.max(0, o.sliceTimer / 40);
    const sliceAngle = o.sliceAngle || 0;

    // Save/clip/draw left half
    const cosS = Math.cos(-sliceAngle), sinS = Math.sin(-sliceAngle);
    const halfShift = spread;

    ctx.globalAlpha = fadeAlpha;

    // Draw with subtle glow
    ctx.shadowColor = f.glow; ctx.shadowBlur = 18;

    // Left half
    ctx.save();
    ctx.rotate(sliceAngle);
    ctx.translate(-halfShift, 0);
    ctx.beginPath();
    ctx.rect(-drawSize, -drawSize, drawSize, drawSize * 2);
    ctx.clip();
    ctx.translate(halfShift, 0);
    ctx.rotate(-sliceAngle);
    ctx.drawImage(cache, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.restore();

    // Right half
    ctx.save();
    ctx.rotate(sliceAngle);
    ctx.translate(halfShift, 0);
    ctx.beginPath();
    ctx.rect(0, -drawSize, drawSize, drawSize * 2);
    ctx.clip();
    ctx.translate(-halfShift, 0);
    ctx.rotate(-sliceAngle);
    ctx.drawImage(cache, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.restore();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  } else {
    // ── ALIVE: breathing pulse + special effects ──
    const pulsePhase = (ts / 400 + o.x * 0.01) % (Math.PI * 2);
    const pulse = 1 + Math.sin(pulsePhase) * 0.03;

    // Outer glow halo
    ctx.globalAlpha = 0.35 + Math.sin(pulsePhase) * 0.1;
    ctx.shadowColor = f.glow; ctx.shadowBlur = 24;
    ctx.drawImage(cache, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // Crisp main
    ctx.scale(pulse, pulse);
    ctx.shadowColor = f.glow; ctx.shadowBlur = 6;
    ctx.drawImage(cache, -drawSize / 2, -drawSize / 2, drawSize, drawSize);
    ctx.shadowBlur = 0;

    // Power-up specific overlays (draw unrotated for readability)
    ctx.scale(1/pulse, 1/pulse);
    ctx.rotate(-o.angle); // neutralize for overlay
    if (f.pwr === 'sugar') {
      const sparks = 4;
      for (let i = 0; i < sparks; i++) {
        const a = (ts / 250 + i * Math.PI * 2 / sparks) % (Math.PI * 2);
        const d = f.r * 1.3 + Math.sin(ts / 180 + i) * 4;
        const sx = Math.cos(a) * d, sy = Math.sin(a) * d;
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#f093fb';
        ctx.shadowColor = '#f093fb'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      }
    } else if (f.pwr === 'freeze') {
      ctx.globalAlpha = 0.4 + Math.sin(ts / 150) * 0.2;
      ctx.strokeStyle = '#bfe4ff';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#74b9ff'; ctx.shadowBlur = 6;
      const fr = f.r * 1.15 + Math.sin(ts / 120) * 3;
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i + ts / 1200;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * fr * 0.5, Math.sin(a) * fr * 0.5);
        ctx.lineTo(Math.cos(a) * fr, Math.sin(a) * fr);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
    } else if (f.pwr === 'shield') {
      ctx.globalAlpha = 0.3;
      ctx.strokeStyle = '#fdcb6e';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const a = (Math.PI * 2 / 5) * i + ts / 700;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * f.r * 0.7, Math.sin(a) * f.r * 0.7);
        ctx.lineTo(Math.cos(a) * f.r * 1.5, Math.sin(a) * f.r * 1.5);
        ctx.stroke();
      }
    } else if (f.bomb) {
      // Fuse spark (live)
      const sp = ts / 60;
      const flicker = 0.6 + Math.sin(sp * 4) * 0.4;
      ctx.globalAlpha = flicker;
      ctx.fillStyle = '#ffe06a';
      ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(10 + Math.sin(sp) * 2, -40, 3 + Math.sin(sp * 3) * 1, 0, Math.PI * 2);
      ctx.fill();
      // Sparks
      for (let i = 0; i < 3; i++) {
        const sa = sp + i;
        ctx.fillStyle = '#fff4b0';
        ctx.beginPath();
        ctx.arc(10 + Math.cos(sa) * 4, -40 + Math.sin(sa) * 4, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      // Danger ring
      ctx.globalAlpha = 0.3 + Math.sin(ts / 100) * 0.2;
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.arc(0, 0, f.r * 1.2, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════
//  KATANA — drawn at slash tip
// ═══════════════════════════════════════════════════════════════════
function drawKatanaAndTrails(ts) {
  for (const [, trail] of trails) {
    if (trail.length < 3) continue;

    // Compute tip direction
    const head = trail[trail.length - 1];
    const prev = trail[Math.max(0, trail.length - 4)];
    const dx = head.x - prev.x, dy = head.y - prev.y;
    const dist = Math.hypot(dx, dy);
    const moving = dist > 4;
    const angle = moving ? Math.atan2(dy, dx) : 0;

    // ── TRAIL (draw first, underneath) ──
    const col = isSugarRush ? '#f093fb' : '#00f2fe';
    const glow = isSugarRush ? 'rgba(240,147,251,0.16)' : 'rgba(0,242,254,0.14)';

    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    // Outer glow
    ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
    for (let j = 1; j < trail.length; j++) ctx.lineTo(trail[j].x, trail[j].y);
    ctx.strokeStyle = glow; ctx.lineWidth = 24; ctx.stroke();
    // Color core
    ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
    for (let j = 1; j < trail.length; j++) ctx.lineTo(trail[j].x, trail[j].y);
    ctx.strokeStyle = col; ctx.lineWidth = 5;
    ctx.shadowColor = col; ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // White hot tip
    if (trail.length >= 3) {
      ctx.beginPath();
      ctx.moveTo(trail[trail.length - 3].x, trail[trail.length - 3].y);
      ctx.lineTo(trail[trail.length - 1].x, trail[trail.length - 1].y);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2.5; ctx.stroke();
    }
    ctx.restore();

    // Spark emitter along trail tip
    if (moving && Math.random() < 0.8) {
      const sx = head.x + (Math.random() - 0.5) * 8;
      const sy = head.y + (Math.random() - 0.5) * 8;
      particles.push({
        x: sx, y: sy,
        vx: (Math.random() - 0.5) * 4 - dx * 0.05,
        vy: (Math.random() - 0.5) * 4 - dy * 0.05,
        life: 1, size: Math.random() * 2 + 1,
        color: col, type: 'spark',
      });
    }

    // ── KATANA at the slash tip ──
    if (!moving) continue;
    ctx.save();
    ctx.translate(head.x, head.y);
    ctx.rotate(angle);

    // Blade dimensions
    const bladeLen = Math.min(72, dist * 3 + 30);
    const bladeTh = 5;

    // Blade glow
    ctx.shadowColor = col; ctx.shadowBlur = 16;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 20; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(bladeLen, 0); ctx.stroke();
    ctx.shadowBlur = 0;

    // Blade body (steel)
    const bladeGrad = ctx.createLinearGradient(0, -bladeTh, 0, bladeTh);
    bladeGrad.addColorStop(0, '#f4f4f8');
    bladeGrad.addColorStop(0.3, '#ddd');
    bladeGrad.addColorStop(0.5, '#999');
    bladeGrad.addColorStop(0.7, '#bbb');
    bladeGrad.addColorStop(1, '#666');
    ctx.fillStyle = bladeGrad;
    ctx.beginPath();
    ctx.moveTo(2, -bladeTh / 2);
    ctx.lineTo(bladeLen - 12, -bladeTh / 2);
    ctx.lineTo(bladeLen, 0);
    ctx.lineTo(bladeLen - 12, bladeTh / 2);
    ctx.lineTo(2, bladeTh / 2);
    ctx.closePath(); ctx.fill();

    // Fuller (groove down blade)
    ctx.strokeStyle = 'rgba(60,60,80,0.7)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(6, 0); ctx.lineTo(bladeLen - 14, 0);
    ctx.stroke();

    // Sharp edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(4, -bladeTh / 2 + 0.3); ctx.lineTo(bladeLen - 12, -bladeTh / 2 + 0.3);
    ctx.stroke();

    // Edge reflection shimmer
    ctx.strokeStyle = 'rgba(200,240,255,0.5)';
    ctx.lineWidth = 0.4;
    const shimmer = (ts / 50) % (bladeLen - 20);
    ctx.beginPath();
    ctx.moveTo(6 + shimmer, -bladeTh / 2 + 0.5); ctx.lineTo(10 + shimmer, -bladeTh / 2 + 0.5);
    ctx.stroke();

    // TSUBA (guard) - golden
    const tsubaGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 8);
    tsubaGrad.addColorStop(0, '#ffe07a');
    tsubaGrad.addColorStop(0.6, '#ffa500');
    tsubaGrad.addColorStop(1, '#8b5a00');
    ctx.fillStyle = tsubaGrad;
    ctx.beginPath(); ctx.ellipse(0, 0, 4, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#6a4400';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // Tsuba detail
    ctx.fillStyle = '#6a4400';
    ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI * 2); ctx.fill();

    // TSUKA (handle) - wrapped in black cord
    ctx.fillStyle = '#2a1a05';
    ctx.fillRect(-22, -3, 22, 6);
    // Diamond wrap pattern (ito)
    ctx.strokeStyle = '#e8d580';
    ctx.lineWidth = 0.9;
    for (let i = 0; i < 7; i++) {
      const hx = -20 + i * 3;
      ctx.beginPath();
      ctx.moveTo(hx, -3); ctx.lineTo(hx + 1.5, 3); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hx + 1.5, -3); ctx.lineTo(hx, 3); ctx.stroke();
    }
    // Menuki (ornament on handle)
    ctx.fillStyle = '#d4a000';
    ctx.beginPath(); ctx.arc(-11, 0, 1.5, 0, Math.PI * 2); ctx.fill();

    // KASHIRA (pommel cap)
    ctx.fillStyle = '#3a2810';
    ctx.beginPath(); ctx.ellipse(-22, 0, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#8b5a00'; ctx.lineWidth = 0.5; ctx.stroke();

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  HIGH SCORE
// ═══════════════════════════════════════════════════════════════════
async function loadHS() {
  try { const r = await window.storage.get('rk-hs-v4'); return r ? (parseInt(r.value) || 0) : 0; }
  catch { return 0; }
}
async function saveHS(v) {
  try { await window.storage.set('rk-hs-v4', String(v)); } catch (_) {}
}

// ═══════════════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('waveNum').textContent = wave;
  document.getElementById('livesTxt').textContent =
    '❤️'.repeat(Math.max(0, lives)) + (hasShield ? '🛡️' : '') + '🖤'.repeat(Math.max(0, 3 - lives));
  const pf = document.getElementById('powerFill');
  pf.style.width = Math.min(100, power) + '%';
  pf.className = isSugarRush ? 'rush' : '';
  document.getElementById('comboTxt').textContent = combo > 1 ? `⚡ Combo ×${combo}!` : '';
  document.getElementById('pills').innerHTML =
    (isFrozen ? '<span class="pill pill-freeze">❄️ FREEZE</span>' : '') +
    (hasShield ? '<span class="pill pill-shield">🛡️ SHIELD</span>' : '');
}

// ═══════════════════════════════════════════════════════════════════
//  ANNOUNCEMENTS + TAUNTS
// ═══════════════════════════════════════════════════════════════════
function showAnn(title, sub = '', color = '#ffd700') {
  const el = document.getElementById('ann');
  const t = document.getElementById('annTitle');
  t.textContent = title; t.style.color = color;
  t.style.textShadow = `0 0 28px ${color},0 0 56px ${color}`;
  document.getElementById('annSub').textContent = sub;
  el.classList.add('show'); annTimer = 125;
}

const TAUNTS = [
  "You can do better, Riley!",
  "What type of ninja are you?",
  "Can't defeat broccoli thrown by a tiny dancer?",
  "Is that all you've got, Riley?",
  "My grandma slices faster!",
  "Pathetic, Riley!",
  "Even a princess beats you!",
  "Riley, step it up!",
  "Are you even trying?",
  "That was SAD, Riley!",
  "Broccoli wins again!",
  "Tiny dancer, big score!",
];
const BOMB_TAUNTS = [
  "BOOM, Riley!",
  "Gotcha, Riley!",
  "Should've dodged!",
  "KABOOM!",
  "Explosive finish, Riley!",
];
const BOSS_TAUNTS = [
  "FEAR ME, RILEY!",
  "This is MY kingdom!",
  "You cannot win!",
  "Bow before your queen, Riley!",
];

function showTaunt(msg) {
  if (tauntCooldown > 0) return;
  const t = document.getElementById('taunt');
  t.textContent = msg;
  t.classList.add('show');
  tauntCooldown = 100;
  // Kenzie speaks the taunt out loud
  speak(msg, { rate: 1.1, pitch: 1.6, volume: 0.9 });
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ═══════════════════════════════════════════════════════════════════
//  PARTICLES, SHOCKWAVES, FLOAT TEXTS
// ═══════════════════════════════════════════════════════════════════
function burst(x, y, color, n = 18) {
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.5;
    const sp = Math.random() * 7 + 3;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2,
      life: 1, size: Math.random() * 5 + 3, color, type: 'debris',
    });
  }
}
function sparkBurst(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 8 + 4;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      life: 1, size: Math.random() * 2 + 1, color, type: 'spark',
    });
  }
}
function addShockwave(x, y, color = 'rgba(255,255,255,0.5)') {
  shockwaves.push({ x, y, radius: 5, maxRadius: 90, life: 1, color });
}
function floatTxt(x, y, text, color = '#fff', size = 24) {
  floatTexts.push({ x, y, text, color, life: 1, vy: -2, size });
}

// ═══════════════════════════════════════════════════════════════════
//  SPAWNING — princess throws with true animation
// ═══════════════════════════════════════════════════════════════════
function rndf(min, max) { return Math.random() * (max - min) + min; }
function launchVy() { const h = rndf(cfg.vyMin * kenzie.y, cfg.vyMax * kenzie.y); return -Math.sqrt(2 * cfg.grav * h); }

let spawnQueue = [];

function queueSpawn() {
  kenzie.targetX = rndf(80, W - 80);
  const food = pickFood(cfg.bomb);
  kenzie.pendingFood = food;
  kenzie.throwAnim = 1.0;
  kenzie.throwReleased = false;
  spawnQueue.push(food);
}

function releaseThrow(ts) {
  if (spawnQueue.length === 0) return;
  const food = spawnQueue.shift();
  const hand = getHandPos(ts);
  // Aim velocity so item actually lands in bounds
  const dx = kenzie.targetX - hand.x;
  const vy = launchVy() * 0.85;
  const tFlight = -vy / cfg.grav * 2;
  const vx = (dx / tFlight) + rndf(-1.5, 1.5);
  objs.push({
    food, x: hand.x, y: hand.y,
    vx, vy,
    angle: 0, va: rndf(-0.08, 0.08),
    sliced: false, sliceTimer: 0, sliceAngle: 0,
    born: performance.now(),
  });
  kenzie.pendingFood = null;
  sfx.whoosh();
}

function maybeSpawn(ts) {
  const ms = cfg.spawnMs * (isSugarRush ? 0.42 : 1) * (isFrozen ? 1.9 : 1);
  if (ts - lastSpawnTs < ms) return;
  queueSpawn();
  if (Math.random() < cfg.multi) setTimeout(queueSpawn, 160);
  if (wave >= 4 && Math.random() < cfg.multi * 0.5) setTimeout(queueSpawn, 320);
  lastSpawnTs = ts;
}

// ═══════════════════════════════════════════════════════════════════
//  SLICING
// ═══════════════════════════════════════════════════════════════════
function trailHits(trail, o) {
  if (trail.length < 3) return false;
  const head = trail[trail.length - 1], tail = trail[0];
  if (Math.hypot(head.x - tail.x, head.y - tail.y) < 12) return false;
  return Math.hypot(head.x - o.x, head.y - o.y) < o.food.r + 30;
}

function handleSlice(o, trail) {
  // Determine slice angle from trail motion
  const head = trail[trail.length - 1];
  const prev = trail[Math.max(0, trail.length - 4)];
  o.sliceAngle = Math.atan2(head.y - prev.y, head.x - prev.x);

  o.sliced = true; o.sliceTimer = 40;
  o.vx *= 0.25; o.vy = -0.8;
  sfx.sliceHit();
  burst(o.x, o.y, o.food.col, 20);
  sparkBurst(o.x, o.y, '#fff', 10);
  addShockwave(o.x, o.y, o.food.glow);
  chromaShake = Math.min(1, chromaShake + 0.3);

  const f = o.food;

  if (f.pwr === 'sugar') {
    sfx.power();
    if (!isSugarRush) {
      power = Math.min(100, power + 28);
      if (power >= 100) triggerSugarRush();
      updateHUD();
    }
    floatTxt(o.x, o.y, '⚡ +Power!', f.col);
  } else if (f.pwr === 'freeze') {
    triggerFreeze();
    floatTxt(o.x, o.y, '❄️ FREEZE!', '#74b9ff');
  } else if (f.pwr === 'life') {
    if (lives < 5) { lives++; updateHUD(); }
    sfx.life();
    floatTxt(o.x, o.y, '❤️ +Life!', '#ff6b81');
  } else if (f.pwr === 'shield') {
    hasShield = true; updateHUD();
    sfx.power();
    floatTxt(o.x, o.y, '🛡️ Shield!', '#fdcb6e');
  } else {
    combo++; bestCombo = Math.max(bestCombo, combo); comboTimer = 130;
    const pts = f.pts * combo * (isSugarRush ? 2 : 1);
    score += pts;
    sfx.combo(combo);
    floatTxt(o.x, o.y, `+${pts}${combo > 1 ? ' ×' + combo : ''}`, f.col);
    const ct = document.getElementById('comboTxt');
    ct.classList.remove('pop'); void ct.offsetWidth; ct.classList.add('pop');
    // Big combo = slow-mo juice
    if (combo === 5) { hitStop = 6; }
    if (combo === 10) { hitStop = 10; screenFlash = 0.5; flashR = 255; flashG = 230; flashB = 100; }
    waveSliced++;
    if (waveSliced >= waveNeeded) nextWave();
    updateHUD();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  WAVE
// ═══════════════════════════════════════════════════════════════════
function nextWave() {
  wave++; waveSliced = 0; waveNeeded = Math.min(32, 10 + wave * 2);
  cfg.spawnMs = Math.max(cfg.spawnMin, cfg.spawnMs - 52);
  cfg.bomb = Math.min(0.38, cfg.bomb + 0.018);
  cfg.multi = Math.min(0.55, cfg.multi + 0.04);
  sfx.wave();
  if (wave % 5 === 0) {
    cfg.spawnMs = Math.max(cfg.spawnMin, cfg.spawnMs - 70);
    cfg.bomb = Math.min(0.42, cfg.bomb + 0.05);
    showAnn(`🔥 BOSS WAVE ${wave}! 🔥`, 'Maximum chaos!', '#ff416c');
    kenzie.boss = true;
    screenFlash = 0.5; flashR = 255; flashG = 65; flashB = 50;
    setTimeout(() => showTaunt(BOSS_TAUNTS[Math.floor(Math.random() * BOSS_TAUNTS.length)]), 700);
  } else {
    const s = ['Keep slicing!', 'Bring it on!', "Can't stop me!", 'Too slow, Riley!', 'Getting spicier!', 'More chaos!'];
    showAnn(`Wave ${wave}!`, s[(wave - 2) % s.length], '#ffd700');
    kenzie.boss = false;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  POWER MODES
// ═══════════════════════════════════════════════════════════════════
function triggerSugarRush() {
  isSugarRush = true; sugarTimer = 380; timeScale = 0.38;
  showAnn('⚡ SUGAR RUSH! ⚡', '2× Points + Slow-mo!', '#f093fb');
  screenFlash = 0.6; flashR = 180; flashG = 60; flashB = 255;
  chromaShake = 1;
}
function triggerFreeze() {
  isFrozen = true; frozenTimer = 260;
  sfx.freeze();
  screenFlash = 0.45; flashR = 80; flashG = 170; flashB = 255;
  updateHUD();
}

// ═══════════════════════════════════════════════════════════════════
//  DAMAGE
// ═══════════════════════════════════════════════════════════════════
function takeDmg(reason) {
  if (!running) return;
  if (hasShield) {
    hasShield = false; updateHUD();
    floatTxt(W / 2, H * 0.42, '🛡️ Shield absorbed!', '#fdcb6e');
    screenFlash = 0.35; flashR = 255; flashG = 200; flashB = 80;
    return;
  }
  lives--; combo = 0; comboTimer = 0; updateHUD();
  screenFlash = 0.85; flashR = 255; flashG = 40; flashB = 40;
  chromaShake = 1; hitStop = reason === 'bomb' ? 10 : 4;
  document.body.classList.remove('shake'); void document.body.offsetWidth; document.body.classList.add('shake');
  addShockwave(W / 2, H / 2, 'rgba(255,50,50,0.5)');
  if (reason === 'bomb') {
    sfx.bomb();
    showTaunt(BOMB_TAUNTS[Math.floor(Math.random() * BOMB_TAUNTS.length)]);
  } else {
    sfx.miss();
    showTaunt(TAUNTS[Math.floor(Math.random() * TAUNTS.length)]);
  }
  if (lives <= 0) setTimeout(doGameOver, 750);
}

// ═══════════════════════════════════════════════════════════════════
//  GAME INIT / OVER
// ═══════════════════════════════════════════════════════════════════
async function startGame(level) {
  getAC();
  highScore = await loadHS();
  document.getElementById('start').style.display = 'none';
  document.getElementById('over').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('ann').classList.remove('show');
  document.getElementById('taunt').classList.remove('show');
  cfg = { ...DIFFS[level] };
  running = true;
  score = 0; lives = 3; combo = 0; bestCombo = 0; comboTimer = 0;
  wave = 1; waveSliced = 0; waveNeeded = 10;
  power = 0; isSugarRush = false; sugarTimer = 0;
  isFrozen = false; frozenTimer = 0; hasShield = false;
  timeScale = 1; screenFlash = 0; chromaShake = 0; hitStop = 0;
  tauntCooldown = 0;
  objs = []; particles = []; floatTexts = []; shockwaves = []; spawnQueue = [];
  trails.clear();
  bgmMs = 0; bgmStep = 0;
  lastSpawnTs = performance.now(); lastFrameTs = 0;
  resize();
  kenzie.x = W / 2; kenzie.targetX = W / 2;
  kenzie.throwAnim = 0; kenzie.throwReleased = false; kenzie.pendingFood = null;
  kenzie.boss = false; kenzie.hairPhase = 0;
  updateHUD();
  requestAnimationFrame(loop);
}
window.startGame = startGame;

async function doGameOver() {
  running = false;
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  const newHS = score > highScore;
  if (newHS) { highScore = score; await saveHS(score); }
  document.getElementById('goScore').textContent = score;
  document.getElementById('goWave').textContent = wave;
  document.getElementById('goCombo').textContent = bestCombo;
  document.getElementById('newHs').style.display = newHS ? 'block' : 'none';
  const oh = document.getElementById('overHs');
  if (highScore > 0) { oh.style.display = 'block'; document.getElementById('overHsVal').textContent = highScore; }
  document.getElementById('hud').style.display = 'none';
  document.getElementById('over').style.display = 'flex';
  // Final taunt
  setTimeout(() => speak("Better luck next time, Riley!", { rate: 1.05, pitch: 1.5 }), 400);
}

// ═══════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════
function loop(ts) {
  if (!running) return;
  const dt = Math.min(ts - lastFrameTs, 50);
  lastFrameTs = ts;

  // Hit-stop: freeze physics for a few frames
  if (hitStop > 0) { hitStop--; }
  tickBGM(dt);
  if (annTimer > 0) { annTimer--; if (annTimer <= 0) document.getElementById('ann').classList.remove('show'); }
  if (tauntCooldown > 0) tauntCooldown--;

  // ── Background ──
  drawBackground(ts);

  // ── Freeze tint ──
  if (isFrozen) { ctx.fillStyle = `rgba(80,160,255,${0.08 + Math.sin(ts / 180) * 0.03})`; ctx.fillRect(0, 0, W, H); }

  // ── Screen flash ──
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(${flashR},${flashG},${flashB},${screenFlash * 0.3})`;
    ctx.fillRect(0, 0, W, H);
    screenFlash = Math.max(0, screenFlash - 0.04);
  }

  // ── Low-lives vignette ──
  if (lives <= 2) {
    const i2 = (3 - lives) / 3, pulse = Math.sin(ts / 400) * 0.04;
    const vg = ctx.createRadialGradient(W / 2, H / 2, H * 0.15, W / 2, H / 2, H * 0.9);
    vg.addColorStop(0, 'rgba(255,0,0,0)');
    vg.addColorStop(1, `rgba(255,0,0,${0.2 * i2 + pulse})`);
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }

  // ── Chromatic aberration decay ──
  if (chromaShake > 0) chromaShake = Math.max(0, chromaShake - 0.025);

  // ── Timers ──
  const phys = hitStop > 0 ? 0 : timeScale * (isFrozen ? 0.22 : 1);
  if (isSugarRush) {
    sugarTimer -= phys * dt / 16.67;
    power = Math.max(0, (sugarTimer / 380) * 100);
    if (sugarTimer <= 0) { isSugarRush = false; timeScale = 1; power = 0; updateHUD(); }
    else updateHUD();
  }
  if (isFrozen) {
    frozenTimer -= dt / 16.67;
    if (frozenTimer <= 0) { isFrozen = false; timeScale = isSugarRush ? 0.38 : 1; updateHUD(); }
  }
  if (comboTimer > 0) { comboTimer -= phys; if (comboTimer <= 0) { combo = 0; updateHUD(); } }

  // ── Kenzie movement + throw animation ──
  kenzie.x += (kenzie.targetX - kenzie.x) * cfg.kSpd;
  if (kenzie.throwAnim > 0) {
    kenzie.throwAnim = Math.max(0, kenzie.throwAnim - 0.035);
    // RELEASE at throwAnim ≈ 0.55 (during the snap-forward phase)
    if (kenzie.throwAnim < 0.55 && !kenzie.throwReleased && spawnQueue.length > 0) {
      kenzie.throwReleased = true;
      releaseThrow(ts);
    }
  }

  // ── Draw Princess ──
  drawPrincess(ts);

  // ── Spawn ──
  maybeSpawn(ts);

  // ── Update objects ──
  for (let i = objs.length - 1; i >= 0; i--) {
    const o = objs[i];
    if (!o.sliced) {
      o.x += o.vx * phys;
      o.y += o.vy * phys;
      o.vy += cfg.grav * phys;
      o.angle += o.va * phys;
      // Ceiling clamp
      if (o.y < 28 && o.vy < 0) { o.y = 28; o.vy = Math.abs(o.vy) * 0.35; }

      let hit = false;
      for (const [, trail] of trails) {
        if (!trailHits(trail, o)) continue;
        hit = true;
        if (o.food.bomb) {
          burst(o.x, o.y, '#ff3333', 32);
          addShockwave(o.x, o.y, 'rgba(255,50,50,0.7)');
          objs.splice(i, 1);
          takeDmg('bomb');
        } else {
          handleSlice(o, trail);
        }
        break;
      }
      if (hit) continue;
    } else {
      o.vx *= 0.92; o.x += o.vx; o.y += 1.8; o.sliceTimer--;
    }
    if (o.y > H + 80 || o.sliceTimer < 0) {
      if (!o.sliced && o.food.miss) takeDmg('miss');
      objs.splice(i, 1);
    }
  }

  // ── Draw food items ──
  for (const o of objs) drawFoodItem(o, ts);

  // ── Shockwaves ──
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.radius += 4.5; s.life -= 0.04;
    if (s.life <= 0) { shockwaves.splice(i, 1); continue; }
    ctx.globalAlpha = s.life * 0.55;
    ctx.strokeStyle = s.color; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.22;
    p.life -= p.type === 'spark' ? 0.04 : 0.024;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color; ctx.shadowBlur = p.type === 'spark' ? 8 : 6;
    ctx.fillStyle = p.color;
    if (p.type === 'spark') {
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.vy, p.vx));
      ctx.fillRect(-p.size * 2, -0.5, p.size * 4, 1);
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // ── Float texts ──
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.y += ft.vy; ft.life -= 0.017;
    if (ft.life <= 0) { floatTexts.splice(i, 1); continue; }
    ctx.globalAlpha = ft.life;
    ctx.font = `900 ${ft.size}px -apple-system,sans-serif`;
    ctx.textAlign = 'center';
    // Outline for readability
    ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 4;
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.shadowColor = ft.color; ctx.shadowBlur = 10;
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // ── Katana + trails on top ──
  drawKatanaAndTrails(ts);

  // ── Chromatic aberration (overlay) ──
  if (chromaShake > 0.05) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = chromaShake * 0.15;
    ctx.fillStyle = '#ff0040';
    ctx.fillRect(chromaShake * 3, 0, W, H);
    ctx.fillStyle = '#00ffe0';
    ctx.fillRect(-chromaShake * 3, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT — multi-touch
// ═══════════════════════════════════════════════════════════════════
canvas.addEventListener('pointerdown', e => {
  e.preventDefault(); getAC();
  trails.set(e.pointerId, [{ x: e.clientX, y: e.clientY }]);
  sfx.slice();
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!running) return;
  const t = trails.get(e.pointerId);
  if (!t) return;
  t.push({ x: e.clientX, y: e.clientY });
  const max = isSugarRush ? 22 : 14;
  if (t.length > max) t.shift();
}, { passive: false });

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  setTimeout(() => trails.delete(e.pointerId), 80);
}, { passive: false });

canvas.addEventListener('pointercancel', e => trails.delete(e.pointerId));

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
initCaches();
resize();

loadHS().then(hs => {
  highScore = hs;
  if (hs > 0) {
    document.getElementById('startHs').style.display = 'inline-block';
    document.getElementById('startHsVal').textContent = hs;
  }
});
</script>
</body>
