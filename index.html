<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
<title>Riley vs Kenzie - Hybrid Ultimate Edition</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#050510;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  canvas{position:fixed;inset:0;display:block}
  .screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;background:radial-gradient(ellipse at 50% 30%,rgba(120,0,200,.18) 0%,rgba(5,5,16,.97) 70%);backdrop-filter:blur(18px)}
  .hidden{display:none !important}
  .title{font-family:Georgia,serif;font-size:clamp(34px,8vw,68px);font-weight:900;line-height:1.05;color:#fff;text-shadow:0 0 18px #e100ff,0 0 50px #9b00ff,0 0 80px rgba(200,0,255,.4),0 4px 14px rgba(0,0,0,.8);margin:0 0 8px}
  .sub{font-size:clamp(11px,2.8vw,15px);color:rgba(255,255,255,.58);margin:0 0 20px;letter-spacing:4px;text-transform:uppercase}
  .howto{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:900px;margin-bottom:20px}
  .tip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:8px 14px;font-size:11px;color:rgba(255,255,255,.68)}
  .tip strong{display:block;font-size:18px;color:#fff}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  button{font-weight:900;font-size:clamp(15px,3.8vw,19px);padding:13px 28px;border:none;border-radius:999px;color:#fff;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:transform .08s,filter .15s,box-shadow .15s}
  button:hover{filter:brightness(1.12)}
  button:active{transform:scale(.95)}
  .btn-easy{background:linear-gradient(135deg,#00c6ff,#0072ff);box-shadow:0 5px 24px rgba(0,198,255,.5)}
  .btn-medium{background:linear-gradient(135deg,#f093fb,#f5576c);box-shadow:0 5px 24px rgba(245,87,108,.5)}
  .btn-hard{background:linear-gradient(135deg,#ff416c,#ff4b2b);box-shadow:0 5px 24px rgba(255,65,108,.5)}
  .btn-primary{background:linear-gradient(135deg,#e100ff,#00f2fe);box-shadow:0 10px 30px rgba(225,0,255,.4)}
  .hs{font-size:14px;color:#ffd700;font-weight:700;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);padding:5px 16px;border-radius:999px;margin-top:14px}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;padding-top:env(safe-area-inset-top,0px)}
  #scoreBlock,#waveBlock,#powerBlock,#livesTxt,#pills{position:absolute}
  #scoreBlock{top:calc(env(safe-area-inset-top,0px)+12px);left:14px}
  #scoreLbl,#waveLbl,#powerLbl{font-size:9px;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:3px;font-weight:700}
  #scoreNum{font-size:40px;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 16px rgba(79,172,254,.95),0 2px 8px rgba(0,0,0,.6)}
  #comboTxt{font-size:14px;font-weight:900;color:#ffeb3b;min-height:18px;text-shadow:0 0 10px #ff9800,0 2px 4px rgba(0,0,0,.6);transform-origin:left;transition:transform .08s}
  #comboTxt.pop{transform:scale(1.45)}
  #waveBlock{top:calc(env(safe-area-inset-top,0px)+12px);left:50%;transform:translateX(-50%);text-align:center}
  #waveNum{font-size:26px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 14px rgba(255,215,0,.7),0 2px 6px rgba(0,0,0,.5)}
  #livesTxt{top:calc(env(safe-area-inset-top,0px)+12px);right:12px;font-size:22px;text-align:right;line-height:1.2;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
  #powerBlock{top:calc(env(safe-area-inset-top,0px)+70px);left:50%;transform:translateX(-50%);width:min(220px,58vw);text-align:center}
  #powerBar{height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
  #powerFill{height:100%;width:0%;background:linear-gradient(90deg,#00f2fe,#4facfe);border-radius:999px;transition:width .12s;box-shadow:0 0 8px currentColor}
  #powerFill.rush{background:linear-gradient(90deg,#f093fb,#f5576c);animation:rushPulse .35s infinite alternate}
  #pills{top:calc(env(safe-area-inset-top,0px)+96px);left:50%;transform:translateX(-50%);display:flex;gap:6px}
  .pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .pill-freeze{background:rgba(100,180,255,.88)}
  .pill-shield{background:rgba(255,210,80,.95);color:#333}
  .pill-rush{background:rgba(245,87,108,.94)}

  #ann,#taunt,#actionText{position:fixed;left:50%;transform:translate(-50%,-50%) scale(.6);opacity:0;pointer-events:none;z-index:15;text-align:center;transition:all .28s cubic-bezier(.175,.885,.32,1.3)}
  #ann{top:42%}
  #taunt{top:30%;max-width:90vw;white-space:nowrap;font-size:clamp(20px,5vw,40px);font-weight:900;color:#fff;text-shadow:0 0 20px #ff0040,0 0 40px rgba(255,0,64,.6),0 3px 10px rgba(0,0,0,.8)}
  #actionText{top:50%;font-family:Georgia,serif;font-size:clamp(44px,11vw,100px);font-weight:900;color:#fff;text-shadow:0 0 30px #ff0055,0 0 60px #ff0055,5px 5px 0 #000}
  #ann.show,#taunt.show,#actionText.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  #annTitle{font-family:Georgia,serif;font-size:clamp(36px,10vw,74px);font-weight:900;color:#fff;line-height:1}
  #annSub{font-size:16px;color:rgba(255,255,255,.82);margin-top:5px;font-weight:600;letter-spacing:1px}

  .stat-row{display:flex;gap:15px;margin:8px 0 20px;justify-content:center;flex-wrap:wrap}
  .stat-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:13px;padding:9px 17px;text-align:center}
  .stat-val{font-size:30px;font-weight:900;color:#ffd700;text-shadow:0 0 12px rgba(255,215,0,.4)}
  .stat-lbl{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:2px}
  .new-hs{font-size:17px;font-weight:900;color:#ffd700;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.35);padding:7px 20px;border-radius:30px;margin-bottom:14px;box-shadow:0 0 20px rgba(255,215,0,.2)}

  @keyframes rushPulse{from{opacity:.8}to{opacity:1;filter:brightness(1.5)}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start" class="screen">
  <div class="title">Riley vs Kenzie</div>
  <div class="sub">Hybrid Ultimate Edition</div>
  <div class="howto">
    <div class="tip"><strong>⚔️</strong>Swipe to slice</div>
    <div class="tip"><strong>💣</strong>Dodge bombs</div>
    <div class="tip"><strong>❄️🛡️⚡</strong>Freeze, shield, rush</div>
    <div class="tip"><strong>👑</strong>Survive boss waves</div>
  </div>
  <div class="btn-row">
    <button class="btn-easy" data-level="easy">Easy</button>
    <button class="btn-medium" data-level="medium">Medium</button>
    <button class="btn-hard" data-level="hard">Hard</button>
  </div>
  <div class="btn-row" style="margin-top:10px">
    <button class="btn-primary" id="testVoiceBtn">Test Voice</button>
  </div>
  <div id="startHs" class="hs hidden">🏆 Best: <span id="startHsVal">0</span></div>
</div>

<div id="hud">
  <div id="scoreBlock"><div id="scoreLbl">Score</div><div id="scoreNum">0</div><div id="comboTxt"></div></div>
  <div id="waveBlock"><div id="waveLbl">Wave</div><div id="waveNum">1</div></div>
  <div id="livesTxt">❤️❤️❤️</div>
  <div id="powerBlock"><div id="powerLbl">⚡ Sugar Rush</div><div id="powerBar"><div id="powerFill"></div></div></div>
  <div id="pills"></div>
</div>

<div id="ann"><div id="annTitle"></div><div id="annSub"></div></div>
<div id="taunt"></div>
<div id="actionText">KEEEYA!</div>

<div id="over" class="screen hidden">
  <div class="title">Game Over</div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-val" id="goScore">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat-card"><div class="stat-val" id="goWave">1</div><div class="stat-lbl">Wave</div></div>
    <div class="stat-card"><div class="stat-val" id="goCombo">0</div><div class="stat-lbl">Best Combo</div></div>
  </div>
  <div id="newHs" class="new-hs hidden">🏆 NEW HIGH SCORE!</div>
  <div class="btn-row">
    <button class="btn-primary" id="restartBtn">Play Again</button>
  </div>
  <div id="overHs" class="hs hidden">🏆 Best: <span id="overHsVal">0</span></div>
</div>

<script>
'use strict';

const CONFIG = {
  MAX_LIVES: 3,
  TRAIL_LENGTH: 14,
  CACHE_SIZE: 140,
  STORAGE_KEY: 'riley-vs-kenzie-high-score-v3',
  COLORS: {
    bgTop: '#080515', bgBottom: '#1b0b31',
    cyan: '#00f2fe', pink: '#e100ff', red: '#ff0055', gold: '#ffd700', white: '#ffffff'
  },
  DIFFS: {
    easy:   { spawnMs: 760, gravity: 0.26, bombChance: 0.10, speed: 0.92, waveGoal: 10 },
    medium: { spawnMs: 620, gravity: 0.30, bombChance: 0.16, speed: 1.04, waveGoal: 12 },
    hard:   { spawnMs: 500, gravity: 0.34, bombChance: 0.23, speed: 1.18, waveGoal: 14 }
  },
  TAUNTS: [
    'You can do better, Riley!',
    'What type of ninja are you?',
    'Tiny dancer. Big problem.',
    'That swing was embarrassing.',
    'My grandma slices faster!',
    'Broccoli owns you.',
    'Pathetic, Riley!',
    'You call that a slash?'
  ],
  BOMB_TAUNTS: ['BOOM, Riley!', 'Should have dodged!', 'KABOOM!', 'Explosive mistake!'],
  BOSS_TAUNTS: ['FEAR ME, RILEY!', 'THIS IS MY KINGDOM!', 'YOU CANNOT WIN!', 'BOW BEFORE YOUR QUEEN!']
};

const $ = (id) => document.getElementById(id);

class AudioEngine {
  constructor(){ this.ctx = null; this.ready = false; this.master = null; }
  async init(){
    if(!this.ctx){
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.85;
      this.master.connect(this.ctx.destination);
    }
    if(this.ctx.state === 'suspended') await this.ctx.resume();
    this.ready = true;
  }
  tone({type='sine', start=440, end=220, duration=0.15, volume=0.08, attack=0.005, release=0.001}){
    if(!this.ready) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(20,start), t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20,end), t + duration);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(volume, t + attack);
    gain.gain.exponentialRampToValueAtTime(release, t + duration);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + duration + 0.02);
  }
  noise({duration=0.08, volume=0.08, hp=1200}){
    if(!this.ready) return;
    const t = this.ctx.currentTime;
    const size = Math.floor(this.ctx.sampleRate * duration);
    const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<size;i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = hp;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter); filter.connect(gain); gain.connect(this.master);
    src.start(t); src.stop(t + duration + 0.02);
  }
  play(name, payload={}){
    if(!this.ready) return;
    const bank = {
      slash: () => { this.tone({type:'triangle', start:1100, end:260, duration:0.12, volume:0.10}); this.noise({duration:0.06, volume:0.06, hp:3000}); },
      sliceHit: () => { this.tone({type:'square', start:1300, end:240, duration:0.12, volume:0.12}); this.noise({duration:0.07, volume:0.09, hp:2400}); },
      bomb: () => { this.tone({type:'sawtooth', start:160, end:35, duration:0.52, volume:0.20}); this.noise({duration:0.35, volume:0.14, hp:110}); },
      miss: () => { this.tone({type:'sawtooth', start:220, end:80, duration:0.28, volume:0.10}); },
      power: () => [440,550,660,880].forEach((f,i)=>setTimeout(()=>this.tone({type:'triangle',start:f,end:f*1.01,duration:0.11,volume:0.07}),i*55)),
      freeze: () => { this.tone({type:'sine', start:1200, end:240, duration:0.40, volume:0.10}); this.tone({type:'sine', start:1500, end:400, duration:0.35, volume:0.05}); },
      life: () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.tone({type:'sine',start:f,end:f,duration:0.14,volume:0.07}),i*60)),
      wave: () => [330,440,550,660,880].forEach((f,i)=>setTimeout(()=>this.tone({type:'square',start:f,end:f,duration:0.12,volume:0.05}),i*80)),
      combo: () => this.tone({type:'triangle', start:Math.min(1600, 560 + (payload.combo || 1) * 85), end:420, duration:0.09, volume:0.08}),
      boss: () => { this.tone({type:'square', start:220, end:110, duration:0.5, volume:0.12}); this.tone({type:'sawtooth', start:440, end:180, duration:0.25, volume:0.05}); },
      whoosh: () => { this.noise({duration:0.09, volume:0.04, hp:700}); },
      shout: () => { this.noise({duration:0.06, volume:0.06, hp:3000}); this.tone({type:'sawtooth', start:520, end:180, duration:0.22, volume:0.11}); this.tone({type:'triangle', start:1400, end:500, duration:0.18, volume:0.05}); }
    };
    if(bank[name]) bank[name]();
  }
}

class VoiceEngine {
  constructor(){
    this.enabled = 'speechSynthesis' in window;
    this.voices = [];
    this.ready = false;
    this.unlocked = false;
    this.lastSpokenAt = 0;
  }
  async init(){
    if(!this.enabled) return;
    this.loadVoices();
    if(!this.voices.length){
      await new Promise(resolve => {
        const done = () => { this.loadVoices(); resolve(); };
        try { speechSynthesis.onvoiceschanged = done; } catch {}
        setTimeout(done, 500);
      });
    }
    await this.unlock();
    this.ready = true;
  }
  loadVoices(){
    try { this.voices = speechSynthesis.getVoices() || []; }
    catch { this.voices = []; }
  }
  pickVoice(){
    if(!this.enabled) return null;
    const preferred = this.voices.find(v => v.lang?.startsWith('en') && /samantha|victoria|karen|ava|allison|moira|fiona|zira|susan|kathy/i.test(v.name));
    return preferred || this.voices.find(v => v.lang?.startsWith('en-US')) || this.voices.find(v => v.lang?.startsWith('en')) || null;
  }
  async unlock(){
    if(!this.enabled || this.unlocked) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance('Voice ready');
      u.volume = 0.01;
      u.rate = 1.8;
      u.pitch = 1.0;
      u.lang = 'en-US';
      const voice = this.pickVoice();
      if(voice) u.voice = voice;
      await new Promise(resolve => {
        let done = false;
        const finish = () => { if(done) return; done = true; resolve(); };
        u.onend = finish;
        u.onerror = finish;
        speechSynthesis.speak(u);
        speechSynthesis.resume();
        setTimeout(finish, 800);
      });
      speechSynthesis.cancel();
      this.unlocked = true;
    } catch {}
  }
  async speak(text, opts={}){
    if(!this.enabled || !text) return false;
    if(!this.ready) await this.init();
    try {
      const now = performance.now();
      const minGap = opts.minGap ?? 220;
      if(now - this.lastSpokenAt < minGap) return false;
      this.lastSpokenAt = now;
      if(opts.interrupt !== false) speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = opts.lang ?? 'en-US';
      u.rate = opts.rate ?? 1.06;
      u.pitch = opts.pitch ?? 1.5;
      u.volume = opts.volume ?? 1.0;
      const voice = this.pickVoice();
      if(voice) u.voice = voice;
      speechSynthesis.speak(u);
      speechSynthesis.resume();
      return true;
    } catch {
      return false;
    }
  }
  async test(){
    return this.speak("Riley, let's see what you've got.", { interrupt:true, rate:1.0, pitch:1.45, volume:1.0, minGap:0 });
  }
  stop(){ if(this.enabled) try { speechSynthesis.cancel(); } catch {} }
}

class AssetManager {
  constructor(size=CONFIG.CACHE_SIZE){ this.size = size; this.cache = {}; }
  init(){ this.make('broccoli', c => this.drawBroccoli(c)); this.make('bomb', c => this.drawBomb(c)); this.make('pizza', c => this.drawPizza(c)); this.make('donut', c => this.drawDonut(c)); this.make('candy', c => this.drawCandy(c)); this.make('shield', c => this.drawShield(c)); this.make('freeze', c => this.drawFreeze(c)); this.make('heart', c => this.drawHeart(c)); }
  make(name, drawFn){ const cv = document.createElement('canvas'); cv.width = cv.height = this.size; const c = cv.getContext('2d'); c.translate(this.size/2, this.size/2); drawFn(c); this.cache[name] = cv; }
  get(name){ return this.cache[name]; }
  drawBroccoli(c){
    const florets=[{x:0,y:-20,r:20},{x:-18,y:-10,r:15},{x:18,y:-10,r:15},{x:-10,y:-30,r:12},{x:10,y:-30,r:12},{x:0,y:-36,r:10},{x:-26,y:2,r:10},{x:26,y:2,r:10}];
    const stalk=c.createLinearGradient(-8,8,8,42); stalk.addColorStop(0,'#def4a2'); stalk.addColorStop(1,'#8ba85a'); c.fillStyle=stalk; c.beginPath(); c.moveTo(-7,10); c.quadraticCurveTo(-10,30,-7,40); c.lineTo(7,40); c.quadraticCurveTo(10,30,7,10); c.closePath(); c.fill();
    florets.forEach(f=>{ const g=c.createRadialGradient(f.x-f.r*.35,f.y-f.r*.35,1,f.x,f.y,f.r); g.addColorStop(0,'#7bc04e'); g.addColorStop(.6,'#4e8f2f'); g.addColorStop(1,'#264d19'); c.fillStyle=g; c.beginPath(); c.arc(f.x,f.y,f.r,0,Math.PI*2); c.fill(); c.fillStyle='rgba(200,255,150,.35)'; c.beginPath(); c.arc(f.x-f.r*.28,f.y-f.r*.28,f.r*.25,0,Math.PI*2); c.fill(); });
  }
  drawBomb(c){ const g=c.createRadialGradient(-14,-16,2,0,0,42); g.addColorStop(0,'#666a70'); g.addColorStop(.35,'#242832'); g.addColorStop(1,'#050508'); c.fillStyle=g; c.beginPath(); c.arc(0,0,40,0,Math.PI*2); c.fill(); c.fillStyle='rgba(255,255,255,.35)'; c.beginPath(); c.ellipse(-12,-16,12,16,.3,0,Math.PI*2); c.fill(); c.fillStyle='#3a2a1a'; c.fillRect(-8,-48,16,10); c.strokeStyle='#111'; c.strokeRect(-8,-48,16,10); c.strokeStyle='#c9a766'; c.lineWidth=4; c.lineCap='round'; c.beginPath(); c.moveTo(0,-48); c.quadraticCurveTo(14,-62,6,-76); c.stroke(); }
  drawPizza(c){ c.save(); c.rotate(-.22); const cheese=c.createLinearGradient(0,-40,0,34); cheese.addColorStop(0,'#ffd984'); cheese.addColorStop(.7,'#ffbb55'); cheese.addColorStop(1,'#d37b18'); c.fillStyle=cheese; c.beginPath(); c.moveTo(0,-38); c.lineTo(-34,30); c.quadraticCurveTo(0,40,34,30); c.closePath(); c.fill(); c.fillStyle='#b5342a'; [{x:-10,y:-8,r:6},{x:8,y:0,r:7},{x:-6,y:14,r:5},{x:14,y:18,r:5}].forEach(p=>{ c.beginPath(); c.arc(p.x,p.y,p.r,0,Math.PI*2); c.fill();}); c.fillStyle='#b67c39'; c.beginPath(); c.moveTo(-36,34); c.quadraticCurveTo(0,48,36,34); c.lineTo(32,28); c.quadraticCurveTo(0,40,-32,28); c.closePath(); c.fill(); c.restore(); }
  drawDonut(c){ const g=c.createRadialGradient(-8,-8,0,0,0,40); g.addColorStop(0,'#e8b67a'); g.addColorStop(1,'#a56d35'); c.fillStyle=g; c.beginPath(); c.arc(0,0,40,0,Math.PI*2); c.fill(); c.fillStyle='#050510'; c.beginPath(); c.arc(0,0,12,0,Math.PI*2); c.fill(); const frost=c.createRadialGradient(-10,-10,0,0,0,40); frost.addColorStop(0,'#ffc0dd'); frost.addColorStop(1,'#ff7eb5'); c.fillStyle=frost; c.beginPath(); c.arc(0,0,34,0,Math.PI*2); c.fill(); c.fillStyle='#050510'; c.beginPath(); c.arc(0,0,12,0,Math.PI*2); c.fill(); }
  drawCandy(c){ c.save(); c.rotate(-.18); c.fillStyle='#c97ae0'; c.beginPath(); c.moveTo(-40,-10); c.lineTo(-22,-8); c.lineTo(-16,0); c.lineTo(-22,8); c.lineTo(-40,10); c.closePath(); c.fill(); c.beginPath(); c.moveTo(40,-10); c.lineTo(22,-8); c.lineTo(16,0); c.lineTo(22,8); c.lineTo(40,10); c.closePath(); c.fill(); const g=c.createLinearGradient(0,-25,0,25); g.addColorStop(0,'#ffd0f0'); g.addColorStop(.5,'#f093fb'); g.addColorStop(1,'#b855d8'); c.fillStyle=g; c.beginPath(); c.ellipse(0,0,28,20,0,0,Math.PI*2); c.fill(); c.restore(); }
  drawShield(c){ c.fillStyle='rgba(255,215,90,.95)'; c.beginPath(); c.moveTo(0,-38); c.lineTo(28,-22); c.lineTo(24,12); c.quadraticCurveTo(20,30,0,42); c.quadraticCurveTo(-20,30,-24,12); c.lineTo(-28,-22); c.closePath(); c.fill(); c.strokeStyle='#fff3b0'; c.lineWidth=4; c.stroke(); }
  drawFreeze(c){ c.strokeStyle='#a6f0ff'; c.lineWidth=6; for(let i=0;i<3;i++){ c.save(); c.rotate(i*Math.PI/3); c.beginPath(); c.moveTo(0,-42); c.lineTo(0,42); c.stroke(); c.beginPath(); c.moveTo(0,-26); c.lineTo(14,-34); c.moveTo(0,-26); c.lineTo(-14,-34); c.moveTo(0,26); c.lineTo(14,34); c.moveTo(0,26); c.lineTo(-14,34); c.stroke(); c.restore(); } }
  drawHeart(c){ c.fillStyle='#ff4b6b'; c.beginPath(); c.moveTo(0,30); c.bezierCurveTo(-36,8,-42,-20,-16,-26); c.bezierCurveTo(-2,-28,0,-16,0,-12); c.bezierCurveTo(0,-16,2,-28,16,-26); c.bezierCurveTo(42,-20,36,8,0,30); c.fill(); }
}

class Game {
  constructor(){
    this.canvas = $('game');
    this.ctx = this.canvas.getContext('2d', { alpha:false });
    this.audio = new AudioEngine();
    this.voice = new VoiceEngine();
    this.assets = new AssetManager();
    this.w = 0; this.h = 0; this.dpr = Math.min(devicePixelRatio || 1, 2);
    this.lastTs = 0; this.spawnClock = 0; this.bgmClock = 0; this.bgmStep = 0;
    this.state = 'menu';
    this.highScore = Number(localStorage.getItem(CONFIG.STORAGE_KEY) || 0);
    this.currentLevel = 'medium';
    this.pointerDown = false; this.lastPointer = null; this.trail = [];
    this.bindUI(); this.bindInput(); this.assets.init(); this.resize(); this.resetRuntime();
    this.updateHighScoreUI();
    requestAnimationFrame((t)=>this.loop(t));
  }
  async primeAudio(){ await this.audio.init(); await this.voice.init(); }
  bindUI(){
    document.querySelectorAll('[data-level]').forEach(btn => btn.addEventListener('click', async () => {
      await this.primeAudio();
      await this.voice.test();
      this.start(btn.dataset.level);
    }));
    $('restartBtn').addEventListener('click', async () => {
      await this.primeAudio();
      this.start(this.currentLevel);
    });
    $('testVoiceBtn').addEventListener('click', async () => {
      await this.primeAudio();
      const ok = await this.voice.test();
      if(ok) this.showAnn('Voice Online', 'Kenzie can talk now.', '#00f2fe');
      else this.showAnn('Voice Failed', 'Browser blocked speech.', '#ff4b2b');
    });
  }
  bindInput(){
    window.addEventListener('resize', ()=>this.resize());
    const start = (x,y)=>{ this.pointerDown = true; this.lastPointer = {x,y}; this.trail.push({x,y,life:1}); this.audio.play('whoosh'); };
    const move = (x,y)=>{
      if(!this.pointerDown || !this.lastPointer || this.state !== 'playing') return;
      const p1 = this.lastPointer, p2 = {x,y};
      this.handleSlash(p1, p2);
      this.lastPointer = p2;
      this.trail.push({x,y,life:1});
      if(this.trail.length > CONFIG.TRAIL_LENGTH) this.trail.shift();
    };
    const end = ()=>{ this.pointerDown = false; this.lastPointer = null; };
    this.canvas.addEventListener('pointerdown', e => start(e.clientX, e.clientY));
    this.canvas.addEventListener('pointermove', e => move(e.clientX, e.clientY));
    window.addEventListener('pointerup', end);
    window.addEventListener('pointercancel', end);
  }
  resize(){
    this.w = innerWidth; this.h = innerHeight;
    this.canvas.width = Math.floor(this.w * this.dpr); this.canvas.height = Math.floor(this.h * this.dpr);
    this.canvas.style.width = this.w + 'px'; this.canvas.style.height = this.h + 'px';
    this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
  }
  resetRuntime(){
    this.cfg = CONFIG.DIFFS[this.currentLevel];
    this.score = 0; this.lives = CONFIG.MAX_LIVES; this.combo = 0; this.bestCombo = 0; this.comboTimer = 0;
    this.wave = 1; this.waveSliced = 0; this.waveNeeded = this.cfg.waveGoal; this.bossActive = false;
    this.power = 0; this.isSugarRush = false; this.sugarTimer = 0; this.isFrozen = false; this.frozenTimer = 0; this.hasShield = false;
    this.annTimer = 0; this.tauntTimer = 0; this.actionTimer = 0; this.hitStop = 0; this.screenShake = 0;
    this.spawnClock = 0; this.bgmClock = 0; this.bgmStep = 0;
    this.objects = []; this.particles = []; this.floatTexts = []; this.shockwaves = []; this.trail = [];
    this.kenzie = { x: this.w / 2, targetX: this.w / 2, y: this.h * 0.14, throwAnim: 0, boss: false, hairPhase: 0 };
  }
  start(level){
    this.currentLevel = level;
    this.resetRuntime();
    this.state = 'playing';
    $('start').classList.add('hidden'); $('over').classList.add('hidden'); $('hud').style.display = 'block';
    this.updateHUD();
    this.showAnn('Begin', level.toUpperCase(), '#00f2fe');
    setTimeout(() => { this.voice.speak("Riley, let's see what you've got.", { interrupt:true, rate:1.0, pitch:1.45, volume:1.0, minGap:0 }); }, 180);
  }
  gameOver(){
    this.state = 'over';
    this.voice.stop();
    const isNew = this.score > this.highScore;
    if(isNew){ this.highScore = this.score; localStorage.setItem(CONFIG.STORAGE_KEY, String(this.highScore)); }
    $('goScore').textContent = this.score; $('goWave').textContent = this.wave; $('goCombo').textContent = this.bestCombo;
    $('newHs').classList.toggle('hidden', !isNew);
    $('hud').style.display = 'none'; $('over').classList.remove('hidden');
    this.updateHighScoreUI();
    setTimeout(()=>this.voice.speak(isNew ? 'New high score. Not completely hopeless, Riley.' : 'Better luck next time, Riley.', { rate:1.0, pitch:1.42, volume:1.0, interrupt:true, minGap:0 }), 350);
  }
  updateHighScoreUI(){
    if(this.highScore > 0){ $('startHs').classList.remove('hidden'); $('overHs').classList.remove('hidden'); $('startHsVal').textContent = this.highScore; $('overHsVal').textContent = this.highScore; }
    else { $('startHs').classList.add('hidden'); $('overHs').classList.add('hidden'); }
  }
  showAnn(title, sub='', color='#ffd700'){ $('annTitle').textContent = title; $('annTitle').style.color = color; $('annTitle').style.textShadow = `0 0 28px ${color},0 0 56px ${color}`; $('annSub').textContent = sub; $('ann').classList.add('show'); this.annTimer = 90; }
  showTaunt(msg, force=false){
    if(this.tauntTimer > 0 && !force) return;
    $('taunt').textContent = msg;
    $('taunt').classList.add('show');
    this.tauntTimer = 95;
    this.voice.speak(msg, { rate:1.0, pitch:1.48, volume:1.0, interrupt:true, minGap:0 });
  }
  createObject(type, x, y, vx, vy){
    const map = { broccoli:{r:28, score:10, color:'#5dc92d', sprite:'broccoli'}, bomb:{r:30, score:0, color:'#ff5555', sprite:'bomb'}, pizza:{r:28, score:14, color:'#ffbb55', sprite:'pizza'}, donut:{r:28, score:16, color:'#ff7eb5', sprite:'donut'}, candy:{r:24, score:18, color:'#d98cff', sprite:'candy'}, shield:{r:24, score:0, color:'#ffe05a', sprite:'shield', power:'shield'}, freeze:{r:24, score:0, color:'#a6f0ff', sprite:'freeze', power:'freeze'}, heart:{r:24, score:0, color:'#ff4b6b', sprite:'heart', power:'heart'} };
    this.objects.push({ type, x, y, vx, vy, rot:Math.random()*Math.PI*2, vr:(Math.random()-.5)*0.18, sliced:false, ...map[type] });
  }
  spawn(){
    const laneX = Math.random() * (this.w * 0.76) + this.w * 0.12;
    const spawnY = this.h + 50;
    const bossWave = this.wave > 0 && this.wave % 5 === 0;
    this.bossActive = bossWave;
    this.kenzie.boss = bossWave;
    const speedMult = this.cfg.speed * (this.isFrozen ? 0.55 : 1) * (1 + Math.min(.36, (this.wave - 1) * .03));
    const vx = (Math.random() - .5) * 5 * speedMult;
    const vy = -(11 + Math.random() * 4 + (bossWave ? 1.2 : 0)) * speedMult;
    let roll = Math.random();
    if(Math.random() < 0.055) return this.createObject('freeze', laneX, spawnY, vx, vy);
    if(Math.random() < 0.05) return this.createObject('shield', laneX, spawnY, vx, vy);
    if(Math.random() < 0.03) return this.createObject('heart', laneX, spawnY, vx, vy);
    if(roll < this.cfg.bombChance + (bossWave ? 0.08 : 0)) return this.createObject('bomb', laneX, spawnY, vx, vy);
    const foodRoll = Math.random();
    if(foodRoll < 0.52) return this.createObject('broccoli', laneX, spawnY, vx, vy);
    if(foodRoll < 0.72) return this.createObject('pizza', laneX, spawnY, vx, vy);
    if(foodRoll < 0.88) return this.createObject('donut', laneX, spawnY, vx, vy);
    return this.createObject('candy', laneX, spawnY, vx, vy);
  }
  handleSlash(p1, p2){
    const lineHit = (obj) => {
      const ax = p1.x, ay = p1.y, bx = p2.x, by = p2.y, px = obj.x, py = obj.y;
      const abx = bx-ax, aby = by-ay; const apx = px-ax, apy = py-ay; const ab2 = abx*abx + aby*aby || 1;
      let t = (apx*abx + apy*aby) / ab2; t = Math.max(0, Math.min(1, t)); const cx = ax + abx*t, cy = ay + aby*t; const dx = px-cx, dy = py-cy;
      return (dx*dx + dy*dy) <= (obj.r + 14) * (obj.r + 14);
    };
    let hitSomething = false;
    for(const obj of this.objects){
      if(obj.sliced) continue;
      if(!lineHit(obj)) continue;
      hitSomething = true;
      obj.sliced = true;
      if(obj.type === 'bomb') this.handleBombHit(obj);
      else if(obj.power) this.handlePowerUp(obj);
      else this.handleSlice(obj, p1, p2);
    }
    if(!hitSomething) this.audio.play('slash');
  }
  handleSlice(obj){
    this.audio.play('sliceHit');
    this.audio.play('shout');
    this.flashAction(this.combo >= 6 ? 'SAVAGE!' : 'KEEEYA!');
    const gained = obj.score * (this.isSugarRush ? 2 : 1);
    this.score += gained;
    this.combo++; this.bestCombo = Math.max(this.bestCombo, this.combo); this.comboTimer = 85;
    this.power = Math.min(100, this.power + 9);
    if(this.combo > 1) this.audio.play('combo', { combo:this.combo });
    this.burst(obj.x, obj.y, obj.color, 18); this.sparkBurst(obj.x, obj.y, '#ffffff', 10); this.addShockwave(obj.x, obj.y, 'rgba(255,255,255,.45)'); this.floatText(obj.x, obj.y, '+' + gained, '#fff', 24);
    this.waveSliced++;
    if(this.power >= 100 && !this.isSugarRush){ this.isSugarRush = true; this.sugarTimer = 360; this.audio.play('power'); this.showAnn('Sugar Rush', 'Double score. More speed.', '#f5576c'); this.voice.speak('Sugar rush. Try to keep up, Riley.', { interrupt:true, rate:1.0, pitch:1.42, volume:1.0, minGap:0 }); }
    if(this.waveSliced >= this.waveNeeded){
      this.wave++;
      this.waveSliced = 0;
      this.waveNeeded = this.cfg.waveGoal + Math.floor(this.wave * 1.4);
      this.audio.play(this.wave % 5 === 0 ? 'boss' : 'wave');
      this.showAnn(this.wave % 5 === 0 ? 'Boss Wave' : 'Wave Clear', this.wave % 5 === 0 ? 'Kenzie is angry now.' : 'Next wave incoming.', this.wave % 5 === 0 ? '#ff4b2b' : '#ffd700');
      if(this.wave % 5 === 0) this.showTaunt(CONFIG.BOSS_TAUNTS[Math.floor(Math.random()*CONFIG.BOSS_TAUNTS.length)], true);
      else this.voice.speak(`Wave ${this.wave}. Keep swinging, Riley.`, { interrupt:true, rate:1.0, pitch:1.38, volume:1.0, minGap:0 });
    }
  }
  drawParticles(ctx){
    for(const p of this.particles){ ctx.globalAlpha = Math.max(0,p.life); ctx.fillStyle = p.color; if(p.type === 'spark'){ ctx.fillRect(p.x,p.y,p.size*2,.9); } else { ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); } }
    ctx.globalAlpha = 1;
    for(const s of this.shockwaves){ ctx.globalAlpha = s.life; ctx.strokeStyle = s.color; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.stroke(); }
    ctx.globalAlpha = 1;
    for(const f of this.floatTexts){ ctx.globalAlpha = f.life; ctx.font = `900 ${f.size}px Georgia, serif`; ctx.textAlign = 'center'; ctx.lineWidth = 4; ctx.strokeStyle = '#000'; ctx.strokeText(f.text, f.x, f.y); ctx.fillStyle = f.color; ctx.fillText(f.text, f.x, f.y); }
    ctx.globalAlpha = 1;
  }
  drawTrail(ctx){
    if(this.trail.length < 2) return;
    for(let i=1;i<this.trail.length;i++){
      const a=this.trail[i-1], b=this.trail[i];
      ctx.globalAlpha = b.life * 0.9;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.shadowColor = CONFIG.COLORS.cyan; ctx.shadowBlur = 18; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.strokeStyle = CONFIG.COLORS.cyan; ctx.lineWidth = 12; ctx.globalAlpha = b.life * 0.28; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }
  render(){
    const ctx=this.ctx; ctx.save();
    if(this.screenShake > 0){ ctx.translate((Math.random()-.5)*10, (Math.random()-.5)*10); }
    this.drawBackground(ctx); this.drawKenzie(ctx); this.drawObjects(ctx); this.drawParticles(ctx); this.drawTrail(ctx);
    ctx.restore();
  }
  loop(ts){
    const dt = Math.min(50, ts - (this.lastTs || ts)); this.lastTs = ts;
    this.tickBGM(dt); this.update(dt); this.render();
    requestAnimationFrame((t)=>this.loop(t));
  }
}

window.game = new Game();
</script>
