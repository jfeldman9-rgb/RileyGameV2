<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
    <title>Riley vs Kenzie - Definitive Edition</title>
    <style>
        * {
            box-sizing: border-box
        }
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #000008;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: crosshair;
        }
        canvas {
            position: fixed;
            inset: 0;
            display: block;
            image-rendering: auto;
        }
        .screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 40%, rgba(100, 20, 200, .28) 0%, rgba(4, 2, 16, .985) 70%);
            backdrop-filter: blur(2px);
        }
        .hidden {
            display: none !important
        }
        .title {
            font-family: 'Georgia', serif;
            font-size: clamp(38px, 9vw, 76px);
            font-weight: 900;
            color: #fff;
            margin: 0 0 6px;
            text-shadow: 0 0 30px #ff4cf0, 0 0 70px #8d2fff, 0 0 120px rgba(180, 40, 255, .7);
        }
        .sub {
            font-size: clamp(12px, 3vw, 17px);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .7);
            margin: 0 0 22px;
            text-shadow: 0 0 20px rgba(200, 150, 255, .5);
        }
        .howto {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 960px;
            margin-bottom: 20px;
        }
        .tip {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 11px;
            color: rgba(255, 255, 255, .75);
            backdrop-filter: blur(8px);
        }
        .tip strong {
            display: block;
            font-size: 20px;
            color: #fff;
            margin-bottom: 2px;
        }
        .btn-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 6px;
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 14px 32px;
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-size: clamp(14px, 4vw, 20px);
            cursor: pointer;
            transition: transform .1s, filter .2s;
            background: linear-gradient(135deg, #9b00ff, #00d4ff);
            box-shadow: 0 8px 28px rgba(140, 0, 255, .5);
        }
        button:hover {
            filter: brightness(1.15);
            transform: translateY(-2px);
        }
        button:active {
            transform: scale(.94);
        }
        .btn-easy {
            background: linear-gradient(135deg, #00c6ff, #0060d0);
        }
        .btn-medium {
            background: linear-gradient(135deg, #f093fb, #e04070);
        }
        .btn-hard {
            background: linear-gradient(135deg, #ff416c, #e02020);
        }
        .hs {
            font-size: 15px;
            color: #ffd700;
            font-weight: 800;
            background: rgba(255, 215, 0, .1);
            border: 1px solid rgba(255, 215, 0, .3);
            padding: 8px 20px;
            border-radius: 999px;
            margin-top: 16px;
        }
        #hud {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        .hud-box {
            position: absolute;
            background: rgba(8, 6, 24, .55);
            border: 1px solid rgba(255, 255, 255, .15);
            border-radius: 18px;
            padding: 12px 20px;
            backdrop-filter: blur(14px);
        }
        .hud-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, .5);
            text-transform: uppercase;
            font-weight: 800;
        }
        .hud-value {
            font-size: 38px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, .4);
        }
        #scoreBox {
            top: 14px;
            left: 14px;
        }
        #waveBox {
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        #lifeBox {
            top: 14px;
            right: 14px;
            text-align: right;
        }
        #lives {
            font-size: 26px;
        }
        #combo {
            font-size: 15px;
            color: #ffeb3b;
            font-weight: 900;
            min-height: 20px;
            text-shadow: 0 0 16px rgba(255, 170, 0, .9);
            margin-top: 2px;
        }
        #powerWrap {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%);
            width: min(260px, 65vw);
        }
        #powerBar {
            height: 10px;
            background: rgba(255, 255, 255, .06);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, .15);
            overflow: hidden;
        }
        #powerFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00e0ff, #b040ff);
            border-radius: 999px;
            transition: width .15s;
        }
        #powerFill.rush {
            background: linear-gradient(90deg, #ff4080, #ffe040);
            animation: pulseBar .5s infinite;
        }
        @keyframes pulseBar {
            0%,
            100% {
                filter: brightness(1)
            }
            50% {
                filter: brightness(1.4)
            }
        }
        #pills {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .pill {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            background: rgba(110, 200, 255, .95);
            color: #001a2e;
        }
        .shield {
            background: rgba(255, 215, 60, .95);
            color: #2e1c00;
        }
        .rush {
            background: rgba(255, 80, 100, .95);
            color: #fff;
        }
        #ann,
        #taunt,
        #action {
            position: fixed;
            left: 50%;
            transform: translate(-50%, -50%) scale(.6);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            text-align: center;
            transition: all .3s cubic-bezier(.175, .885, .32, 1.3);
        }
        #ann {
            top: 40%;
        }
        #ann.show,
        #taunt.show,
        #action.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1)
        }
        #annTitle {
            font-family: 'Georgia', serif;
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
        }
        #annSub {
            font-size: 17px;
            color: rgba(255, 255, 255, .85);
            font-weight: 700;
            margin-top: 4px;
        }
        #taunt {
            top: 27%;
            font-size: clamp(22px, 5vw, 44px);
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 0 24px #ff0050, 0 0 50px rgba(255, 0, 70, .7);
        }
        #action {
            top: 50%;
            font-family: 'Georgia', serif;
            font-size: clamp(52px, 12vw, 110px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px #ff0060, 0 0 70px #ff0060, 5px 5px 0 #000;
        }
        .stat-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 14px 0 20px;
        }
        .stat-card {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 16px;
            padding: 10px 18px;
            min-width: 120px;
            backdrop-filter: blur(8px);
        }
        .stat-val {
            font-size: 34px;
            font-weight: 900;
            color: #ffd700;
        }
        .stat-lbl {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, .45);
            text-transform: uppercase;
        }
        .new-hs {
            font-size: 19px;
            font-weight: 900;
            color: #ffd700;
            background: rgba(255, 215, 0, .1);
            border: 1px solid rgba(255, 215, 0, .4);
            padding: 8px 24px;
            border-radius: 999px;
            margin-bottom: 16px;
            animation: bounceHs .6s infinite alternate;
        }
        @keyframes bounceHs {
            0% {
                transform: scale(1)
            }
            100% {
                transform: scale(1.06)
            }
        }
    </style>
</head>
<body>

        class AudioEngine {
            constructor() { this.ctx = null;
                this.master = null;
                this.ready = false;
                this.bgmGain = null;
                this.sfxGain = null; }
            async init() {
                if (!this.ctx) {
                    this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.master.gain.value = 0.75;
                    this.bgmGain = this.ctx.createGain();
                    this.sfxGain = this.ctx.createGain();
                    this.bgmGain.gain.value = 0.5;
                    this.sfxGain.gain.value = 0.7;
                    this.bgmGain.connect(this.master);
                    this.sfxGain.connect(this.master);
                    this.master.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') await this.ctx.resume();
                this.ready = true;
            }
            tone(type, start, end, duration, volume, detune = 0, output = this.sfxGain) {
                if (!this.ready) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.detune.value = detune;
                osc.frequency.setValueAtTime(Math.max(20, start), t);
                osc.frequency.exponentialRampToValueAtTime(Math.max(20, end), t + duration);
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.linearRampToValueAtTime(volume, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                osc.connect(gain);
                gain.connect(output);
                osc.start(t);
                osc.stop(t + duration + 0.03);
            }
            noise(duration, volume, hp, output = this.sfxGain) {
                if (!this.ready) return;
                const t = this.ctx.currentTime;
                const size = Math.floor(this.ctx.sampleRate * duration);
                const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
                const src = this.ctx.createBufferSource();
                const filter = this.ctx.createBiquadFilter();
                const gain = this.ctx.createGain();
                src.buffer = buffer;
                filter.type = 'highpass';
                filter.frequency.value = hp;
                gain.gain.setValueAtTime(volume, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
                src.connect(filter);
                filter.connect(gain);
                gain.connect(output);
                src.start(t);
                src.stop(t + duration + 0.03);
            }
            playBGM(note) { this.tone('square', note, note, 0.2, 0.03, 0, this.bgmGain); }
            play(name, combo = 1) {
                if (name === 'slash') { this.tone('triangle', 1200, 200, 0.1, 0.08);
                    this.noise(0.04, 0.04, 2800); } else if (name === 'hit') { this.tone('square', 1400, 180, 0.11,
                    0.1); } else if (name === 'crit') { this.tone('square', 1800, 400, 0.14, 0.13); } else if (name ===
                    'bomb') { this.tone('sawtooth', 140, 28, 0.6, 0.16);
                    this.noise(0.4, 0.14, 80); } else if (name === 'stinkbomb') { this.tone('sawtooth', 60, 20, 0.7,
                    0.12); } else if (name === 'power') { [440, 550, 660, 880].forEach((f, i) => setTimeout(() =>
                        this.tone('triangle', f, f, 0.1, 0.05), i * 45)); } else if (name === 'freeze') { this
                    .tone('sine', 1600, 200, 0.45, 0.07); } else if (name === 'life') { [523, 659, 784].forEach((
                    f, i) => setTimeout(() => this.tone('sine', f, f, 0.13, 0.05), i * 50)); } else if (name ===
                    'wave') { [330, 440, 550, 660].forEach((f, i) => setTimeout(() => this.tone('square', f, f,
                        0.13, 0.04), i * 70)); } else if (name === 'combo') { this.tone('triangle', Math.min(
                    1800, 600 + combo * 100), 380, 0.07, 0.06); } else if (name === 'poop') { this.tone(
                    'square', 180, 300, 0.2, 0.05); } else if (name === 'boss') { this.tone('square', 200, 90,
                    0.5, 0.09); } else if (name === 'ult') { [220, 330, 440, 550, 660, 880].forEach((f, i) =>
                    setTimeout(() => this.tone('sawtooth', f, f * 1.4, 0.14, 0.08), i * 30)); } else if (name ===
                    'rage') { [110, 165, 220, 275].forEach((f, i) => setTimeout(() => this.tone('sawtooth', f, f *
                        2, 0.2, 0.1), i * 60)); } else if (name === 'cutscene_jingle') { [523, 659, 784,
                    1047
                ].forEach((f, i) => setTimeout(() => this.tone('triangle', f, f, 0.2, 0.08), i * 120)); }
            }
        }

        class VoiceEngine {
            constructor() {
                this.enabled = 'speechSynthesis' in window;
                this.voices = [];
                this.lastSpeak = 0;
                this.ready = false;
            }
            init() {
                if (!this.enabled) return;
                this.loadVoices();
                this.ready = true;
            }
            loadVoices() { try { this.voices = speechSynthesis.getVoices(); } catch { this.voices = []; } }
            pick() { return this.voices.find(v => v.lang.startsWith('en-US')) || null; }
            speakNow(text) {
                if (!this.enabled) return false;
                const now = performance.now();
                if (now - this.lastSpeak < 250) return false;
                this.lastSpeak = now;
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.pitch = 1.4;
                u.rate = 1.0;
                u.volume = 0.9;
                const voice = this.pick();
                if (voice) u.voice = voice;
                speechSynthesis.cancel();
                speechSynthesis.speak(u);
                return true;
            }
            test() { return this.speakNow("Riley, let's see what you've got."); }
            stop() { if (this.enabled) speechSynthesis.cancel(); }
        }

        class AssetManager {
            constructor() { this.size = 172;
                this.cache = {}; }
            init() {
                this.make('broccoli', c => this.drawBroccoli(c));
                this.make('bomb', c => this.drawBomb(c));
                this.make('stinkbomb', c => this.drawStinkBomb(c));
                this.make('poop', c => this.drawPoop(c));
                this.make('pizza', c => this.drawPizza(c));
                this.make('donut', c => this.drawDonut(c));
                this.make('candy', c => this.drawCandy(c));
                this.make('freeze', c => this.drawFreeze(c));
                this.make('shield', c => this.drawShield(c));
                this.make('heart', c => this.drawHeart(c));
                this.make('kenzie_idle', c => this.drawKenzieSprite(c, false, false));
                this.make('kenzie_rage', c => this.drawKenzieSprite(c, true, false));
                this.make('kenzie_attack', c => this.drawKenzieSprite(c, false, true));
                this.make('riley', c => this.drawRiley(c));
                this.make('dojo', c => this.drawDojo(c));
            }
            make(name, fn) { const cv = document.createElement('canvas');
                cv.width = cv.height = this.size; const c = cv.getContext('2d');
                c.translate(this.size / 2, this.size / 2);
                fn(c);
                this.cache[name] = cv; }
            get(name) { return this.cache[name]; }
            drawBroccoli(c) {
                const florets = [{ x: 0, y: -26, r: 26 }, { x: -22, y: -13, r: 19 }, { x: 22, y: -13, r: 19 }, { x: -14,
                    y: -37, r: 15 }, { x: 14, y: -37, r: 15 }, { x: 0, y: -46, r: 13 }];

        class Cutscene {
            constructor(game) {
                this.game = game;
                this.phase = 0;
                this.timer = 0;
                this.texts = CONFIG.cutsceneTexts;
                this.currentText = 0;
                this.textAlpha = 0;
                this.skip = false;
            }
            update(dt) {
                this.timer += dt;
                if (this.phase === 0 && this.timer > 2000) { this.phase = 1;
                    this.timer = 0; }
                if (this.phase === 1) {
                    this.textAlpha = Math.min(1, this.textAlpha + dt * 0.002);
                    if (this.timer > 2500 && this.currentText < this.texts.length - 1) {
                        this.currentText++;
                        this.timer = 0;
                        this.textAlpha = 0;
                    } else if (this.timer > 2500 && this.currentText >= this.texts.length - 1) {
                        this.phase = 2;
                    }
                }
                if (this.phase === 2) { this.game.state = 'menu';
                    $('start').classList.remove('hidden'); }
            }
            draw(c) {
                c.fillStyle = '#0a0010';
                c.fillRect(0, 0, this.game.w, this.game.h);
                if (this.phase === 0) {
                    c.globalAlpha = Math.min(1, this.timer / 1000);
                    c.fillStyle = '#ffffff';
                    c.font = 'bold 30px Georgia';
                    c.textAlign = 'center';
                    c.fillText('Riley vs Kenzie', this.game.w / 2, this.game.h / 2);
                    c.globalAlpha = 1;
                } else if (this.phase === 1) {
                    const dojo = this.game.assets.get('dojo');
                    c.drawImage(dojo, this.game.w / 2 - 86, this.game.h / 2 - 86, 172, 172);
                    const kenzie = this.game.assets.get('kenzie_idle');
                    c.drawImage(kenzie, this.game.w / 2 - 100, this.game.h / 2 - 86, 120, 120);
                    const riley = this.game.assets.get('riley');
                    c.drawImage(riley, this.game.w / 2 + 10, this.game.h / 2 - 86, 120, 120);
                    c.globalAlpha = this.textAlpha;
                    c.fillStyle = '#ffffff';
                    c.font = 'bold 16px Inter';
                    c.textAlign = 'center';
                    c.fillText(this.texts[this.currentText], this.game.w / 2, this.game.h - 60);
                    c.globalAlpha = 1;
                }
            }
        }

        class Game {
            constructor() {
                this.canvas = $('game');
                this.ctx = this.canvas.getContext('2d');
                this.audio = new AudioEngine();
                this.voice = new VoiceEngine();
                this.assets = new AssetManager();
                this.assets.init();
                this.best = Number(localStorage.getItem(CONFIG.storageKey) || 0);
                this.state = 'cutscene';
                this.cutscene = new Cutscene(this);
                this.level = 'medium';
                this.w = 0;
                this.h = 0;
                this.dpr = Math.min(devicePixelRatio || 1, 2);
                this.lastTime = 0;
                this.starField = [];
                this.freezeOverlay = 0;
                this.snowflakes = [];
                this.stinkClouds = [];
                this.rageMode = false;
                this.rageTimer = 0;
                this.ragePulse = 0;
                this.totalSliced = 0;
                this.poopsSliced = 0;
                this.freezesTriggered = 0;
                this.shieldsUsed = 0;
                this.stinkHits = 0;
                this.survivedRage = false;
                this.rageStartLives = 3;
                this.achievements = JSON.parse(localStorage.getItem('riley_achieve') || '[]');
                this.achievePopups = [];
                this.trail = [];
                $('start').classList.add('hidden');
                this.bindUI();
                this.bindInput();
                this.resize();
                this.generateStars();
                this.reset();
                this.updateBestUI();
                requestAnimationFrame(t => this.loop(t));
            }
            async prime() { await this.audio.init();
                this.voice.init(); }
            generateStars() {
                this.starField = [];
                for (let i = 0; i < 180; i++) {
                    this.starField.push({
                        x: Math.random() * this.w,
                        y: Math.random() * this.h,
                        size: Math.random() * 2.2 + 0.4,
                        speed: Math.random() * 0.2 + 0.05,
                        color: '#ffffff'
                    });
                }
            }
            bindUI() {
                document.querySelectorAll('[data-level]').forEach(btn => btn.addEventListener('click', (e) => {
                    this.voice.test();
                    this.prime().then(() => this.start(btn.dataset.level));
                }));
                $('restartBtn').addEventListener('click', () => { this.prime().then(() => this.start(this.level)); });
                $('testVoiceBtn').addEventListener('click', () => this.voice.test());
                addEventListener('resize', () => { this.resize();
                    this.generateStars(); });
            }
            bindInput() {
                this.pointerDown = false;
                this.lastPoint = null;
                this.trail = [];
                this.swipeVelocity = 0;
                const start = (x, y) => {
                    if (this.state === 'cutscene') { this.cutscene.phase = 2; return; }
                    this.pointerDown = true;
                    this.lastPoint = { x, y };
                    this.trail.push({ x, y, life: 1, vel: 0 });
                    this.audio.play('slash');
                };
                const move = (x, y) => {
                    if (!this.pointerDown || this.state !== 'playing') return;
                    const p2 = { x, y };
                    const dx = p2.x - this.lastPoint.x;
                    const dy = p2.y - this.lastPoint.y;
                    this.swipeVelocity = Math.sqrt(dx * dx + dy * dy);
                    this.sliceBetween(this.lastPoint, p2);
                    this.lastPoint = p2;
                    this.trail.push({ x, y, life: 1, vel: this.swipeVelocity });
                    if (this.trail.length > CONFIG.trailMax) this.trail.shift();
                };
                const end = () => { this.pointerDown = false;
                    this.lastPoint = null; };
                this.canvas.addEventListener('pointerdown', e => start(e.clientX, e.clientY));
                this.canvas.addEventListener('pointermove', e => move(e.clientX, e.clientY));
                addEventListener('pointerup', end);
                addEventListener('pointercancel', end);
            }
            resize() {
                this.w = innerWidth;
                this.h = innerHeight;
                this.canvas.width = Math.floor(this.w * this.dpr);
                this.canvas.height = Math.floor(this.h * this.dpr);
                this.canvas.style.width = this.w + 'px';
                this.canvas.style.height = this.h + 'px';
                this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
            }
            reset() {
                this.cfg = CONFIG.levels[this.level];
                this.score = 0;
                this.lives = CONFIG.maxLives;
                this.wave = 1;
                this.waveSliced = 0;
                this.waveGoal = this.cfg.waveGoal;
                this.combo = 0;
                this.bestCombo = 0;
                this.power = 0;
                this.isRush = false;
                this.isFrozen = false;
                this.hasShield = false;
                this.rageMode = false;
                this.rageTimer = 0;
                this.freezeOverlay = 0;
                this.objects = [];
                this.particles = [];
                this.floaters = [];
                this.rings = [];
                this.shockwaves = [];
                this.snowflakes = [];
                this.stinkClouds = [];
                this.trail = [];
                this.kenzie = { x: this.w * 0.5, targetX: this.w * 0.5, y: this.h * 0.14 };
                this.totalSliced = 0;
                this.poopsSliced = 0;
                this.freezesTriggered = 0;
                this.shieldsUsed = 0;
                this.stinkHits = 0;
                this.survivedRage = false;
                this.rageStartLives = this.lives;
                this.kenzieFrame = 0;
                this.updateHUD();
            }
            start(level) {
                this.level = level;
                this.reset();
                this.state = 'playing';
                $('start').classList.add('hidden');
                $('over').classList.add('hidden');
                $('hud').style.display = 'block';
                this.showAnn('Battle!', level.toUpperCase(), '#00f2fe');
                this.voice.speakNow("Let's dance, Riley!");
            }
            updateBestUI() {
                if (this.best > 0) {
                    $('startHs').classList.remove('hidden');
                    $('overHs').classList.remove('hidden');
                    $('startHsVal').textContent = this.best;
                    $('overHsVal').textContent = this.best;
                }
            }
            showAnn(title, sub, color) {
                $('annTitle').textContent = title;
                $('annTitle').style.color = color;
                $('annSub').textContent = sub || '';
                $('ann').classList.add('show');
                setTimeout(() => $('ann').classList.remove('show'), 1500);
            }
            showTaunt(text) {
                $('taunt').textContent = text;
                $('taunt').classList.add('show');
                setTimeout(() => $('taunt').classList.remove('show'), 2000);
                this.voice.speakNow(text);
            }
            flashAction(text) {
                $('action').textContent = text;
                $('action').classList.add('show');
                setTimeout(() => $('action').classList.remove('show'), 800);
            }
            checkAchievements() {
                ACHIEVEMENTS.forEach(a => {
                    if (!this.achievements.includes(a.id) && a.check(this)) {
                        this.achievements.push(a.id);
                        localStorage.setItem('riley_achieve', JSON.stringify(this.achievements));
                        this.achievePopups.push({ name: a.name, desc: a.desc, timer: 200 });
                    }
                });
            }
            updateHUD() {
                $('score').textContent = this.score;
                $('wave').textContent = this.wave;
                $('lives').textContent = '❤️'.repeat(this.lives) + (this.hasShield ? '🛡️' : '');
                $('combo').textContent = this.combo > 1 ? 'Combo x' + this.combo : '';
                $('powerFill').style.width = Math.min(100, this.power) + '%';
                $('powerFill').className = this.isRush ? 'rush' : '';
                $('pills').innerHTML = (this.isFrozen ? '<span class="pill">❄️</span>' : '') + (this.hasShield ?
                    '<span class="pill shield">🛡️</span>' : '') + (this.isRush ? '<span class="pill rush">⚡</span>' :
                    '') + (this.rageMode ? '<span class="pill rush" style="background:#ff2020">🔥</span>' : '');
            }
            spawnObject(type, x, y, vx, vy) {
                const defs = {
                    broccoli: { r: 28, score: 10, sprite: 'broccoli', color: '#5ec92d' },
                    pizza: { r: 28, score: 14, sprite: 'pizza', color: '#ffb455' },
                    donut: { r: 28, score: 16, sprite: 'donut', color: '#ff7eb5' },
                    candy: { r: 24, score: 18, sprite: 'candy', color: '#d98cff' },
                    poop: { r: 26, score: 25, sprite: 'poop', color: '#8a5028' },
                    bomb: { r: 30, score: 0, sprite: 'bomb', color: '#ff5555' },
                    stinkbomb: { r: 32, score: 0, sprite: 'stinkbomb', color: '#80b030' },
                    freeze: { r: 24, score: 0, sprite: 'freeze', color: '#a6f0ff', power: 'freeze' },
                    shield: { r: 24, score: 0, sprite: 'shield', color: '#ffe05a', power: 'shield' },
                    heart: { r: 24, score: 0, sprite: 'heart', color: '#ff516d', power: 'heart' }
                };
                this.objects.push({ ...defs[type], x, y, vx, vy, rot: Math.random() * Math.PI * 2, vr: (Math.random() -
                        0.5) * 0.2, dead: false });
            }
            spawn() {
                const x = this.w * 0.1 + Math.random() * this.w * 0.8;
                const y = this.h + 70;
                const speed = this.cfg.speed * (1 + this.wave * 0.02) * (this.isFrozen ? 0.5 : 1) * (this.rageMode ? 1.2 :
                    1);
                const vx = (Math.random() - 0.5) * 5 * speed;
                const vy = -(12 + Math.random() * 5) * speed;
                const r = Math.random();
                if (r < 0.03) return this.spawnObject('heart', x, y, vx, vy);
                if (r < 0.08) return this.spawnObject('freeze', x, y, vx, vy);
                if (r < 0.13) return this.spawnObject('shield', x, y, vx, vy);
                if (r < 0.18) return this.spawnObject('poop', x, y, vx, vy);
                if (r < 0.18 + this.cfg.stinkChance) return this.spawnObject('stinkbomb', x, y, vx, vy);
                if (r < 0.18 + this.cfg.stinkChance + this.cfg.bombChance) return this.spawnObject('bomb', x, y, vx, vy);
                const f = Math.random();
                if (f < 0.5) return this.spawnObject('broccoli', x, y, vx, vy);
                if (f < 0.75) return this.spawnObject('pizza', x, y, vx, vy);
                if (f < 0.9) return this.spawnObject('donut', x, y, vx, vy);
                return this.spawnObject('candy', x, y, vx, vy);
            }
            sliceBetween(p1, p2) {
                if (!p1 || !p2) return;
                let hit = false;
                for (const o of this.objects) {
                    if (o.dead) continue;
                    if (this.segmentHitsCircle(p1, p2, o)) {
                        o.dead = true;
                        hit = true;
                        if (o.type === 'bomb') this.onBomb(o);
                        else if (o.type === 'stinkbomb') this.onStinkBomb(o);
                        else if (o.type === 'poop') { this.poopsSliced++;
                            this.onSlice(o); } else if (o.power) this.onPower(o);
                        else this.onSlice(o);
                    }
                }
                if (!hit) this.audio.play('slash');
            }
            segmentHitsCircle(a, b, o) { const abx = b.x - a.x,
                    aby = b.y - a.y; const apx = o.x - a.x,
                    apy = o.y - a.y; const ab2 = abx * abx + aby * aby || 1; let t = (apx * abx + apy * aby) / ab2;
                t = Math.max(0, Math.min(1, t)); const cx = a.x + abx * t,
                    cy = a.y + aby * t; const dx = o.x - cx,
                    dy = o.y - cy; return dx * dx + dy * dy <= (o.r + 16) * (o.r + 16); }
            onSlice(o) {
                const multiplier = (this.isRush ? 2 : 1) * (this.rageMode ? 1.5 : 1);
                const gained = Math.floor(o.score * multiplier);
                this.score += gained;
                this.combo++;
                this.totalSliced++;
                this.bestCombo = Math.max(this.bestCombo, this.combo);
                this.power = Math.min(100, this.power + 8);
                this.waveSliced++;
                this.audio.play('hit');
                if (this.combo >= 15) this.flashAction('SAVAGE!');
                else if (this.combo >= 5) this.flashAction('NICE!');
                if (this.power >= 100 && !this.isRush) { this.isRush = true;
                    this.rushTimer = 7000;
                    this.audio.play('ult');
                    this.showAnn('SUGAR RUSH', 'Double score!', '#ff4080'); }
                if (this.waveSliced >= this.waveGoal) { this.wave++;
                    this.waveSliced = 0;
                    this.waveGoal = this.cfg.waveGoal + Math.floor(this.wave * 1.5); if (this.wave % 5 === 0) { this
                            .rageMode = true;
                        this.rageTimer = 8000;
                        this.rageStartLives = this.lives;
                        this.audio.play('rage');
                        this.showAnn('BOSS RAGE', 'Kenzie goes berserk!', '#ff2020');
                        this.showTaunt(CONFIG.bossTaunts[Math.floor(Math.random() * CONFIG.bossTaunts.length)]); } else {
                        this.audio.play('wave');
                        this.showAnn('Wave ' + this.wave, '', '#ffd700');
                        this.showTaunt(CONFIG.taunts[Math.floor(Math.random() * CONFIG.taunts.length)]); } }
                this.checkAchievements();
                this.updateHUD();
            }
            onPoop(o) { this.poopsSliced++;
                this.onSlice(o);
                this.flashAction('💩 POOP!'); }
            onPower(o) {
                if (o.power === 'freeze') { this.isFrozen = true;
                    this.freezeTimer = 5000;
                    this.freezeOverlay = 1;
                    this.freezesTriggered++;
                    this.audio.play('freeze');
                    this.showAnn('FREEZE', '', '#a6f0ff'); } else if (o.power === 'shield') { this.hasShield = true;
                    this.audio.play('power'); } else if (o.power === 'heart') { this.lives = Math.min(CONFIG.maxLives,
                        this.lives + 1);
                    this.audio.play('life'); }
                this.checkAchievements();
                this.updateHUD();
            }
            onBomb(o) {
                this.audio.play('bomb');
                this.shakeTimer = 15;
                this.combo = 0;
                if (this.hasShield) { this.hasShield = false;
                    this.shieldsUsed++; } else { this.lives--; } if (this.lives <= 0) this.endGame();
                this.updateHUD();
            }
            onStinkBomb(o) {
                this.audio.play('stinkbomb');
                this.stinkClouds.push({ x: o.x, y: o.y, r: 15, life: 1 });
                this.stinkHits++;
                this.combo = 0;
                if (this.hasShield) { this.hasShield = false; } else { this.lives--; } if (this.lives <= 0) this
                .endGame();
                this.updateHUD();
            }
            endGame() {
                this.state = 'over'; if (this.rageMode && this.lives === this.rageStartLives) this.survivedRage =
                    true;
                this.checkAchievements(); if (this.score > this.best) { this.best = this.score;
                    localStorage.setItem(CONFIG.storageKey, String(this.best)); }
                $('goScore').textContent = this.score;
                $('goWave').textContent = this.wave;
                $('goCombo').textContent = this.bestCombo;
                $('newHs').classList.toggle('hidden', this.score <= this.best);
                $('hud').style.display = 'none';
                $('over').classList.remove('hidden');
                this.updateBestUI();
                this.voice.speakNow(this.score > this.best ? 'New high score!' : 'Better luck next time.');
            }
            update(dt) {
                if (this.state === 'cutscene') { this.cutscene.update(dt); return; }
                if (this.state !== 'playing') return;
                this.spawnTimer = (this.spawnTimer || 0) + dt; const spawnEvery = Math.max(150, this.cfg.spawnMs - this
                    .wave * 10) * (this.isFrozen ? 2 : 1) * (this.rageMode ? 0.7 : 1); while (this.spawnTimer >=
                    spawnEvery) { this.spawnTimer -= spawnEvery;
                    this.spawn(); } if (this.isRush) { this.rushTimer -= dt; if (this.rushTimer <= 0) { this.isRush =
                        false;
                        this.power = 0; } } if (this.isFrozen) { this.freezeTimer -= dt; if (this.freezeTimer <=
                    0) { this.isFrozen = false;
                    this.freezeOverlay = 0; } } if (this.rageMode) { this.rageTimer -= dt; if (this.rageTimer <=
                    0) { this.rageMode = false; } }
                const gravity = CONFIG.gravityBase * (this.isFrozen ? 0.3 : 1);
                this.kenzie.targetX += Math.sin(performance.now() * 0.001) * (this.rageMode ? 3 : 1);
                this.kenzie.targetX = Math.max(100, Math.min(this.w - 100, this.kenzie.targetX));
                this.kenzie.x += (this.kenzie.targetX - this.kenzie.x) * 0.04;
                for (const o of this.objects) { if (o.dead) continue;
                    o.x += o.vx;
                    o.y += o.vy;
                    o.vy += gravity;
                    o.rot += o.vr; }
                this.objects = this.objects.filter(o => !o.dead && o.y < this.h + 150 && o.x > -50 && o.x < this.w + 50);
                for (const t of this.trail) { t.life -= 0.05; }
                this.trail = this.trail.filter(t => t.life > 0);
                this.stinkClouds = this.stinkClouds.filter(sc => { sc.r += 2;
                    sc.life -= 0.01; return sc.life > 0; });
                this.achievePopups = this.achievePopups.filter(p => { p.timer--; return p.timer > 0; });
            }
            drawBackground(c) {
                const g = c.createLinearGradient(0, 0, 0, this.h);
                g.addColorStop(0, this.rageMode ? '#1a0408' : '#050318');
                g.addColorStop(1, this.rageMode ? '#300a10' : '#0e0828');
                c.fillStyle = g;
                c.fillRect(0, 0, this.w, this.h);
                for (const star of this.starField) {
                    star.twinkle = (star.twinkle || 0) + 0.02;
                    c.globalAlpha = 0.5 + Math.sin(star.twinkle) * 0.2;
                    c.fillStyle = star.color;
                    c.beginPath();
                    c.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    c.fill();
                }
                c.globalAlpha = 1;
            }
            drawKenzie(c) {
                const sprite = this.rageMode ? 'kenzie_rage' : 'kenzie_idle';
                c.drawImage(this.assets.get(sprite), this.kenzie.x - 86, this.kenzie.y - 86, 172, 172);
            }
            drawObjects(c) {
                for (const o of this.objects) {
                    c.save();
                    c.translate(o.x, o.y);
                    c.rotate(o.rot);
                    const img = this.assets.get(o.sprite);
                    if (img) c.drawImage(img, -o.r * 1.2, -o.r * 1.2, o.r * 2.4, o.r * 2.4);
                    c.restore();
                }
            }
            drawTrail(c) {
                if (this.trail.length < 2) return;
                c.lineCap = 'round';
                for (let i = 1; i < this.trail.length; i++) {
                    const a = this.trail[i - 1],
                        b = this.trail[i],
                        alpha = b.life;
                    if (alpha <= 0) continue;
                    const dx = b.x - a.x,
                        dy = b.y - a.y;
                    const len = Math.sqrt(dx * dx + dy * dy) || 1;
                    const nx = -dy / len,
                        ny = dx / len;
                    const bladeWidth = 14 + b.vel * 0.25;
                    c.globalAlpha = alpha;
                    c.shadowColor = this.rageMode ? '#ff6040' : '#40d0ff';
                    c.shadowBlur = 20;
                    c.fillStyle = '#ffffff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth * 0.3, a.y + ny * bladeWidth * 0.3);
                    c.lineTo(b.x + nx * bladeWidth * 0.3, b.y + ny * bladeWidth * 0.3);
                    c.lineTo(b.x - nx * bladeWidth * 0.3, b.y - ny * bladeWidth * 0.3);
                    c.lineTo(a.x - nx * bladeWidth * 0.3, a.y - ny * bladeWidth * 0.3);
                    c.closePath();
                    c.fill();
                    c.globalAlpha = alpha * 0.5;
                    c.fillStyle = this.rageMode ? '#ff8060' : '#80e8ff';
                    c.beginPath();
                    c.moveTo(a.x + nx * bladeWidth, a.y + ny * bladeWidth);
                    c.lineTo(b.x + nx * bladeWidth, b.y + ny * bladeWidth);
                    c.lineTo(b.x - nx * bladeWidth, b.y - ny * bladeWidth);
                    c.lineTo(a.x - nx * bladeWidth, a.y - ny * bladeWidth);
                    c.closePath();
                    c.fill();
                }
                c.shadowBlur = 0;
                c.globalAlpha = 1;
            }
            drawFX(c) {
                for (const sc of this.stinkClouds) {
                    c.globalAlpha = sc.life * 0.5;
                    c.fillStyle = '#80b030';
                    c.beginPath();
                    c.arc(sc.x, sc.y, sc.r, 0, Math.PI * 2);
                    c.fill();
                }
                c.globalAlpha = 1;
                for (const p of this.achievePopups) {
                    c.fillStyle = 'rgba(0,0,0,0.8)';
                    c.fillRect(this.w / 2 - 160, 30, 320, 60);
                    c.fillStyle = '#ffd700';
                    c.font = 'bold 18px Inter';
                    c.textAlign = 'center';
                    c.fillText('🏆 ' + p.name, this.w / 2, 70);
                    c.fillText(p.desc, this.w / 2, 90);
                }
            }
            render() {
                const c = this.ctx;
                if (this.state === 'cutscene') { this.cutscene.draw(c); return; }
                this.drawBackground(c);
                this.drawTrail(c);
                this.drawKenzie(c);
                this.drawObjects(c);
                this.drawFX(c);
            }
            loop(ts) {
                const dt = Math.min(50, ts - (this.lastTime || ts));
                this.lastTime = ts;
                this.update(dt);
                this.render();
                requestAnimationFrame(t => this.loop(t));
            }
        }
        window.game = new Game();
    </script>
