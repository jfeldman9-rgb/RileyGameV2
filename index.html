<!DOCTYPE html>
<html lang="en">
<head>

<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#070612;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}

  .title{font-family:Georgia,serif;font-size:clamp(34px,8vw,70px);font-weight:900;color:#fff;line-height:1.02;margin:0 0 8px;text-shadow:0 0 16px #ff4cf0,0 0 40px #8d2fff,0 4px 14px rgba(0,0,0,.8)}

  .btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

  .hs{font-size:14px;color:#ffd700;font-weight:800;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.28);padding:6px 16px;border-radius:999px;margin-top:14px}

  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:none}
  .hud-box{position:absolute;background:rgba(5,8,20,.36);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px 16px;backdrop-filter:blur(6px)}
  .hud-label{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;font-weight:700}
  .hud-value{font-size:34px;font-weight:900;color:#fff;line-height:1}
  #scoreBox{top:12px;left:12px}
  #waveBox{top:12px;left:50%;transform:translateX(-50%)}
  #lifeBox{top:12px;right:12px}
  #lives{font-size:24px;letter-spacing:2px}
  #combo{font-size:14px;color:#ffeb3b;font-weight:900;min-height:18px;text-shadow:0 0 10px rgba(255,152,0,.7)}
  #powerWrap{position:absolute;top:78px;left:50%;transform:translateX(-50%);width:min(240px,62vw)}
  #powerLabel{font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.54);text-align:center;text-transform:uppercase;margin-bottom:4px;font-weight:700}
  #powerBar{height:8px;background:rgba(255,255,255,.07);border-radius:999px;border:1px solid rgba(255,255,255,.12);overflow:hidden}
  #powerFill{height:100%;width:0%;background:linear-gradient(90deg,#00f2fe,#4facfe);transition:width .12s}
  #powerFill.rush{background:linear-gradient(90deg,#ff67b4,#ff4b2b)}
  #pills{position:absolute;top:96px;left:50%;transform:translateX(-50%);display:flex;gap:6px}

  #ann,#taunt,#action{position:fixed;left:50%;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:15;text-align:center;transition:all .28s cubic-bezier(.175,.885,.32,1.25)}

  #annTitle{font-family:Georgia,serif;font-size:clamp(38px,10vw,78px);font-weight:900;color:#fff;text-shadow:0 0 20px currentColor}
  #annSub{font-size:16px;color:rgba(255,255,255,.82);font-weight:700;margin-top:4px}
  #taunt{top:29%;font-size:clamp(20px,4.8vw,40px);font-weight:900;color:#fff;white-space:nowrap;max-width:90vw;text-shadow:0 0 18px #ff0040,0 0 34px rgba(255,0,64,.6),0 3px 10px rgba(0,0,0,.8)}
  #action{top:52%;font-family:Georgia,serif;font-size:clamp(48px,11vw,96px);font-weight:900;color:#fff;text-shadow:0 0 22px #ff0055,0 0 50px #ff0055,4px 4px 0 #000}

  .stat-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:12px 0 18px}
  .stat-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:13px;padding:9px 16px;min-width:110px}
  .stat-val{font-size:30px;font-weight:900;color:#ffd700}

<body>
<canvas id="game"></canvas>

<div id="start" class="screen">
  <div class="title">Riley vs Kenzie</div>

  <div class="howto">

    <div class="tip"><strong>💣</strong>Avoid bombs</div>

  </div>

</div>

    <div class="stat-card"><div class="stat-val" id="goScore">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat-card"><div class="stat-val" id="goWave">1</div><div class="stat-lbl">Wave</div></div>

</div>

<script>
'use strict';

const $ = id => document.getElementById(id);

const CONFIG = {
  maxLives: 3,
  gravityBase: 0.28,
  trailMax: 14,
  storageKey: 'riley-vs-kenzie-best-voice-edition',
  levels: {
    easy:   { spawnMs: 780, bombChance: 0.10, speed: 0.94, waveGoal: 10 },
    medium: { spawnMs: 620, bombChance: 0.17, speed: 1.05, waveGoal: 12 },
    hard:   { spawnMs: 500, bombChance: 0.24, speed: 1.18, waveGoal: 14 }
  },
  taunts: [
    'You can do better, Riley.',
    'That slash was embarrassing.',
    'Tiny ninja. Tiny effort.',
    'My grandma swings faster.',
    'Broccoli owns you, Riley.',
    'You call that a hit?'
  ],
  bombTaunts: ['Boom, Riley.', 'That was stupid.', 'You should have dodged.', 'Explosive mistake.'],
  bossTaunts: ['This is my kingdom, Riley.', 'Bow before your queen.', 'You cannot win.', 'I am just getting started.']
};

class AudioEngine {
  constructor(){ this.ctx = null; this.master = null; this.ready = false; }
  async init(){
    if(!this.ctx){
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.8;
      this.master.connect(this.ctx.destination);
    }
    if(this.ctx.state === 'suspended') await this.ctx.resume();
    this.ready = true;
  }
  tone(type, start, end, duration, volume){
    if(!this.ready) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(20,start), t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20,end), t + duration);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.linearRampToValueAtTime(volume, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + duration + 0.02);
  }
  noise(duration, volume, hp){
    if(!this.ready) return;
    const t = this.ctx.currentTime;
    const size = Math.floor(this.ctx.sampleRate * duration);
    const buffer = this.ctx.createBuffer(1, size, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<size;i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    const filter = this.ctx.createBiquadFilter();
    const gain = this.ctx.createGain();
    src.buffer = buffer;
    filter.type = 'highpass';
    filter.frequency.value = hp;
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter); filter.connect(gain); gain.connect(this.master);
    src.start(t); src.stop(t + duration + 0.02);
  }
  play(name, combo=1){
    if(!this.ready) return;
    if(name === 'slash'){ this.tone('triangle', 1100, 240, 0.12, 0.09); this.noise(0.05, 0.05, 2600); }
    else if(name === 'hit'){ this.tone('square', 1350, 210, 0.12, 0.11); this.noise(0.06, 0.08, 2000); }
    else if(name === 'bomb'){ this.tone('sawtooth', 160, 35, 0.55, 0.18); this.noise(0.34, 0.12, 100); }
    else if(name === 'power'){ [440,550,660,880].forEach((f,i)=>setTimeout(()=>this.tone('triangle', f, f, 0.1, 0.06), i*50)); }
    else if(name === 'freeze'){ this.tone('sine', 1500, 240, 0.4, 0.08); }
    else if(name === 'life'){ [523,659,784].forEach((f,i)=>setTimeout(()=>this.tone('sine', f, f, 0.12, 0.06), i*55)); }
    else if(name === 'wave'){ [330,440,550,660].forEach((f,i)=>setTimeout(()=>this.tone('square', f, f, 0.12, 0.05), i*75)); }
    else if(name === 'combo'){ this.tone('triangle', Math.min(1600, 600 + combo * 90), 420, 0.08, 0.07); }
    else if(name === 'boss'){ this.tone('square', 220, 110, 0.45, 0.1); }
    else if(name === 'bgm'){ this.tone('square', combo, combo, 0.18, 0.012); }
  }
}

class VoiceEngine {
  constructor(){
    this.enabled = 'speechSynthesis' in window;
    this.voices = [];
    this.ready = false;
    this.unlocked = false;
    this.lastSpeak = 0;
  }
  init(){
    if(!this.enabled) return;
    this.loadVoices();
    if(!this.voices.length){
      try {
        speechSynthesis.onvoiceschanged = () => this.loadVoices();
      } catch {}
      setTimeout(() => this.loadVoices(), 400);
    }
    this.ready = true;
  }
  loadVoices(){
    try { this.voices = speechSynthesis.getVoices() || []; }
    catch { this.voices = []; }
  }
  pick(){
    const preferred = this.voices.find(v => v.lang && v.lang.startsWith('en') && /samantha|victoria|karen|zira|ava|allison|moira|fiona/i.test(v.name));
    return preferred || this.voices.find(v => v.lang && v.lang.startsWith('en-US')) || this.voices.find(v => v.lang && v.lang.startsWith('en')) || null;
  }
  unlock(){
    if(!this.enabled) return false;
    try {
      this.loadVoices();
      speechSynthesis.cancel();
      speechSynthesis.resume();
      this.unlocked = true;
      return true;
    } catch {
      return false;
    }
  }
  speakNow(text, opts = {}){
    if(!this.enabled || !text) return false;
    if(!this.ready) this.init();
    try {
      const now = performance.now();
      const minGap = opts.minGap == null ? 250 : opts.minGap;
      if(now - this.lastSpeak < minGap) return false;
      this.lastSpeak = now;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = opts.rate == null ? 1.0 : opts.rate;
      u.pitch = opts.pitch == null ? 1.45 : opts.pitch;
      u.volume = opts.volume == null ? 1.0 : opts.volume;
      const voice = this.pick();
      if(voice) u.voice = voice;
      if(opts.cancel !== false) speechSynthesis.cancel();
      speechSynthesis.speak(u);
      speechSynthesis.resume();
      return true;
    } catch {
      return false;
    }
  }
  speak(text, opts = {}){
    return this.speakNow(text, opts);
  }
  test(){
    this.unlock();
    return this.speakNow("Riley, let's see what you've got.", { minGap: 0, rate: 1.0, pitch: 1.45, volume: 1.0 });
  }
  stop(){ if(this.enabled) try { speechSynthesis.cancel(); } catch {} }
}

class AssetManager {
  constructor(){ this.size = 140; this.cache = {}; }
  init(){ this.make('broccoli', c => this.drawBroccoli(c)); this.make('bomb', c => this.drawBomb(c)); this.make('pizza', c => this.drawPizza(c)); this.make('donut', c => this.drawDonut(c)); this.make('candy', c => this.drawCandy(c)); this.make('freeze', c => this.drawFreeze(c)); this.make('shield', c => this.drawShield(c)); this.make('heart', c => this.drawHeart(c)); }
  make(name, fn){ const cv = document.createElement('canvas'); cv.width = cv.height = this.size; const c = cv.getContext('2d'); c.translate(this.size/2, this.size/2); fn(c); this.cache[name] = cv; }
  get(name){ return this.cache[name]; }
  drawBroccoli(c){ const florets = [{x:0,y:-20,r:20},{x:-18,y:-10,r:15},{x:18,y:-10,r:15},{x:-10,y:-30,r:12},{x:10,y:-30,r:12},{x:0,y:-36,r:10}]; const stalk = c.createLinearGradient(-7,10,7,40); stalk.addColorStop(0,'#dff7a2'); stalk.addColorStop(1,'#8aa75a'); c.fillStyle = stalk; c.beginPath(); c.moveTo(-7,10); c.quadraticCurveTo(-10,30,-7,40); c.lineTo(7,40); c.quadraticCurveTo(10,30,7,10); c.closePath(); c.fill(); florets.forEach(f=>{ const g = c.createRadialGradient(f.x-f.r*.35, f.y-f.r*.35, 1, f.x, f.y, f.r); g.addColorStop(0,'#7ec751'); g.addColorStop(.6,'#4b8c2b'); g.addColorStop(1,'#224517'); c.fillStyle = g; c.beginPath(); c.arc(f.x, f.y, f.r, 0, Math.PI*2); c.fill(); c.fillStyle = 'rgba(210,255,180,.34)'; c.beginPath(); c.arc(f.x-f.r*.25, f.y-f.r*.25, f.r*.25, 0, Math.PI*2); c.fill(); }); }
  drawBomb(c){ const g = c.createRadialGradient(-12,-15,1, 0,0,40); g.addColorStop(0,'#666a70'); g.addColorStop(.36,'#20242f'); g.addColorStop(1,'#040507'); c.fillStyle = g; c.beginPath(); c.arc(0,0,40,0,Math.PI*2); c.fill(); c.fillStyle='rgba(255,255,255,.35)'; c.beginPath(); c.ellipse(-12,-16,12,16,.3,0,Math.PI*2); c.fill(); c.fillStyle='#3a2a1a'; c.fillRect(-8,-48,16,10); c.strokeStyle='#c9a866'; c.lineWidth=4; c.lineCap='round'; c.beginPath(); c.moveTo(0,-48); c.quadraticCurveTo(14,-62,6,-76); c.stroke(); }
  drawPizza(c){ c.save(); c.rotate(-.22); const cheese = c.createLinearGradient(0,-38,0,30); cheese.addColorStop(0,'#ffd984'); cheese.addColorStop(1,'#e68f22'); c.fillStyle=cheese; c.beginPath(); c.moveTo(0,-38); c.lineTo(-34,30); c.quadraticCurveTo(0,38,34,30); c.closePath(); c.fill(); c.fillStyle='#b53328'; [{x:-10,y:-8,r:6},{x:8,y:0,r:7},{x:-5,y:14,r:5}].forEach(p=>{ c.beginPath(); c.arc(p.x,p.y,p.r,0,Math.PI*2); c.fill(); }); c.fillStyle='#b67b38'; c.beginPath(); c.moveTo(-36,34); c.quadraticCurveTo(0,46,36,34); c.lineTo(30,26); c.quadraticCurveTo(0,38,-30,26); c.closePath(); c.fill(); c.restore(); }
  drawDonut(c){ const base = c.createRadialGradient(-8,-8,0,0,0,38); base.addColorStop(0,'#e8b67a'); base.addColorStop(1,'#9f6831'); c.fillStyle=base; c.beginPath(); c.arc(0,0,38,0,Math.PI*2); c.fill(); c.fillStyle='#ff7eb5'; c.beginPath(); c.arc(0,0,31,0,Math.PI*2); c.fill(); c.fillStyle='#070612'; c.beginPath(); c.arc(0,0,12,0,Math.PI*2); c.fill(); }
  drawCandy(c){ c.save(); c.rotate(-.15); c.fillStyle='#c97ae0'; c.beginPath(); c.moveTo(-38,-10); c.lineTo(-20,-8); c.lineTo(-14,0); c.lineTo(-20,8); c.lineTo(-38,10); c.closePath(); c.fill(); c.beginPath(); c.moveTo(38,-10); c.lineTo(20,-8); c.lineTo(14,0); c.lineTo(20,8); c.lineTo(38,10); c.closePath(); c.fill(); const g = c.createLinearGradient(0,-20,0,20); g.addColorStop(0,'#ffd2f1'); g.addColorStop(1,'#b857d8'); c.fillStyle=g; c.beginPath(); c.ellipse(0,0,25,18,0,0,Math.PI*2); c.fill(); c.restore(); }
  drawFreeze(c){ c.strokeStyle='#a6f0ff'; c.lineWidth=6; for(let i=0;i<3;i++){ c.save(); c.rotate(i*Math.PI/3); c.beginPath(); c.moveTo(0,-40); c.lineTo(0,40); c.stroke(); c.beginPath(); c.moveTo(0,-22); c.lineTo(12,-30); c.moveTo(0,-22); c.lineTo(-12,-30); c.moveTo(0,22); c.lineTo(12,30); c.moveTo(0,22); c.lineTo(-12,30); c.stroke(); c.restore(); } }
  drawShield(c){ c.fillStyle='#ffd94d'; c.beginPath(); c.moveTo(0,-38); c.lineTo(26,-22); c.lineTo(22,10); c.quadraticCurveTo(18,28,0,40); c.quadraticCurveTo(-18,28,-22,10); c.lineTo(-26,-22); c.closePath(); c.fill(); c.strokeStyle='#fff1a4'; c.lineWidth=4; c.stroke(); }
  drawHeart(c){ c.fillStyle='#ff516d'; c.beginPath(); c.moveTo(0,28); c.bezierCurveTo(-34,6,-40,-20,-14,-24); c.bezierCurveTo(-2,-26,0,-15,0,-10); c.bezierCurveTo(0,-15,2,-26,14,-24); c.bezierCurveTo(40,-20,34,6,0,28); c.fill(); }
}

class Game {
  constructor(){
    this.canvas = $('game');
    this.ctx = this.canvas.getContext('2d', { alpha: false });
    this.audio = new AudioEngine();
    this.voice = new VoiceEngine();
    this.assets = new AssetManager();
    this.assets.init();
    this.best = Number(localStorage.getItem(CONFIG.storageKey) || 0);
    this.state = 'menu';
    this.level = 'medium';
    this.w = 0; this.h = 0; this.dpr = Math.min(devicePixelRatio || 1, 2);
    this.lastTime = 0;
    this.bindUI();
    this.bindInput();
    this.resize();
    this.reset();
    this.updateBestUI();
    requestAnimationFrame(t => this.loop(t));
  }
  async prime(){ await this.audio.init(); this.voice.init(); }
  bindUI(){
    document.querySelectorAll('[data-level]').forEach(btn => btn.addEventListener('click', (e) => {
      this.voice.test();
      this.prime().then(() => this.start(btn.dataset.level));
    }));
    $('restartBtn').addEventListener('click', () => {
      this.voice.unlock();
      this.prime().then(() => this.start(this.level));
    });
    $('testVoiceBtn').addEventListener('click', () => {
      const ok = this.voice.test();
      this.showAnn(ok ? 'Voice Online' : 'Voice Failed', ok ? 'Kenzie can talk now.' : 'Browser blocked speech.', ok ? '#00f2fe' : '#ff4b2b');
    });
    addEventListener('resize', () => this.resize());
  }
  bindInput(){
    this.pointerDown = false;
    this.lastPoint = null;
    this.trail = [];
    const start = (x,y) => { this.pointerDown = true; this.lastPoint = {x,y}; this.trail.push({x,y,life:1}); this.audio.play('slash'); };
    const move = (x,y) => {
      if(!this.pointerDown || this.state !== 'playing' || !this.lastPoint) return;
      const p1 = this.lastPoint;
      const p2 = {x,y};
      this.sliceBetween(p1, p2);
      this.lastPoint = p2;
      this.trail.push({x,y,life:1});
      if(this.trail.length > CONFIG.trailMax) this.trail.shift();
    };
    const end = () => { this.pointerDown = false; this.lastPoint = null; };
    this.canvas.addEventListener('pointerdown', e => start(e.clientX, e.clientY));
    this.canvas.addEventListener('pointermove', e => move(e.clientX, e.clientY));
    addEventListener('pointerup', end);
    addEventListener('pointercancel', end);
  }
  resize(){
    this.w = innerWidth; this.h = innerHeight;
    this.canvas.width = Math.floor(this.w * this.dpr);
    this.canvas.height = Math.floor(this.h * this.dpr);
    this.canvas.style.width = this.w + 'px';
    this.canvas.style.height = this.h + 'px';
    this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
  }
  reset(){
    this.cfg = CONFIG.levels[this.level];
    this.score = 0;
    this.lives = CONFIG.maxLives;
    this.wave = 1;
    this.waveSliced = 0;
    this.waveGoal = this.cfg.waveGoal;
    this.combo = 0;
    this.bestCombo = 0;
    this.comboTimer = 0;
    this.power = 0;
    this.isRush = false;
    this.rushTimer = 0;
    this.isFrozen = false;
    this.freezeTimer = 0;
    this.hasShield = false;
    this.spawnTimer = 0;
    this.bgmTimer = 0;
    this.bgmStep = 0;
    this.annTimer = 0;
    this.tauntTimer = 0;
    this.actionTimer = 0;
    this.shakeTimer = 0;
    this.objects = [];
    this.particles = [];
    this.floaters = [];
    this.rings = [];
    this.kenzie = { x: this.w * 0.5, targetX: this.w * 0.5, y: this.h * 0.15 };
    this.updateHUD();
  }
  start(level){
    this.level = level;
    this.reset();
    this.state = 'playing';
    $('start').classList.add('hidden');
    $('over').classList.add('hidden');
    $('hud').style.display = 'block';
    this.showAnn('Begin', level.toUpperCase(), '#00f2fe');
    setTimeout(() => this.voice.speakNow("Riley, let's see what you've got.", { minGap: 0, pitch: 1.45, rate: 1.0, volume: 1.0 }), 120);
  }
  updateBestUI(){
    if(this.best > 0){
      $('startHs').classList.remove('hidden');
      $('overHs').classList.remove('hidden');
      $('startHsVal').textContent = this.best;
      $('overHsVal').textContent = this.best;
    } else {
      $('startHs').classList.add('hidden');
      $('overHs').classList.add('hidden');
    }
  }
  showAnn(title, sub, color){
    $('annTitle').textContent = title;
    $('annTitle').style.color = color;
    $('annSub').textContent = sub || '';
    $('ann').classList.add('show');
    this.annTimer = 90;
  }
  showTaunt(text, force){
    if(this.tauntTimer > 0 && !force) return;
    $('taunt').textContent = text;
    $('taunt').classList.add('show');
    this.tauntTimer = 95;
    this.voice.speakNow(text, { minGap: 0, pitch: 1.5 });
  }
  flashAction(text){
    $('action').textContent = text;
    $('action').classList.add('show');
    this.actionTimer = 16;
  }
  updateHUD(){
    $('score').textContent = this.score;
    $('wave').textContent = this.wave;
    $('lives').textContent = '❤️'.repeat(Math.max(0,this.lives)) + (this.hasShield ? '🛡️' : '') + '🖤'.repeat(Math.max(0, CONFIG.maxLives - this.lives));
    $('combo').textContent = this.combo > 1 ? '⚡ Combo ×' + this.combo : '';
    $('powerFill').style.width = Math.min(100, this.power) + '%';
    $('powerFill').className = this.isRush ? 'rush' : '';
    $('pills').innerHTML = (this.isFrozen ? '<span class="pill freeze">❄️ Freeze</span>' : '') + (this.hasShield ? '<span class="pill shield">🛡️ Shield</span>' : '') + (this.isRush ? '<span class="pill rush">⚡ Rush</span>' : '');
  }
  spawnObject(type, x, y, vx, vy){
    const defs = {
      broccoli: { r: 28, score: 10, sprite: 'broccoli', color: '#5ec92d' },
      pizza:    { r: 28, score: 14, sprite: 'pizza', color: '#ffb455' },
      donut:    { r: 28, score: 16, sprite: 'donut', color: '#ff7eb5' },
      candy:    { r: 24, score: 18, sprite: 'candy', color: '#d98cff' },
      bomb:     { r: 30, score: 0,  sprite: 'bomb', color: '#ff5555' },
      freeze:   { r: 24, score: 0,  sprite: 'freeze', color: '#a6f0ff', power: 'freeze' },
      shield:   { r: 24, score: 0,  sprite: 'shield', color: '#ffe05a', power: 'shield' },
      heart:    { r: 24, score: 0,  sprite: 'heart', color: '#ff516d', power: 'heart' }
    };
    this.objects.push(Object.assign({ type, x, y, vx, vy, rot: Math.random() * Math.PI * 2, vr: (Math.random() - 0.5) * 0.18, dead: false }, defs[type]));
  }
  spawn(){
    const bossWave = this.wave % 5 === 0;
    const x = this.w * 0.12 + Math.random() * this.w * 0.76;
    const y = this.h + 60;
    const speed = this.cfg.speed * (1 + Math.min(0.4, (this.wave - 1) * 0.03)) * (this.isFrozen ? 0.58 : 1);
    const vx = (Math.random() - 0.5) * 4.5 * speed;
    const vy = -(11 + Math.random() * 4 + (bossWave ? 1.2 : 0)) * speed;
    const r = Math.random();
    if(r < 0.03) return this.spawnObject('heart', x, y, vx, vy);
    if(r < 0.08) return this.spawnObject('freeze', x, y, vx, vy);
    if(r < 0.13) return this.spawnObject('shield', x, y, vx, vy);
    if(r < this.cfg.bombChance + (bossWave ? 0.08 : 0.0)) return this.spawnObject('bomb', x, y, vx, vy);
    const f = Math.random();
    if(f < 0.5) return this.spawnObject('broccoli', x, y, vx, vy);
    if(f < 0.72) return this.spawnObject('pizza', x, y, vx, vy);
    if(f < 0.88) return this.spawnObject('donut', x, y, vx, vy);
    return this.spawnObject('candy', x, y, vx, vy);
  }
  sliceBetween(p1, p2){
    let hit = false;
    for(const o of this.objects){
      if(o.dead) continue;
      if(this.segmentHitsCircle(p1, p2, o)){
        hit = true;
        o.dead = true;
        if(o.type === 'bomb') this.onBomb(o);
        else if(o.power) this.onPower(o);
        else this.onSlice(o);
      }
    }
    if(!hit) this.audio.play('slash');
  }
  segmentHitsCircle(a, b, o){
    const abx = b.x - a.x, aby = b.y - a.y;
    const apx = o.x - a.x, apy = o.y - a.y;
    const ab2 = abx * abx + aby * aby || 1;
    let t = (apx * abx + apy * aby) / ab2;
    t = Math.max(0, Math.min(1, t));
    const cx = a.x + abx * t, cy = a.y + aby * t;
    const dx = o.x - cx, dy = o.y - cy;
    const rr = (o.r + 14) * (o.r + 14);
    return dx * dx + dy * dy <= rr;
  }
  onSlice(o){
    const gained = o.score * (this.isRush ? 2 : 1);
    this.score += gained;
    this.combo += 1;
    this.bestCombo = Math.max(this.bestCombo, this.combo);
    this.comboTimer = 85;
    this.power = Math.min(100, this.power + 9);
    this.waveSliced += 1;
    this.audio.play('hit');
    if(this.combo > 1) this.audio.play('combo', this.combo);
    this.flashAction(this.combo >= 6 ? 'SAVAGE!' : 'KEEEYA!');
    this.burst(o.x, o.y, o.color, 18);
    this.spark(o.x, o.y, '#ffffff', 10);
    this.ring(o.x, o.y, 'rgba(255,255,255,.5)');
    this.floatText(o.x, o.y, '+' + gained, '#ffffff', 24);
    if(this.power >= 100 && !this.isRush){
      this.isRush = true;
      this.rushTimer = 360;
      this.audio.play('power');
      this.showAnn('Sugar Rush', 'Double score. Faster pace.', '#ff67b4');
      this.voice.speak('Sugar rush. Try to keep up, Riley.', { minGap: 0, pitch: 1.4 });
    }
    if(this.waveSliced >= this.waveGoal){
      this.wave += 1;
      this.waveSliced = 0;
      this.waveGoal = this.cfg.waveGoal + Math.floor(this.wave * 1.4);
      this.audio.play(this.wave % 5 === 0 ? 'boss' : 'wave');
      this.showAnn(this.wave % 5 === 0 ? 'Boss Wave' : 'Wave Clear', this.wave % 5 === 0 ? 'Kenzie is angry now.' : 'Next wave incoming.', this.wave % 5 === 0 ? '#ff4b2b' : '#ffd700');
      if(this.wave % 5 === 0) this.showTaunt(CONFIG.bossTaunts[Math.floor(Math.random() * CONFIG.bossTaunts.length)], true);
      else this.voice.speak('Wave ' + this.wave + '. Keep swinging, Riley.', { minGap: 0, pitch: 1.38 });
    }
    this.updateHUD();
  }
  onPower(o){
    if(o.power === 'freeze'){
      this.isFrozen = true;
      this.freezeTimer = 240;
      this.audio.play('freeze');
      this.showAnn('Freeze', 'Everything slows down.', '#a6f0ff');
      this.voice.speak('Freeze activated.', { minGap: 0, pitch: 1.35 });
    } else if(o.power === 'shield'){
      this.hasShield = true;
      this.audio.play('power');
      this.showAnn('Shield', 'One bomb forgiven.', '#ffe05a');
      this.voice.speak('Shield up.', { minGap: 0, pitch: 1.35 });
    } else if(o.power === 'heart'){
      this.lives = Math.min(CONFIG.maxLives, this.lives + 1);
      this.audio.play('life');
      this.showAnn('Extra Life', 'You got lucky.', '#ff516d');
      this.voice.speak('Extra life.', { minGap: 0, pitch: 1.35 });
    }
    this.burst(o.x, o.y, o.color, 14);
    this.floatText(o.x, o.y, o.power.toUpperCase(), '#ffffff', 18);
    this.updateHUD();
  }
  onBomb(o){
    this.audio.play('bomb');
    this.shakeTimer = 16;
    this.ring(o.x, o.y, 'rgba(255,80,80,.7)');
    this.burst(o.x, o.y, '#ff5b5b', 22);
    this.combo = 0;
    this.comboTimer = 0;
    if(this.hasShield){
      this.hasShield = false;
      this.floatText(o.x, o.y, 'SHIELD SAVED YOU', '#ffe05a', 18);
    } else {
      this.lives -= 1;
      this.floatText(o.x, o.y, '-1 LIFE', '#ff9aa3', 24);
    }
    this.showTaunt(CONFIG.bombTaunts[Math.floor(Math.random() * CONFIG.bombTaunts.length)], true);
    this.updateHUD();
    if(this.lives <= 0) this.endGame();
  }
  burst(x, y, color, n){ for(let i = 0; i < n; i++){ const a = (Math.PI * 2 / n) * i + Math.random() * .4; const sp = Math.random() * 6 + 2; this.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, life: 1, size: Math.random() * 5 + 2, color, spark: false }); } }
  spark(x, y, color, n){ for(let i = 0; i < n; i++){ const a = Math.random() * Math.PI * 2; const sp = Math.random() * 8 + 3; this.particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, size: Math.random() * 2 + 1, color, spark: true }); } }
  floatText(x, y, text, color, size){ this.floaters.push({ x, y, text, color, size, life: 1, vy: -2 }); }
  ring(x, y, color){ this.rings.push({ x, y, r: 4, max: 88, life: 1, color }); }
  tickBGM(dt){
    if(this.state !== 'playing') return;
    this.bgmTimer -= dt;
    if(this.bgmTimer > 0) return;
    const notes = [392,440,494,523,587,523,494,392,349,392,440,523];
    this.bgmTimer = this.isRush ? 120 : this.isFrozen ? 520 : 290;
    const note = notes[this.bgmStep % notes.length];
    this.bgmStep += 1;
    this.audio.play('bgm', note * (this.isRush ? 1.45 : 1));
  }
  endGame(){
    this.state = 'over';
    this.voice.stop();
    const isNew = this.score > this.best;
    if(isNew){ this.best = this.score; localStorage.setItem(CONFIG.storageKey, String(this.best)); }
    $('goScore').textContent = this.score;
    $('goWave').textContent = this.wave;
    $('goCombo').textContent = this.bestCombo;
    $('newHs').classList.toggle('hidden', !isNew);
    $('hud').style.display = 'none';
    $('over').classList.remove('hidden');
    this.updateBestUI();
    setTimeout(() => this.voice.speak(isNew ? 'New high score. Not completely hopeless, Riley.' : 'Better luck next time, Riley.', { minGap: 0, pitch: 1.4 }), 320);
  }
  update(dt){
    if(this.state !== 'playing') return;
    this.tickBGM(dt);
    this.spawnTimer += dt;
    const spawnEvery = Math.max(180, this.cfg.spawnMs - (this.wave - 1) * 12) * (this.isFrozen ? 1.8 : 1) * (this.isRush ? 0.88 : 1);
    while(this.spawnTimer >= spawnEvery){ this.spawnTimer -= spawnEvery; this.spawn(); }
    if(this.comboTimer > 0) this.comboTimer -= 1; else if(this.combo > 0){ this.combo = 0; this.updateHUD(); }
    if(this.annTimer > 0){ this.annTimer -= 1; if(this.annTimer <= 0) $('ann').classList.remove('show'); }
    if(this.tauntTimer > 0){ this.tauntTimer -= 1; if(this.tauntTimer <= 0) $('taunt').classList.remove('show'); }
    if(this.actionTimer > 0){ this.actionTimer -= 1; if(this.actionTimer <= 0) $('action').classList.remove('show'); }
    if(this.shakeTimer > 0) this.shakeTimer -= 1;
    if(this.isRush){ this.rushTimer -= dt; if(this.rushTimer <= 0){ this.isRush = false; this.power = 0; this.showAnn('Rush Over', '', '#00f2fe'); this.updateHUD(); } }
    if(this.isFrozen){ this.freezeTimer -= dt; if(this.freezeTimer <= 0){ this.isFrozen = false; this.showAnn('Freeze Ended', '', '#a6f0ff'); this.updateHUD(); } }

    const gravity = CONFIG.gravityBase * (this.isFrozen ? 0.45 : 1) * (this.isRush ? 1.08 : 1);
    this.kenzie.targetX += Math.sin(performance.now() * 0.001 + this.wave) * (this.wave % 5 === 0 ? 1.8 : 0.85);
    this.kenzie.targetX = Math.max(this.w * 0.2, Math.min(this.w * 0.8, this.kenzie.targetX));
    this.kenzie.x += (this.kenzie.targetX - this.kenzie.x) * 0.03;

    for(const o of this.objects){ if(o.dead) continue; o.x += o.vx; o.y += o.vy; o.vy += gravity; o.rot += o.vr; }
    for(const p of this.particles){ p.x += p.vx; p.y += p.vy; p.vy += 0.11; p.life -= 0.026; p.size *= 0.994; }
    for(const f of this.floaters){ f.y += f.vy; f.life -= 0.02; }
    for(const r of this.rings){ r.r += 4.2; r.life -= 0.04; }
    for(const t of this.trail) t.life -= 0.07;

    this.objects = this.objects.filter(o => !o.dead && o.y < this.h + 110 && o.x > -110 && o.x < this.w + 110);
    this.particles = this.particles.filter(p => p.life > 0 && p.size > 0.4);
    this.floaters = this.floaters.filter(f => f.life > 0);
    this.rings = this.rings.filter(r => r.life > 0 && r.r < r.max);
    this.trail = this.trail.filter(t => t.life > 0);

    if(Math.random() < 0.0042) this.showTaunt(CONFIG.taunts[Math.floor(Math.random() * CONFIG.taunts.length)], false);
  }
  drawBackground(c){
    const g = c.createLinearGradient(0,0,0,this.h); g.addColorStop(0,'#090617'); g.addColorStop(1,'#1d0c31'); c.fillStyle = g; c.fillRect(0,0,this.w,this.h);
    c.globalAlpha = 0.16;
    for(let i=0;i<50;i++){
      const x = (i * 137) % this.w;
      const y = ((i * 211) + performance.now() * 0.03 * (1 + i * 0.01)) % this.h;
      c.fillStyle = '#ffffff';
      c.fillRect(x, y, 2, 2);
    }
    c.globalAlpha = 1;
  }
  drawKenzie(c){
    const x = this.kenzie.x, y = this.kenzie.y, boss = this.wave % 5 === 0;
    c.save();
    c.translate(x, y + Math.sin(performance.now() * 0.004) * 4);
    c.fillStyle = boss ? '#321010' : '#3a1d10';
    c.beginPath(); c.arc(0, -30, 34, 0, Math.PI * 2); c.fill();
    const dg = c.createLinearGradient(0, -6, 0, 82); dg.addColorStop(0, boss ? '#ff416c' : '#ff7ebf'); dg.addColorStop(1, boss ? '#9b00ff' : '#d43de5');
    c.fillStyle = dg;
    c.beginPath(); c.moveTo(-18, 0); c.quadraticCurveTo(-42, 40, -50, 84); c.lineTo(50, 84); c.quadraticCurveTo(42, 40, 18, 0); c.closePath(); c.fill();
    c.fillStyle = '#ffdcb8'; c.fillRect(-5, -18, 10, 14); c.beginPath(); c.arc(0, -34, 24, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#fff'; c.beginPath(); c.ellipse(-8, -36, 4, 6, 0, 0, Math.PI * 2); c.ellipse(8, -36, 4, 6, 0, 0, Math.PI * 2); c.fill();
    c.fillStyle = '#000'; c.beginPath(); c.arc(-8, -35, 2, 0, Math.PI * 2); c.arc(8, -35, 2, 0, Math.PI * 2); c.fill();
    c.strokeStyle = '#b10038'; c.lineWidth = 2; c.beginPath(); c.arc(0, -26, 8, 0.16 * Math.PI, 0.84 * Math.PI); c.stroke();
    c.fillStyle = '#ffd700'; c.beginPath(); c.moveTo(-12, -55); c.lineTo(-3, -47); c.lineTo(0, -58); c.lineTo(3, -47); c.lineTo(12, -55); c.lineTo(8, -42); c.lineTo(-8, -42); c.closePath(); c.fill();
    c.strokeStyle = '#ffd700'; c.lineWidth = 4; c.lineCap = 'round'; c.beginPath(); c.moveTo(0, -6); c.lineTo(-28, 18); c.moveTo(0, -8); c.lineTo(28, 18); c.stroke();
    if(boss){ c.strokeStyle = 'rgba(255,90,60,.8)'; c.lineWidth = 3; c.beginPath(); c.arc(0, -30, 44, 0, Math.PI * 2); c.stroke(); }
    c.restore();
  }
  drawObjects(c){
    for(const o of this.objects){
      c.save();
      c.translate(o.x, o.y);
      c.rotate(o.rot);
      const img = this.assets.get(o.sprite);
      const size = o.r * 2.4;
      if(img) c.drawImage(img, -size / 2, -size / 2, size, size);
      c.restore();
    }
  }
  drawFX(c){
    for(const p of this.particles){
      c.globalAlpha = p.life;
      c.fillStyle = p.color;
      if(p.spark) c.fillRect(p.x, p.y, p.size * 2.2, 1.2);
      else { c.beginPath(); c.arc(p.x, p.y, p.size, 0, Math.PI * 2); c.fill(); }
    }
    for(const f of this.floaters){
      c.globalAlpha = f.life;
      c.font = '900 ' + f.size + 'px Georgia, serif';
      c.textAlign = 'center';
      c.lineWidth = 4;
      c.strokeStyle = '#000';
      c.strokeText(f.text, f.x, f.y);
      c.fillStyle = f.color;
      c.fillText(f.text, f.x, f.y);
    }
    for(const r of this.rings){
      c.globalAlpha = r.life;
      c.strokeStyle = r.color;
      c.lineWidth = 4;
      c.beginPath(); c.arc(r.x, r.y, r.r, 0, Math.PI * 2); c.stroke();
    }
    c.globalAlpha = 1;
  }
  drawTrail(c){
    if(this.trail.length < 2) return;
    c.lineCap = 'round';
    for(let i = 1; i < this.trail.length; i++){
      const a = this.trail[i - 1], b = this.trail[i];
      c.globalAlpha = b.life * 0.9;
      c.shadowColor = '#00f2fe';
      c.shadowBlur = 16;
      c.strokeStyle = '#ffffff';
      c.lineWidth = 4;
      c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); c.stroke();
      c.globalAlpha = b.life * 0.26;
      c.strokeStyle = '#00f2fe';
      c.lineWidth = 12;
      c.beginPath(); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); c.stroke();
    }
    c.shadowBlur = 0;
    c.globalAlpha = 1;
  }
  render(){
    const c = this.ctx;
    c.save();
    if(this.shakeTimer > 0) c.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);
    this.drawBackground(c);
    this.drawKenzie(c);
    this.drawObjects(c);
    this.drawFX(c);
    this.drawTrail(c);
    c.restore();
  }
  loop(ts){
    const dt = Math.min(50, ts - (this.lastTime || ts));
    this.lastTime = ts;
    this.update(dt);
    this.render();
    requestAnimationFrame(t => this.loop(t));
  }
}

window.game = new Game();
</script>
