<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Riley vs Kenzie · Ninja Snack Attack: The Masterpiece Edition</title>
<style>
    /* ==========================================================================
       HD CINEMATIC STYLING & RESPONSIVE UI
       ========================================================================== */
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;700;900&display=swap');
    
    :root {
        --primary: #00f2fe;
        --secondary: #e100ff;
        --danger: #ff0055;
        --bg-dark: #050508;
    }

    *, *::before, *::after { box-sizing: border-box; }
    
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background-color: var(--bg-dark);
        font-family: 'Montserrat', sans-serif;
        touch-action: none; user-select: none; -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    #gameCanvas {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    }

    /* Glassmorphism UI Overlays */
    .ui-layer {
        position: absolute; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
        background: radial-gradient(circle at center, rgba(20, 5, 40, 0.85) 0%, rgba(5, 5, 8, 0.98) 100%);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        transition: opacity 0.5s ease-in-out, visibility 0.5s;
    }

    .ui-layer.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* Typography */
    h1.title {
        font-family: 'Cinzel', serif; font-size: clamp(36px, 8vw, 80px); font-weight: 900;
        color: #fff; line-height: 1.1; margin: 0 0 10px; text-align: center;
        text-shadow: 0 0 20px var(--secondary), 0 0 40px var(--primary), 0 10px 20px rgba(0,0,0,0.8);
        animation: pulseGlow 4s infinite alternate;
    }

    h2.subtitle {
        font-size: clamp(14px, 3vw, 22px); color: var(--primary); font-weight: 700;
        text-transform: uppercase; letter-spacing: 8px; margin: 0 0 40px;
        text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); text-align: center;
    }

    /* Professional Game Buttons */
    .btn-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    
    .game-btn {
        position: relative; font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: clamp(16px, 4vw, 24px); padding: 20px 50px; border: none; border-radius: 50px;
        color: #fff; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        background: linear-gradient(135deg, var(--secondary), var(--primary));
        box-shadow: 0 10px 30px rgba(225, 0, 255, 0.4), inset 0 2px 0 rgba(255,255,255,0.4);
        overflow: hidden; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .game-btn::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        transform: skewX(-25deg); animation: btnShine 4s infinite;
    }

    .game-btn:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(225, 0, 255, 0.4); }

    /* In-Game HUD */
    #hud {
        position: absolute; inset: 0; z-index: 5; pointer-events: none;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        display: flex; justify-content: space-between; align-items: flex-start;
    }

    .hud-panel {
        background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px; padding: 10px 20px; backdrop-filter: blur(5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .hud-label { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }
    .hud-value { font-size: 36px; color: #fff; font-weight: 900; text-shadow: 0 0 15px var(--primary); font-variant-numeric: tabular-nums; }
    #livesDisplay { font-size: 30px; letter-spacing: 5px; filter: drop-shadow(0 0 10px rgba(255,0,0,0.5)); }

    /* Action Overlays */
    #actionText {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1) skewX(-10deg);
        opacity: 0; font-family: 'Cinzel', serif; font-size: clamp(60px, 15vw, 120px); font-weight: 900; color: #fff;
        text-shadow: 0 0 30px var(--danger), 0 0 60px var(--danger), 5px 5px 0 #000;
        z-index: 9; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #actionText.active { opacity: 1; transform: translate(-50%, -50%) scale(1) skewX(-10deg); }

    /* Animations */
    @keyframes pulseGlow { 0% { text-shadow: 0 0 20px var(--secondary), 0 0 40px var(--primary); } 100% { text-shadow: 0 0 30px var(--primary), 0 0 60px var(--secondary); } }
    @keyframes btnShine { 0%, 20% { left: -100%; } 40%, 100% { left: 200%; } }
    @keyframes camShake { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 20% { transform: translate(-6px, 6px) rotate(-1deg); } 40% { transform: translate(6px, -6px) rotate(1deg); } 60% { transform: translate(-6px, -6px) rotate(-1deg); } 80% { transform: translate(6px, 6px) rotate(1deg); } }
    .shake-active { animation: camShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="screen-start" class="ui-layer">
    <h1 class="title">Riley vs Kenzie</h1>
    <h2 class="subtitle">The Masterpiece Edition</h2>
    <div class="btn-container">
        <button class="game-btn" id="btn-start">Draw Your Sword</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div class="hud-panel">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-panel">
        <div class="hud-label">Integrity</div>
        <div id="livesDisplay">❤️❤️❤️</div>
    </div>
</div>

<div id="actionText">KEEEYA!</div>

<div id="screen-over" class="ui-layer hidden">
    <h1 class="title" style="color: var(--danger); text-shadow: 0 0 30px var(--danger);">Honor Lost</h1>
    <h2 class="subtitle" style="color: #fff; font-size: 24px;" id="finalScoreDisplay">Final Score: 0</h2>
    <div class="btn-container">
        <button class="game-btn" id="btn-restart">Rise & Retry</button>
    </div>
</div>

<script>
/** ============================================================================
 * 1. ARCHITECTURE & CONSTANTS
 * ============================================================================ */
const CONSTANTS = {
    BASE_GRAVITY: 0.35,
    MAX_LIVES: 3,
    TRAIL_LENGTH: 12,
    CACHE_SIZE: 200,
    COLORS: {
        bgTop: '#0a0515', bgBottom: '#1a0b30',
        neonBlue: '#00f2fe', neonPink: '#e100ff', neonRed: '#ff0055',
        swordCore: '#ffffff', steelLight: '#f4f4f8', steelDark: '#666666'
    }
};

const TAUNTS = [
    "You can do better, Riley!",
    "What type of ninja are you?",
    "Can't defeat broccoli thrown by a tiny dancer?",
    "Is your sword made of plastic?",
    "My grandma slices faster!",
    "Too slow, Riley!"
];

/** ============================================================================
 * 2. AUDIO SYNTHESIS ENGINE
 * Provides zero-latency, dynamically generated sound effects.
 * ============================================================================ */
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.unlocked = false;
    }

    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        
        // Unlock Web Speech API
        if (!this.unlocked && 'speechSynthesis' in window) {
            const silent = new SpeechSynthesisUtterance('');
            silent.volume = 0; window.speechSynthesis.speak(silent);
            this.unlocked = true;
        }
    }

    playTone(type, freqStart, freqEnd, duration, vol) {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freqStart, t);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
        
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + duration);
    }

    playNoise(duration, vol) {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        
        // Filter for "swish" effect
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 1000;
        
        noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
        noise.start(t);
    }

    sfxSlash() {
        this.playTone('triangle', 900, 150, 0.15, 0.2);
        this.playNoise(0.1, 0.5);
    }

    sfxHit() {
        this.playTone('square', 1000, 200, 0.15, 0.25);
    }

    sfxExplosion() {
        this.playTone('sawtooth', 150, 20, 0.6, 0.5);
        this.playNoise(0.5, 1.0);
    }

    sfxShout() {
        if (this.unlocked && 'speechSynthesis' in window) {
            const msg = new SpeechSynthesisUtterance("Keeeya!");
            msg.pitch = 2.0; msg.rate = 1.5; msg.volume = 1.0;
            window.speechSynthesis.speak(msg);
        }
    }

    speakTaunt() {
        if (!this.unlocked || !('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const text = TAUNTS[Math.floor(Math.random() * TAUNTS.length)];
        const msg = new SpeechSynthesisUtterance(text);
        
        const voices = window.speechSynthesis.getVoices();
        const femaleVoice = voices.find(v => /female|samantha|karen|victoria/i.test(v.name));
        if (femaleVoice) msg.voice = femaleVoice;
        
        msg.pitch = 1.5; msg.rate = 1.15; msg.volume = 0.9;
        window.speechSynthesis.speak(msg);
    }
}
const audio = new AudioEngine();

/** ============================================================================
 * 3. PROCEDURAL GRAPHICS BAKING
 * Replaces emojis with mathematically drawn vector art on offscreen canvases.
 * ============================================================================ */
class AssetManager {
    constructor() {
        this.cache = {};
        this.size = CONSTANTS.CACHE_SIZE;
    }

    init() {
        this.bakeBroccoli();
        this.bakeBomb();
        this.bakeCandy();
        this.bakePrincess();
    }

    createCanvas() {
        const c = document.createElement('canvas');
        c.width = this.size; c.height = this.size;
        const ctx = c.getContext('2d');
        ctx.translate(this.size / 2, this.size / 2); // Center origin
        return { canvas: c, ctx: ctx };
    }

    bakeBroccoli() {
        const { canvas, ctx } = this.createCanvas();
        const s = this.size * 0.005; // Scaling factor
        ctx.scale(s, s);

        // Stalk
        const stalkGrad = ctx.createLinearGradient(-10, 0, 10, 60);
        stalkGrad.addColorStop(0, '#c8d880'); stalkGrad.addColorStop(1, '#8ba85a');
        ctx.fillStyle = stalkGrad;
        ctx.beginPath();
        ctx.moveTo(-8, 10); ctx.quadraticCurveTo(-15, 40, -10, 60);
        ctx.lineTo(10, 60); ctx.quadraticCurveTo(15, 40, 8, 10);
        ctx.closePath(); ctx.fill();

        // Florets (Layered circles with radial gradients)
        const florets = [
            {x: 0, y: -30, r: 35}, {x: -30, y: -15, r: 30}, {x: 30, y: -15, r: 30},
            {x: -20, y: -45, r: 25}, {x: 20, y: -45, r: 25}, {x: -40, y: 5, r: 20},
            {x: 40, y: 5, r: 20}, {x: 0, y: -55, r: 20}
        ];

        florets.forEach(f => {
            // Shadow base
            ctx.fillStyle = '#1e4212';
            ctx.beginPath(); ctx.arc(f.x + 2, f.y + 4, f.r, 0, Math.PI * 2); ctx.fill();
            
            // Highlighted dome
            const grad = ctx.createRadialGradient(f.x - f.r*0.3, f.y - f.r*0.3, f.r*0.1, f.x, f.y, f.r);
            grad.addColorStop(0, '#7bc04e'); grad.addColorStop(0.6, '#4e8f2f'); grad.addColorStop(1, '#2d5a1f');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();

            // Texture bumps
            ctx.fillStyle = 'rgba(200, 255, 150, 0.4)';
            for(let i=0; i<5; i++) {
                const a = Math.random() * Math.PI * 2;
                const d = Math.random() * f.r * 0.7;
                ctx.beginPath(); ctx.arc(f.x + Math.cos(a)*d, f.y + Math.sin(a)*d, Math.random()*3+1, 0, Math.PI*2); ctx.fill();
            }
        });
        this.cache.broccoli = canvas;
    }

    bakeBomb() {
        const { canvas, ctx } = this.createCanvas();
        const s = this.size * 0.005; ctx.scale(s, s);

        // Body Shadow & Glow
        ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath(); ctx.arc(4, 6, 45, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // Metallic Sphere
        const grad = ctx.createRadialGradient(-15, -20, 5, 0, 0, 50);
        grad.addColorStop(0, '#666a70'); grad.addColorStop(0.3, '#2a2d35'); grad.addColorStop(1, '#050508');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, 45, 0, Math.PI*2); ctx.fill();

        // Glossy Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath(); ctx.ellipse(-15, -20, 15, 20, Math.PI/4, 0, Math.PI*2); ctx.fill();

        // Fuse Cap
        ctx.fillStyle = '#3a2a1a'; ctx.fillRect(-8, -52, 16, 10);
        ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(-8, -52, 16, 10);

        // Fuse Wire
        ctx.strokeStyle = '#c0a060'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(0, -52); ctx.quadraticCurveTo(15, -65, 5, -80); ctx.stroke();

        this.cache.bomb = canvas;
    }

    bakeCandy() {
        const { canvas, ctx } = this.createCanvas();
        const s = this.size * 0.005; ctx.scale(s, s);

        ctx.rotate(-0.2);
        
        // Wrapper Twists
        ctx.fillStyle = '#c97ae0';
        ctx.beginPath(); ctx.moveTo(-60, -15); ctx.lineTo(-30, -10); ctx.lineTo(-20, 0); ctx.lineTo(-30, 10); ctx.lineTo(-60, 15); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(60, -15); ctx.lineTo(30, -10); ctx.lineTo(20, 0); ctx.lineTo(30, 10); ctx.lineTo(60, 15); ctx.closePath(); ctx.fill();

        // Candy Body
        const grad = ctx.createLinearGradient(0, -25, 0, 25);
        grad.addColorStop(0, '#ffd0f0'); grad.addColorStop(0.5, '#f093fb'); grad.addColorStop(1, '#b855d8');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.ellipse(0, 0, 35, 25, 0, 0, Math.PI*2); ctx.fill();

        // Stripes
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 5;
        for(let i=-20; i<30; i+=15) {
            ctx.beginPath(); ctx.moveTo(i-10, -22); ctx.lineTo(i+10, 22); ctx.stroke();
        }

        this.cache.candy = canvas;
    }

    bakePrincess() {
        const { canvas, ctx } = this.createCanvas();
        const s = this.size * 0.0035; // Larger asset for boss presence
        ctx.scale(s, s);

        const skin = '#fddbbe', skinDark = '#e8b58a';
        const dress = '#e100ff', dressDark = '#7a008a';
        const hair = '#2a140a', hairLight = '#4a2815';

        // Hair Back
        ctx.fillStyle = hair;
        ctx.beginPath(); ctx.arc(0, -30, 40, 0, Math.PI*2); ctx.fill();

        // Dress / Body
        const dressGrad = ctx.createLinearGradient(0, 10, 0, 80);
        dressGrad.addColorStop(0, dress); dressGrad.addColorStop(1, dressDark);
        ctx.fillStyle = dressGrad;
        ctx.beginPath(); ctx.moveTo(-20, 10); ctx.quadraticCurveTo(-40, 50, -50, 90); ctx.lineTo(50, 90); ctx.quadraticCurveTo(40, 50, 20, 10); ctx.closePath(); ctx.fill();

        // Belt
        ctx.fillStyle = '#ffd700'; ctx.fillRect(-22, 5, 44, 8);
        ctx.fillStyle = '#00f2fe'; ctx.beginPath(); ctx.arc(0, 9, 6, 0, Math.PI*2); ctx.fill();

        // Arms (Symmetrical for base pose)
        ctx.fillStyle = skin;
        ctx.save(); ctx.translate(-25, -5); ctx.rotate(Math.PI/6); ctx.fillRect(-6, 0, 12, 35); ctx.beginPath(); ctx.arc(0, 35, 6, 0, Math.PI*2); ctx.fill(); ctx.restore();
        ctx.save(); ctx.translate(25, -5); ctx.rotate(-Math.PI/6); ctx.fillRect(-6, 0, 12, 35); ctx.beginPath(); ctx.arc(0, 35, 6, 0, Math.PI*2); ctx.fill(); ctx.restore();

        // Neck & Head
        ctx.fillStyle = skinDark; ctx.fillRect(-6, -20, 12, 15);
        ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(0, -30, 25, 0, Math.PI*2); ctx.fill();

        // Cute Face
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(-9, -30, 5, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(9, -30, 5, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#00f2fe';
        ctx.beginPath(); ctx.arc(-9, -29, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(9, -29, 3, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(0, -20, 6, 0.2, Math.PI-0.2); ctx.stroke();

        // Bangs / Front Hair
        ctx.fillStyle = hair;
        ctx.beginPath(); ctx.moveTo(-25, -45); ctx.quadraticCurveTo(0, -55, 25, -45); ctx.quadraticCurveTo(15, -30, 0, -35); ctx.quadraticCurveTo(-15, -30, -25, -45); ctx.fill();

        // Crown
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.moveTo(-15, -45); ctx.lineTo(-20, -70); ctx.lineTo(-7, -55); ctx.lineTo(0, -75); ctx.lineTo(7, -55); ctx.lineTo(20, -70); ctx.lineTo(15, -45); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(0, -60, 4, 0, Math.PI*2); ctx.fill();

        this.cache.princess = canvas;
    }
}
const assets = new AssetManager();

/** ============================================================================
 * 4. ENTITY & PARTICLE SYSTEMS
 * ============================================================================ */
class Particle {
    constructor(x, y, color, isText = false, text = "") {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed - 2;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.015;
        this.color = color;
        this.size = Math.random() * 6 + 2;
        this.isText = isText;
        this.text = text;
    }

    update(engineScale) {
        this.x += this.vx * engineScale;
        this.y += this.vy * engineScale;
        if (!this.isText) this.vy += CONSTANTS.BASE_GRAVITY * engineScale; // Gravity for debris
        this.life -= this.decay;
    }

    draw(ctx) {
        if (this.life <= 0) return;
        ctx.globalAlpha = this.life;
        
        if (this.isText) {
            ctx.font = '900 30px "Cinzel", serif';
            ctx.textAlign = 'center';
            ctx.lineWidth = 4; ctx.strokeStyle = '#000';
            ctx.strokeText(this.text, this.x, this.y);
            ctx.fillStyle = this.color;
            ctx.fillText(this.text, this.x, this.y);
        } else {
            ctx.shadowColor = this.color; ctx.shadowBlur = 10;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;
    }
}

class Slash {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
        this.life = 1.0;
    }
    update() { this.life -= 0.08; }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.globalAlpha = this.life;
        ctx.lineCap = 'round';
        
        // Inner hot core
        ctx.strokeStyle = CONSTANTS.COLORS.swordCore;
        ctx.lineWidth = 4;
        ctx.shadowColor = CONSTANTS.COLORS.neonBlue; ctx.shadowBlur = 20 * this.life;
        ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
        
        // Outer energy blade
        ctx.strokeStyle = CONSTANTS.COLORS.neonBlue;
        ctx.lineWidth = 12; ctx.globalAlpha = this.life * 0.5;
        ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
        
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }
}

/** ============================================================================
 * 5. CORE GAME ENGINE
 * Coordinates states, rendering, scaling, and input.
 * ============================================================================ */
class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d', { alpha: false });
        
        this.W = 0; this.H = 0; this.scale = 1;
        this.state = 'MENU'; // MENU, PLAYING, OVER
        
        this.score = 0; this.lives = CONSTANTS.MAX_LIVES;
        this.lastSpawnTime = 0; this.spawnRate = 1200;
        
        this.foods = []; this.particles = []; this.slashes = []; this.trail = [];
        this.isDown = false;
        
        // Kenzie Kinematics
        this.kenzie = { x: 0, y: 0, targetX: 0, throwPhase: 0 };
        
        this.bindEvents();
    }

    resize() {
        this.W = window.innerWidth;
        this.H = window.innerHeight;
        this.canvas.width = this.W;
        this.canvas.height = this.H;
        this.scale = Math.min(this.W, this.H) / 600;
        
        this.kenzie.y = this.H * 0.15;
        if(this.state === 'MENU') this.kenzie.x = this.W / 2;
    }

    bindEvents() {
        window.addEventListener('resize', () => this.resize());
        
        const getPt = (e) => ({ x: e.touches ? e.touches[0].clientX : e.clientX, y: e.touches ? e.touches[0].clientY : e.clientY });

        const down = (e) => {
            if (this.state !== 'PLAYING') return;
            e.preventDefault(); audio.init(); this.isDown = true;
            this.trail = [getPt(e)];
        };
        const move = (e) => {
            if (!this.isDown || this.state !== 'PLAYING') return;
            e.preventDefault();
            this.trail.push(getPt(e));
            if (this.trail.length > CONSTANTS.TRAIL_LENGTH) this.trail.shift();
        };
        const up = (e) => {
            if (this.state !== 'PLAYING') return;
            e.preventDefault(); this.isDown = false;
            this.evaluateSlash();
            setTimeout(() => this.trail = [], 50);
        };

        this.canvas.addEventListener('mousedown', down);
        this.canvas.addEventListener('mousemove', move);
        this.canvas.addEventListener('mouseup', up);
        this.canvas.addEventListener('touchstart', down, {passive: false});
        this.canvas.addEventListener('touchmove', move, {passive: false});
        this.canvas.addEventListener('touchend', up);

        document.getElementById('btn-start').addEventListener('click', () => this.start());
        document.getElementById('btn-restart').addEventListener('click', () => this.start());
    }

    start() {
        audio.init();
        assets.init();
        this.resize();
        
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-over').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        
        this.score = 0; this.lives = CONSTANTS.MAX_LIVES; this.spawnRate = 1200;
        this.foods = []; this.particles = []; this.slashes = []; this.trail = [];
        this.kenzie.x = this.W / 2; this.kenzie.targetX = this.W / 2; this.kenzie.throwPhase = 0;
        
        this.updateHUD();
        this.state = 'PLAYING';
        this.lastSpawnTime = performance.now();
        
        requestAnimationFrame((time) => this.loop(time));
    }

    updateHUD() {
        document.getElementById('scoreDisplay').textContent = this.score;
        document.getElementById('livesDisplay').textContent = '❤️'.repeat(Math.max(0, this.lives)) + '🖤'.repeat(Math.max(0, CONSTANTS.MAX_LIVES - this.lives));
    }

    triggerScreenShake() {
        document.body.classList.remove('shake-active');
        void document.body.offsetWidth; // Reflow
        document.body.classList.add('shake-active');
    }

    spawnEntity() {
        const padding = this.W * 0.15;
        this.kenzie.targetX = padding + Math.random() * (this.W - padding * 2);
        this.kenzie.throwPhase = 1.0; // Trigger procedural animation

        const rand = Math.random();
        const type = rand < 0.2 ? 'bomb' : (rand < 0.4 ? 'candy' : 'broccoli');
        
        // Physics Calculation based on screen scaling
        const direction = (this.kenzie.targetX < this.W / 2) ? 1 : -1;
        const vx = direction * (Math.random() * 4 + 2) * this.scale;
        const vy = -(Math.random() * 12 + 12) * this.scale;
        const radius = (type === 'bomb' ? 35 : 45) * this.scale;

        // Delay instantiation slightly to sync with arm throwing forward
        setTimeout(() => {
            if (this.state !== 'PLAYING') return;
            this.foods.push({
                type, x: this.kenzie.x, y: this.kenzie.y + 30 * this.scale,
                vx, vy, r: radius, angle: 0, va: (Math.random() - 0.5) * 0.2,
                sliced: false, alpha: 1.0
            });
            audio.playNoise(0.05, 0.2); // Throw swish
        }, 200);

        this.lastSpawnTime = performance.now();
        this.spawnRate = Math.max(400, this.spawnRate - 10); // Escalating difficulty
    }

    evaluateSlash() {
        if (this.trail.length < 3) return;
        const head = this.trail[this.trail.length - 1];
        const tail = this.trail[0];
        const distance = Math.hypot(head.x - tail.x, head.y - tail.y);
        
        if (distance > 60 * this.scale) {
            audio.sfxSlash();
            this.slashes.push(new Slash(tail.x, tail.y, head.x, head.y));
            this.drawKatana(head.x, head.y, Math.atan2(head.y - tail.y, head.x - tail.x), distance);
            
            let hit = false;
            for (let i = this.foods.length - 1; i >= 0; i--) {
                const f = this.foods[i];
                if (!f.sliced && Math.hypot(head.x - f.x, head.y - f.y) < f.r * 2.5) {
                    hit = true;
                    this.sliceFood(f);
                }
            }
            if (!hit && Math.random() < 0.1) audio.speakTaunt();
        }
    }

    sliceFood(f) {
        f.sliced = true;
        f.vx *= 0.3; f.vy = -6 * this.scale; // Pop up on slice
        
        if (f.type === 'bomb') {
            audio.sfxExplosion();
            this.triggerScreenShake();
            this.spawnExplosion(f.x, f.y, CONSTANTS.COLORS.neonRed);
            this.particles.push(new Particle(f.x, f.y, CONSTANTS.COLORS.neonRed, true, "MISS!"));
            audio.speakTaunt();
            f.alpha = 0;
            this.lives--;
            this.updateHUD();
            if (this.lives <= 0) this.endGame();
        } else {
            audio.sfxHit();
            this.score += (f.type === 'candy' ? 20 : 10);
            this.updateHUD();
            this.spawnExplosion(f.x, f.y, f.type === 'candy' ? CONSTANTS.COLORS.neonPink : '#5ef55e');
            this.particles.push(new Particle(f.x, f.y, '#fff', true, f.type === 'candy' ? "+20" : "+10"));
            
            // Anime Shout Trigger
            if (Math.random() < 0.15) {
                audio.sfxShout();
                const el = document.getElementById('actionText');
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 500);
            }
        }
    }

    spawnExplosion(x, y, color) {
        for(let i=0; i<25; i++) this.particles.push(new Particle(x, y, color));
    }

    // Advanced procedural drawing of the sword hilt and blade at the end of a swipe
    drawKatana(x, y, angle, length) {
        this.ctx.save();
        this.ctx.translate(x, y);
        this.ctx.rotate(angle);
        
        const bladeLen = Math.min(length * 1.5, 150 * this.scale);
        const bladeThick = 6 * this.scale;
        
        // Blade
        const grad = this.ctx.createLinearGradient(0, -bladeThick, 0, bladeThick);
        grad.addColorStop(0, CONSTANTS.COLORS.steelLight); grad.addColorStop(1, CONSTANTS.COLORS.steelDark);
        this.ctx.fillStyle = grad;
        this.ctx.beginPath();
        this.ctx.moveTo(0, -bladeThick/2); this.ctx.lineTo(bladeLen, 0); this.ctx.lineTo(0, bladeThick/2);
        this.ctx.closePath(); this.ctx.fill();
        
        // Tsuba (Guard)
        this.ctx.fillStyle = '#d4af37'; // Gold
        this.ctx.fillRect(-6 * this.scale, -bladeThick*1.5, 6 * this.scale, bladeThick*3);
        
        // Tsuka (Handle)
        this.ctx.fillStyle = '#222';
        this.ctx.fillRect(-35 * this.scale, -bladeThick, 29 * this.scale, bladeThick*2);
        
        // Handle wrap pattern
        this.ctx.strokeStyle = '#8b0000'; this.ctx.lineWidth = 2 * this.scale;
        for(let i=0; i<4; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(-32 * this.scale + i*7*this.scale, -bladeThick);
            this.ctx.lineTo(-28 * this.scale + i*7*this.scale, bladeThick);
            this.ctx.stroke();
        }

        this.ctx.restore();
    }

    endGame() {
        this.state = 'OVER';
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('finalScoreDisplay').textContent = `Final Score: ${this.score}`;
        document.getElementById('screen-over').classList.remove('hidden');
    }

    loop(time) {
        if (this.state !== 'PLAYING') return;

        // Render Background
        const bgGrad = this.ctx.createLinearGradient(0, 0, 0, this.H);
        bgGrad.addColorStop(0, CONSTANTS.COLORS.bgTop);
        bgGrad.addColorStop(1, CONSTANTS.COLORS.bgBottom);
        this.ctx.fillStyle = bgGrad;
        this.ctx.fillRect(0, 0, this.W, this.H);

        // Spawn Logic
        if (time - this.lastSpawnTime > this.spawnRate) this.spawnEntity();

        // Update Kenzie (Princess)
        this.kenzie.x += (this.kenzie.targetX - this.kenzie.x) * 0.08;
        
        this.ctx.save();
        let kRotate = Math.sin(time / 400) * 0.05; // Idle breathing
        let kScaleY = 1.0;
        let kScaleX = 1.0;
        
        // Procedural Throwing Kinematics
        if (this.kenzie.throwPhase > 0) {
            this.kenzie.throwPhase -= 0.04;
            if (this.kenzie.throwPhase > 0.5) {
                // Windup: lean back, squash down
                kRotate = -0.2; kScaleY = 0.85; kScaleX = 1.05;
            } else {
                // Release: whip forward, stretch up
                kRotate = 0.3; kScaleY = 1.1; kScaleX = 0.95;
            }
        }

        this.ctx.translate(this.kenzie.x, this.kenzie.y);
        this.ctx.rotate(kRotate);
        this.ctx.scale(kScaleX, kScaleY);
        
        // Draw Princess Asset
        const kSize = 240 * this.scale;
        this.ctx.shadowColor = CONSTANTS.COLORS.neonPink; this.ctx.shadowBlur = 30;
        this.ctx.drawImage(assets.cache.princess, -kSize/2, -kSize/2, kSize, kSize);
        this.ctx.shadowBlur = 0;
        this.ctx.restore();

        // Update & Render Foods
        for (let i = this.foods.length - 1; i >= 0; i--) {
            const f = this.foods[i];
            f.x += f.vx; f.y += f.vy; f.vy += CONSTANTS.BASE_GRAVITY * this.scale; f.angle += f.va;
            
            if (f.sliced) f.alpha -= 0.04;
            
            if (f.alpha <= 0 || f.y > this.H + 150) {
                if (!f.sliced && f.type !== 'bomb') {
                    this.lives--; this.updateHUD(); this.triggerScreenShake();
                    audio.speakTaunt();
                    if (this.lives <= 0) this.endGame();
                }
                this.foods.splice(i, 1); continue;
            }

            this.ctx.save();
            this.ctx.globalAlpha = Math.max(0, f.alpha);
            this.ctx.translate(f.x, f.y);
            this.ctx.rotate(f.angle);
            const size = f.r * 2;
            
            // Asset drawing
            const cacheImg = assets.cache[f.type];
            if (cacheImg) this.ctx.drawImage(cacheImg, -size/2, -size/2, size, size);
            this.ctx.restore();
        }

        // Update & Render Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(this.scale);
            this.particles[i].draw(this.ctx);
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        // Update & Render Slashes
        for (let i = this.slashes.length - 1; i >= 0; i--) {
            this.slashes[i].update();
            this.slashes[i].draw(this.ctx);
            if (this.slashes[i].life <= 0) this.slashes.splice(i, 1);
        }

        // Render Realtime Input Trail
        if (this.trail.length > 1) {
            this.ctx.lineCap = 'round'; this.ctx.lineJoin = 'round';
            this.ctx.beginPath(); this.ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) this.ctx.lineTo(this.trail[i].x, this.trail[i].y);
            
            // Trail Glow
            this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            this.ctx.lineWidth = 6 * this.scale;
            this.ctx.shadowColor = CONSTANTS.COLORS.neonBlue; this.ctx.shadowBlur = 20;
            this.ctx.stroke();
            this.ctx.shadowBlur = 0;
            
            // Inner core
            this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2 * this.scale;
            this.ctx.stroke();
        }

        requestAnimationFrame((t) => this.loop(t));
    }
}

// Bootstrap
window.onload = () => {
    const engine = new GameEngine();
    engine.resize();
};

</script>
</body>
